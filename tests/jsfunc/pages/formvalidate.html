<html>
<head><title>Form Validate</title></head>
<body>
<form id="form">
  <input id="name" type="text" value="">
  <button id="go" type="submit">Submit</button>
</form>
<div id="msgs"></div>
<script>
  var form = document.getElementById('form');
  var input = document.getElementById('name');
  var msgs = document.getElementById('msgs');
  form.addEventListener('submit', function(e){
    e.preventDefault();
    if (input.value === '') {
      var m = document.createElement('p');
      m.textContent = 'VALERR-required';
      msgs.appendChild(m);
      console.log('FORMVALIDATE empty msgs=' + msgs.children.length);
    } else {
      console.log('FORMVALIDATE ok value=' + input.value);
    }
  });
</script>
</body>
</html>
