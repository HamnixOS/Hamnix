<html>
<head><title>Deferred Click</title></head>
<body>
<p id="status">IDLE</p>
<button id="load">Load</button>
<script>
  var status = document.getElementById('status');
  document.getElementById('load').addEventListener('click', function(e){
    status.textContent = 'LOADING';
    // real sites defer the "done" state to a later turn (async fetch, debounce)
    setTimeout(function(){
      status.textContent = 'LOADED-OK';
      console.log('DEFERCLICK settled');
    }, 0);
    console.log('DEFERCLICK click');
  });
</script>
</body>
</html>
