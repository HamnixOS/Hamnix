<html>
<head><title>Counter</title></head>
<body>
<p>Count: <span id="count">0</span></p>
<button id="inc">Increment</button>
<script>
  var n = 0;
  var out = document.getElementById('count');
  document.getElementById('inc').addEventListener('click', function(e){
    n = n + 1;
    out.textContent = 'C' + n;      // distinctive rendered marker: C1, C2, ...
    console.log('COUNTER now=' + n);
  });
</script>
</body>
</html>
