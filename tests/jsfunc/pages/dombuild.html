<html>
<head><title>DOM Build</title></head>
<body>
<div id="root"></div>
<script>
  var items = ['Apple', 'Banana', 'Cherry'];
  var root = document.getElementById('root');
  var ul = document.createElement('ul');
  for (var i = 0; i < items.length; i++) {
    var li = document.createElement('li');
    li.textContent = 'ITEM-' + items[i];
    ul.appendChild(li);
  }
  root.appendChild(ul);
  console.log('DOMBUILD children=' + ul.children.length);
</script>
</body>
</html>
