<html>
<head><title>Tabs</title>
<style>.panel { display: none; } .panel.active { display: block; }</style>
</head>
<body>
<div id="tabbar">
  <button id="t1" data-tab="1">Tab1</button>
  <button id="t2" data-tab="2">Tab2</button>
  <button id="t3" data-tab="3">Tab3</button>
</div>
<div id="p1" class="panel active">PANELONE</div>
<div id="p2" class="panel">PANELTWO</div>
<div id="p3" class="panel">PANELTHREE</div>
<script>
  var bar = document.getElementById('tabbar');
  var panels = [document.getElementById('p1'),
                document.getElementById('p2'),
                document.getElementById('p3')];
  bar.addEventListener('click', function(e){
    var which = e.target.getAttribute('data-tab');
    if (!which) return;
    for (var i = 0; i < panels.length; i++) {
      panels[i].classList.remove('active');
    }
    var sel = document.getElementById('p' + which);
    sel.classList.add('active');
    console.log('TABS active=' + which + ' target=' + e.target.id);
  });
</script>
</body>
</html>
