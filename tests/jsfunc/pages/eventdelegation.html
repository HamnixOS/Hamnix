<html>
<head><title>Event Delegation</title></head>
<body>
<ul id="list">
  <li id="i1">One</li>
  <li id="i2">Two</li>
  <li id="i3">Three</li>
</ul>
<p id="status">NONE</p>
<script>
  var list = document.getElementById('list');
  var status = document.getElementById('status');
  list.addEventListener('click', function(e){
    // route via e.target: mutate the clicked child + report which one
    e.target.textContent = 'PICKED';
    status.textContent = 'ROUTED-' + e.target.id;
    console.log('DELEGATE target=' + e.target.id);
  });
</script>
</body>
</html>
