<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Form inputs</title>
<style>
  html, body { background:#ffffff; }
  body { font-family: "DejaVu Sans", sans-serif; color:#111; margin:8px; }
  h2 { color:#14306e; }
  label { display:block; margin-top:8px; }
  input, select { font-family: "DejaVu Sans", sans-serif; }
  .row { margin-top:6px; }
</style>
</head>
<body>
<h2>Sign in</h2>
<form>
  <label>Username</label>
  <input type="text" value="ke7oxh" size="24">
  <label>Password</label>
  <input type="password" value="secret" size="24">
  <div class="row"><input type="checkbox" checked> Remember me</div>
  <div class="row"><input type="radio" name="k" checked> A
                   <input type="radio" name="k"> B</div>
  <label>Role</label>
  <select><option>admin</option><option>user</option></select>
  <div class="row"><button type="submit">Log in</button></div>
</form>
</body>
</html>
