<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Data table</title>
<style>
  html, body { background:#ffffff; }
  body { font-family: "DejaVu Sans", sans-serif; color:#111; margin:8px; }
  h2 { color:#14306e; }
  table { border-collapse:collapse; }
  th, td { border:1px solid #99b; padding:4px 8px; text-align:left; }
  th { background:#eef3ff; color:#123; }
  tr:nth-child(even) td { background:#f7f7f7; }
</style>
</head>
<body>
<h2>Release matrix</h2>
<table>
  <tr><th>Component</th><th>Version</th><th>Status</th></tr>
  <tr><td>kernel</td><td>4.2</td><td>green</td></tr>
  <tr><td>browser</td><td>0.9</td><td>beta</td></tr>
  <tr><td>hamsh</td><td>1.1</td><td>green</td></tr>
  <tr><td>installer</td><td>0.7</td><td>alpha</td></tr>
</table>
</body>
</html>
