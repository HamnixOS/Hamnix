<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Nav bar and hero</title>
<style>
  html, body { background:#ffffff; }
  body { font-family: "DejaVu Sans", sans-serif; color:#111; margin:0; }
  .nav {
    display:flex; align-items:center; background:#14306e; color:#fff;
    padding:12px 20px;
  }
  .brand { font-weight:bold; font-size:20px; }
  .spacer { flex:1; }
  .nav a { color:#cdd8ee; margin-left:20px; font-size:15px; }
  .hero {
    background:#2f5b86; color:#ffffff; padding:48px 20px; text-align:center;
  }
  .hero h1 { margin:0 0 12px 0; font-size:34px; }
  .hero p  { margin:0 auto; max-width:520px; font-size:16px; color:#e6eef8; }
  .cta {
    display:inline-block; margin-top:20px; background:#ffffff; color:#14306e;
    border-radius:6px; padding:10px 22px; font-weight:bold; font-size:15px;
  }
</style>
</head>
<body>
<div class="nav">
  <span class="brand">Hamnix</span>
  <span class="spacer"></span>
  <a href="#">Features</a>
  <a href="#">Docs</a>
  <a href="#">Download</a>
</div>
<div class="hero">
  <h1>A Plan 9 desktop that runs Linux apps</h1>
  <p>Native kernel, native browser, native tooling — with a Linux ABI shim
  for the software you already depend on.</p>
  <span class="cta">Get started</span>
</div>
</body>
</html>
