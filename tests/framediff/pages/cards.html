<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Card grid with radius and shadow</title>
<style>
  /* DejaVu Sans is the face the pixel engine paints; the references use it too
     so RMSE tracks layout + paint, not a font swap. */
  html, body { background:#ffffff; }
  body { font-family: "DejaVu Sans", sans-serif; color:#111; margin:16px; }
  h2 { color:#14306e; margin:0 0 12px 0; }
  .row { display:flex; gap:16px; }
  .card {
    width:180px; background:#ffffff; border:1px solid #d0d7e2;
    border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.18);
    padding:12px;
  }
  .card h3 { margin:0 0 6px 0; color:#14306e; font-size:18px; }
  .card p  { margin:0; color:#444; font-size:14px; }
  .badge {
    display:inline-block; background:#2f5b86; color:#fff;
    border-radius:12px; padding:2px 10px; font-size:12px; margin-top:8px;
  }
</style>
</head>
<body>
<h2>Featured cards</h2>
<div class="row">
  <div class="card">
    <h3>Kernel</h3>
    <p>Native Plan 9 core with a Linux ABI shim.</p>
    <span class="badge">stable</span>
  </div>
  <div class="card">
    <h3>Browser</h3>
    <p>Pixel layout engine driving toward W3C conformance.</p>
    <span class="badge">beta</span>
  </div>
  <div class="card">
    <h3>Installer</h3>
    <p>First-class live image that installs to NVMe.</p>
    <span class="badge">alpha</span>
  </div>
</div>
</body>
</html>
