<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Flexbox nav bar</title>
<style>
  html, body { background:#ffffff; }
  body { font-family: "DejaVu Sans Mono", monospace; color:#111; margin:0; }
  .nav { display:flex; background:#2f5b86; color:#fff; padding:8px; }
  .brand { font-weight:bold; }
  .spacer { flex:1; }
  .nav a { color:#dce7f2; margin-left:16px; }
  .body { margin:8px; }
</style>
</head>
<body>
<div class="nav">
  <span class="brand">Hamnix</span>
  <span class="spacer"></span>
  <a href="#">Home</a>
  <a href="#">Docs</a>
  <a href="#">About</a>
</div>
<div class="body">
  <p>A flex nav bar with a brand on the left, a flexible spacer, and
  three links pushed to the right edge.</p>
</div>
</body>
</html>
