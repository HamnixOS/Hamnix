<html>
<head><title>Forms2</title></head>
<body>
<h1>Forms2 Demo</h1>

<!-- radio-group exclusivity: two radios sharing name="plan" -->
<p>Plan: <input type="radio" id="pf" name="plan" value="free" checked> free</p>
<p><input type="radio" id="pp" name="plan" value="pro"> pro</p>
<p id="planmsg">plan is free</p>

<!-- select with a JS-driven selectedIndex write -->
<p>Lang: <select id="lang" name="lang">
<option>en</option>
<option selected>fr</option>
<option>de</option>
</select></p>
<p id="langmsg">lang set</p>
<p><button id="pickde">Pick DE</button></p>

<!-- a submit form that gathers every control kind -->
<form id="f3" action="/join">
User: <input type="text" name="user" value="ada">
<select name="tier">
<option>basic</option>
<option selected>gold</option>
</select>
<input type="checkbox" name="news" value="yes" checked>
<input type="radio" name="col" value="red">
<input type="radio" name="col" value="blue" checked>
<input type="submit" value="Join">
</form>

<script>
  // onchange on either radio updates the status line; used to confirm that a
  // check on one member does NOT fire the other's handler (spec behaviour).
  document.getElementById('pp').onchange = function() {
    var s = document.getElementById('pp').checked ? 'plan is pro' : 'plan is free';
    document.getElementById('planmsg').textContent = s;
  };
  document.getElementById('pf').onchange = function() {
    var s = document.getElementById('pf').checked ? 'plan is free' : 'plan is pro';
    document.getElementById('planmsg').textContent = s;
  };
  // clicking the button writes select.selectedIndex; the control must re-render
  // its newly selected option (de) and select.value must read it back.
  document.getElementById('pickde').onclick = function() {
    document.getElementById('lang').selectedIndex = 2;
    document.getElementById('langmsg').textContent = 'picked';
  };
  // DOM surface probes for the group + select.
  console.log('pf.checked=' + document.getElementById('pf').checked);
  console.log('pp.checked=' + document.getElementById('pp').checked);
  console.log('doc.forms2=' + document.forms.length);
</script>
</body>
</html>
