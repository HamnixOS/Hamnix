<html><head><style>
  /* (1) 3-column flex card grid: each card flex:1 (definite shrunk width) with a
     long body sentence that MUST wrap INSIDE the card, not bleed past its edge. */
  .cards { display:flex; gap:16px; }
  .c1 { flex:1; background:#ff88cc; }   /* pink   */
  .c2 { flex:1; background:#88ffcc; }   /* mint   */
  .c3 { flex:1; background:#88ccff; }   /* sky    */

  /* (2) nav: display:flex + gap:20px, NO justify-content -> pack at flex-start
     with a 20px gutter between the single-word links (not spread edge-to-edge). */
  .nav { display:flex; gap:20px; background:#223344; }
  .nav a { color:#ffee00; text-decoration:none; }

  /* (3) whitespace-only text node between two margin-less divs must NOT inject a
     blank line-box: the second block sits directly below the first. */
  .w1 { background:#ff4444; }
  .w2 { background:#4466ff; }
</style></head><body>
<div class="cards">
<div class="c1">Alpha beta gamma delta epsilon zeta eta theta iota kappa</div>
<div class="c2">One two three four five six seven eight nine ten eleven</div>
<div class="c3">Red orange yellow green blue indigo violet cyan magenta</div>
</div>
<div class="nav"><a href="/">Home</a><a href="/a">About</a><a href="/b">Blog</a><a href="/c">Shop</a></div>
<div class="w1">FirstBlock</div>

<div class="w2">SecondBlock</div>
</body></html>
