<!DOCTYPE html>
<html>
<head>
<style>
  /* Four grids with IDENTICAL fixed tracks (3 x 64px + 8px gaps => 208px of
     content) that UNDERFLOW the body content width, so justify-content decides
     where the leftover inline-axis space goes. */
  .gstart  { display:grid; grid-template-columns: 64px 64px 64px; gap:8px; justify-content:flex-start; }
  .gcenter { display:grid; grid-template-columns: 64px 64px 64px; gap:8px; justify-content:center; }
  .gend    { display:grid; grid-template-columns: 64px 64px 64px; gap:8px; justify-content:flex-end; }
  .gbetween{ display:grid; grid-template-columns: 64px 64px 64px; gap:8px; justify-content:space-between; }
  .cell    { background:#eeeeee; color:#111111; }
</style>
</head>
<body>
<div class="gstart"><div class="cell">Sa</div><div class="cell">Sb</div><div class="cell">Sc</div></div>
<div class="gcenter"><div class="cell">Ca</div><div class="cell">Cb</div><div class="cell">Cc</div></div>
<div class="gend"><div class="cell">Ea</div><div class="cell">Eb</div><div class="cell">Ec</div></div>
<div class="gbetween"><div class="cell">Ba</div><div class="cell">Bb</div><div class="cell">Bc</div></div>
</body>
</html>
