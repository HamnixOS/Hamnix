<!DOCTYPE html>
<html>
<head>
<style>
  /* A real 3-column card dashboard: repeat(3, 1fr) with equal fr tracks + gaps. */
  .cards { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
  .card  { background:#eef3ff; color:#123; border:1px solid #99b; }
  /* A sidebar + content page shell: a fixed 200px rail beside two fr columns. */
  .shell { display:grid; grid-template-columns: 200px 1fr 1fr; column-gap:20px; }
  .panel { background:#f7f7f7; color:#222; }
</style>
</head>
<body>
<h2>Card grid</h2>
<div class="cards">
  <div class="card">Alpha</div>
  <div class="card">Bravo</div>
  <div class="card">Charlie</div>
  <div class="card">Delta</div>
  <div class="card">Echo</div>
  <div class="card">Foxtrot</div>
  <div class="card">Golf</div>
</div>
<h2>Page shell</h2>
<div class="shell">
  <div class="panel">Sidebar</div>
  <div class="panel">Mainarea</div>
  <div class="panel">Extra</div>
</div>
</body>
</html>
