<!doctype html>
<html>
<head>
<style>
ul { margin: 0; padding: 0; list-style: none }
/* authored inter-item margin — Chrome stacks each <li> as a block, so this
   spaces the items. 32px == 2 rows on the 16px grid. */
.spaced li { margin: 0 0 32px }
/* the danluu pattern: display:flex list items with an authored bottom margin.
   The flex item must still honour its block margin (no ::marker, but stacks). */
.flexrow li { display: flex; margin: 0 0 32px }
/* control: an explicit margin:0 keeps items flush (1 row apart) so the gate is
   not a tautology — it measures the feature, not a constant. */
.tight li { margin: 0 }
</style>
</head>
<body>
<ul class="spaced"><li>SpacedOne</li><li>SpacedTwo</li><li>SpacedThree</li></ul>
<ul class="tight"><li>TightOne</li><li>TightTwo</li><li>TightThree</li></ul>
<ul class="flexrow"><li>FlexItemOne</li><li>FlexItemTwo</li></ul>
</body>
</html>
