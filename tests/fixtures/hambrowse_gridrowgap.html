<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Grid row-gap</title>
<style>
  html, body { background:#ffffff; margin:8px;
               font-family:"DejaVu Sans", sans-serif; }
  .cards { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
  .card  { background:#cfe0ff; border:1px solid #3366cc; padding:8px;
           color:#112244; }
</style>
</head>
<body>
<div class="cards">
  <div class="card">Alpha</div>
  <div class="card">Bravo</div>
  <div class="card">Charlie</div>
  <div class="card">Delta</div>
  <div class="card">Echo</div>
  <div class="card">Foxtrot</div>
</div>
</body>
</html>
