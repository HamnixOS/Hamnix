<!doctype html><html><head><style>
.box  { background:#112233; width:120px; height:40px; }
.mid  { background:#333333; width:120px; height:40px; }
.ornt { background:#444444; width:120px; height:40px; }
.pref { background:#555555; width:120px; height:40px; }
@media (min-width: 800px) { .box { background:#cc0000; } }
@media screen and (max-width: 500px) { .box { background:#00aa00; } }
@media (min-width: 600px) and (max-width: 900px) { .mid { background:#8800ff; } }
@media (orientation: landscape) { .ornt { background:#00cccc; } }
@media (prefers-color-scheme: dark) { .pref { background:#ff00ff; } }
</style></head><body>
<div class="box">Responsive box content here</div>
<div class="mid">Mid range box content here</div>
<div class="ornt">Orientation box content here</div>
<div class="pref">Color scheme box content</div>
</body></html>
