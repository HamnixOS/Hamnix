<html><head><title>insertAdjacentHTML</title></head><body>
<div id="box"><span>orig</span></div>
<script>
  var b = document.getElementById('box');
  b.insertAdjacentHTML('beforeend',  '<p id="e">END</p>');
  b.insertAdjacentHTML('afterbegin', '<p id="s">BEGIN</p>');
  // a no-op sibling position must not throw or corrupt content
  b.insertAdjacentHTML('afterend', '<p>SIB</p>');
</script>
</body></html>
