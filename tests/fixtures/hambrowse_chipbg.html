<!DOCTYPE html>
<html>
<head>
<style>
/* A coloured container holding several inline-block "chips". Real pages
   (google's search bar) give such wrappers `background:inherit`, or leave them
   background-less, expecting the CONTAINER's fill to show through. The engine
   used to paint EVERY inline-block with the ambient (inherited) background as
   an opaque box; when a chip's shrink-wrapped/flex width over-measured, that
   redundant fill bled past the container as a spurious "box behind"/"nested
   box" (the artifacts the user saw on live google). A borderless,
   background-less inline block must therefore paint NO fill of its own. */
.bar   { background: #3366cc; padding: 8px; }
.plain { display: inline-block; }        /* no bg, no border -> NO fill box  */
.inh   { display: inline-block; background: inherit; } /* inherit -> NO fill  */
.own   { display: inline-block; background: #cc2222; } /* own bg  -> ONE fill */
</style>
</head>
<body>
<div class="bar">
<span class="plain">plain</span>
<span class="inh">inherit</span>
<span class="own">owncolor</span>
</div>
</body>
</html>
