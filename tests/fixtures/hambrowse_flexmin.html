<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; font-family: sans-serif; }
  /* A constrained flex bar: justify-content spreads variable-width children
     across the row. The brand is BOLD + large, so with the proportional
     measure hook its real width far exceeds the CELL_W monospace track
     estimate — pre-fix the flex track over-shrank and the brand word was
     hard char-broken across two rows ("Nimbostratus" -> "Nimbo"/"stratus"),
     and the two-word link wrapped between its words ("Log in" -> "Log"/"in"). */
  .bar { display: flex; justify-content: space-between; background: #223344; }
  .brand { font-weight: bold; font-size: 22px; color: #ffffff; }
  .nav a { color: #cfe3ff; text-decoration: none; }
</style>
</head>
<body>
  <div class="bar">
    <span class="brand">Nimbostratus</span>
    <nav class="nav">
      <a href="/features">Features</a>
      <a href="/login">Log in</a>
    </nav>
  </div>
</body>
</html>
