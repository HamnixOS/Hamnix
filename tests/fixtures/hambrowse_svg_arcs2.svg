<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- a pill/capsule drawn with RELATIVE arcs whose large/sweep flags are packed
       with no separators ("a12 12 0 016 0" -> rx12 ry12 rot0 large0 sweep1 dx6),
       exercising the single-char flag reader -->
  <path d="M20 8 h24 a12 12 0 016 12 v0 a12 12 0 01-6 12 h-24 a12 12 0 01-6-12 a12 12 0 016-12 z"
        fill="#7030c0"/>
  <!-- a smooth-quadratic T wave: the T control reflects the preceding Q control,
       so the two humps are symmetric -->
  <path d="M6 40 Q 16 24 26 40 T 46 40" fill="none" stroke="#008080" stroke-width="3"/>
</svg>
