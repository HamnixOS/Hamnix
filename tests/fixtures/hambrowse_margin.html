<!doctype html>
<html>
<body>
<p>Flush left paragraph at the body margin.</p>
<div style="margin-left:32px">Indented block shifted one step right.</div>
<div style="margin-left:16px;padding-left:16px">Margin plus padding both shift content.</div>
<div style="margin-left:24px">
<p>Nested paragraph inherits the outer block indent and adds none of its own.</p>
</div>
<p>Back flush at the body margin after the blocks close.</p>
</body>
