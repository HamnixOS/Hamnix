<!DOCTYPE html>
<html><head><title>DOM R6 constraint validation</title></head>
<body>
<form id="f1" action="/go">
  <input id="req2" name="req2" required>
  <input id="opt2" name="opt2">
  <select id="sel2" name="sel2"><option>x</option></select>
</form>
<input id="req" required>
<input id="opt">
<script>
  var req = document.getElementById('req');
  var opt = document.getElementById('opt');
  console.log('CV ' + req.checkValidity() + '|' + opt.checkValidity());
  req.value = 'filled';
  console.log('CV2 ' + req.checkValidity());
  var f = document.getElementById('f1');
  console.log('FEL ' + f.elements.length + '|' + f.checkValidity());
  document.getElementById('req2').value = 'now';
  console.log('FVOK ' + f.checkValidity());
</script>
</body></html>
