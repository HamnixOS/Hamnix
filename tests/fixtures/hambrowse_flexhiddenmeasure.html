<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>flex child natural-width skips display:none descendants</title>
<style>
  /* CLASS-based display:none (not inline) — must be skipped by the flex
     child natural-width measurer, else the hidden menu's prose balloons the
     right group's measured width and the space-between row collapses. */
  .hid { display: none; }
  .bar { display: flex; justify-content: space-between; width: 800px; }
</style>
</head>
<body>
<div class="bar">
  <div style="background:#aa1111">LEFTGROUP</div>
  <div style="background:#3333cc">RIGHT<span class="hid">HIDDENMENU SearchSettings AdvancedSearch YourDataInSearch SearchHistory SearchHelp SendFeedback DarkTheme ReportInappropriate ThisTextIsVeryLongAndWouldOverflowTheRowIfMeasured AndMoreAndMoreAndMoreHiddenPixels</span></div>
</div>
</body>
</html>
