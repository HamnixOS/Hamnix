<html>
<head><title>Selector pseudo-classes</title></head>
<body>
<div id="box">
  <h2>Head</h2>
  <p class="a">P1</p>
  <p class="a">P2</p>
  <p class="b">P3</p>
  <span>S1</span>
  <span class="last">S2</span>
</div>
<ul id="list">
  <li>One</li>
  <li class="mid">Two</li>
  <li>Three</li>
  <li>Four</li>
</ul>
<div id="solo"><b>only</b></div>
<div id="emptybox"></div>
<div id="wsbox">   </div>
<div id="dyn"></div>
<p id="status">pseudo-pending</p>

<script>
  // ---- of-type over the SOURCE tree -----------------------------------
  console.log("otype " + document.querySelector('#box p:first-of-type').textContent \
              + " " + document.querySelector('#box p:last-of-type').textContent \
              + " " + document.querySelector('#box p:nth-of-type(2)').textContent); // otype P1 P3 P2
  // :only-of-type (h2 is the only h2) + :last-of-type over spans.
  console.log("onlytype " + document.querySelector('#box h2:only-of-type').textContent \
              + " " + document.querySelector('#box span:last-of-type').textContent); // onlytype Head S2

  // ---- nth-last-child over the SOURCE tree ----------------------------
  console.log("nlc " + document.querySelector('#list li:nth-last-child(1)').textContent \
              + " " + document.querySelector('#list li:nth-last-child(2)').textContent); // nlc Four Three

  // ---- :not() negation + :only-child + :empty -------------------------
  console.log("not " + document.querySelectorAll('#list li:not(.mid)').length \
              + " " + document.querySelector('#box p:not(.a)').textContent); // not 3 P3
  // #dyn is still empty here (children appended below), so it counts too.
  console.log("only " + document.querySelector('#solo b:only-child').textContent \
              + " " + document.querySelectorAll('div:empty').length); // only only 3

  // ---- the SAME pseudos over CREATED (createElement) nodes ------------
  var host = document.getElementById('dyn');
  var c1 = document.createElement('li'); c1.textContent = 'C1';
  var c2 = document.createElement('li'); c2.className = 'mid'; c2.textContent = 'C2';
  var c3 = document.createElement('li'); c3.textContent = 'C3';
  host.appendChild(c1); host.appendChild(c2); host.appendChild(c3);
  console.log("cre " + document.querySelectorAll('#dyn li:not(.mid)').length \
              + " " + document.querySelector('#dyn li:nth-last-child(1)').textContent \
              + " " + document.querySelector('#dyn li:first-of-type').textContent \
              + " " + document.querySelector('#dyn li:last-of-type').textContent); // cre 2 C3 C1 C3

  // ---- render reflection: an of-type-selected node drives a mutation ---
  var t = document.querySelector('#status');
  t.textContent = document.querySelector('#box p:last-of-type').textContent + "-PSEUDO-OK"; // P3-PSEUDO-OK
</script>
</body>
</html>
