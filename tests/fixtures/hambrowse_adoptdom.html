<!doctype html>
<html><head><title>adoption DOM tree</title></head>
<body>
<!-- HTML5 adoption-agency / reconstruct-the-active-formatting-elements at the
     DOM-TREE layer. The visual/segment result is locked by
     test_hambrowse_adoption; THIS fixture asserts the actual node tree via DOM
     traversal (childNodes / nextElementSibling / parentNode). -->

<!-- Canonical overlap  <b>A<i>B</b>C</i>  -> spec DOM  <b>A<i>B</i></b><i>C</i>.
     The <i> holding "B" stays a child of <b>; a RECONSTRUCTED <i> holding "C"
     is a SIBLING of <b> (child of the same #m1 div), NOT a child of <b>. -->
<div id="m1"><b>A<i>B</b>C</i></div>

<!-- Same pattern, different tag names (em/strong) to prove it is not b/i only. -->
<div id="m2"><em>P<strong>Q</em>R</strong></div>

<!-- Regression: a WELL-NESTED <b><i>Z</i></b> must be left ALONE — one child,
     no reconstructed sibling. -->
<div><b id="wn"><i>Z</i></b></div>

<script>
  // Case 1: <b>A<i>B</b>C</i>
  var b = document.querySelector('b');
  console.log("c1 " + b.firstElementChild.tagName \
              + " " + b.firstElementChild.textContent \
              + " " + b.children.length); // c1 I B 1
  var r = b.nextElementSibling;
  console.log("c1r " + r.tagName + " " + r.textContent); // c1r I C
  console.log("c1p " + (r.parentNode === b.parentNode ? "sib" : "child")); // c1p sib

  // Case 2: <em>P<strong>Q</em>R</strong>
  var e = document.querySelector('em');
  console.log("c2 " + e.firstElementChild.tagName \
              + " " + e.firstElementChild.textContent \
              + " " + e.children.length); // c2 STRONG Q 1
  var r2 = e.nextElementSibling;
  console.log("c2r " + r2.tagName + " " + r2.textContent); // c2r STRONG R
  console.log("c2p " + (r2.parentNode === e.parentNode ? "sib" : "child")); // c2p sib

  // Regression: well-nested <b><i>Z</i></b> untouched.
  var wn = document.getElementById('wn');
  console.log("c3 " + wn.children.length \
              + " " + (wn.nextElementSibling ? wn.nextElementSibling.tagName : "none")); // c3 1 none
</script>
</body>
</html>
