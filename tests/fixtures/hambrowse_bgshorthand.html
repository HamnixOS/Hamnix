<!DOCTYPE html>
<html>
<head>
<style>
  .first   { background: #ffcc00 no-repeat; }
  .last    { background: no-repeat #33cc99; }
  .slash   { background: center / cover #cc3366; }
  .urlcol  { background: red url(x.png) 0 0; }
  .named   { background: repeat-x steelblue; }
  .rgbmid  { background: no-repeat rgb(10, 120, 200) center; }
  .none    { background: none no-repeat; }
</style>
</head>
<body>
  <div class="first">color first token</div>
  <div class="last">color last token</div>
  <div class="slash">color after slash</div>
  <div class="urlcol">color first with url</div>
  <div class="named">named color after keyword</div>
  <div class="rgbmid">rgb() color mid-shorthand</div>
  <div class="none">background none no fill</div>
</body>
</html>
