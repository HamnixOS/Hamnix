<!DOCTYPE html>
<html><head><title>DOM R6 listener options</title></head>
<body>
<div id="s1">stopImmediate</div>
<div id="o1">once</div>
<div id="o2">capture</div>
<script>
  // stopImmediatePropagation: 2nd listener on same element must NOT run.
  var s1 = document.getElementById('s1');
  var order = '';
  s1.addEventListener('ping', function(e){ order += 'A'; e.stopImmediatePropagation(); });
  s1.addEventListener('ping', function(e){ order += 'B'; });
  s1.dispatchEvent(new Event('ping'));
  console.log('SIP ' + order);
  // {once:true}: fires at most once across two dispatches.
  var o1 = document.getElementById('o1');
  var oc = 0;
  o1.addEventListener('tick', function(){ oc = oc + 1; }, {once:true});
  o1.dispatchEvent(new Event('tick'));
  o1.dispatchEvent(new Event('tick'));
  console.log('ONCE ' + oc);
  // useCapture boolean 3rd arg accepted (bubble-only model still fires).
  var o2 = document.getElementById('o2');
  var cc = 0;
  o2.addEventListener('tick', function(){ cc = cc + 1; }, true);
  o2.dispatchEvent(new Event('tick'));
  console.log('CAP ' + cc);
</script>
</body></html>
