<!DOCTYPE html>
<html><head><title>element.style manipulation</title>
<style>
  .red   { color: #111111; }
  .box   { background-color: #010203; }
</style></head>
<body>
<p id="hide">HIDEME hidden paragraph</p>
<p id="col" class="red">COLORWORD recoloured paragraph</p>
<div id="bg" class="box">BOXWORD background box</div>
<p id="wt">WEIGHTWORD weighted paragraph</p>
<div id="wid">WIDTHBOX sized box</div>
<p id="css">CSSTEXTWORD csstext paragraph</p>
<p id="attr">ATTRWORD setattr paragraph</p>
<script>
  // display:none removes the element from layout entirely
  document.getElementById('hide').style.display = 'none';

  // color via .style beats the .red stylesheet class (inline specificity)
  document.getElementById('col').style.color = '#ee2244';

  // backgroundColor via .style paints the box (overrides .box class bg)
  document.getElementById('bg').style.backgroundColor = '#22cc66';

  // font-weight change reflects as a bold segment
  document.getElementById('wt').style.fontWeight = 'bold';

  // width getter returns exactly what was set; and affects the baked box
  var wd = document.getElementById('wid');
  wd.style.width = '120px';
  console.log('widget ' + wd.style.width);

  // cssText: multi-declaration replace, parsed into routed props + render
  var cs = document.getElementById('css');
  cs.style.cssText = 'color:#33bbff; font-weight:bold';
  console.log('csscol ' + cs.style.color + ' csswt ' + cs.style.fontWeight);

  // setAttribute('style') routes into the SAME store; getAttribute reads back
  var at = document.getElementById('attr');
  at.setAttribute('style', 'color:#7788aa; width:90px');
  console.log('attrcol ' + at.style.color + ' attrwd ' + at.style.width);
  console.log('attrget ' + at.getAttribute('style'));

  // getter returns '' for an unset property
  console.log('unset [' + document.getElementById('col').style.width + ']');
</script>
</body></html>
