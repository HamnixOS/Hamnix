<!DOCTYPE html>
<html>
<head>
<style>
  /* Fractional / decimal CSS lengths across px / % / em / rem units.
     Pre-fix (integer-only length scan) every one of these truncated at the
     '.' — 1.5rem read as 1rem, 0.75rem as 0, 33.3% as 33, 1.5em as 1em. */
  :root { font-size: 16px; }
  .heading  { font-size: 1.5rem; background-color: #eeeeee; }   /* 24px */
  .body     { font-size: 1rem;   background-color: #dddddd; }    /* 16px */
  .padbox   { padding: 0.75rem;  width: 200px; background-color: #ffcc00; } /* pad 12px */
  .thirds   { width: 33.3%;      background-color: #33aa33; }    /* .333 * 584 -> ~194px */
  .emhalf   { font-size: 1.5em;  background-color: #cc00cc; }    /* 24px */
  .quarter  { width: 25.5%;      background-color: #2255aa; }    /* .255 * 584 -> ~149px */
</style>
</head>
<body>
  <h1 class="heading">Heading at 1.5rem</h1>
  <p class="body">Body at 1rem</p>
  <div class="padbox">Padded 0.75rem box</div>
  <div class="thirds">Third-width 33.3 percent box</div>
  <p class="emhalf">Text at 1.5em</p>
  <div class="quarter">Quarter-ish 25.5 percent box</div>
</body>
</html>
