<!doctype html><html><head>
<!-- Base sheet (no media attr): always applies. -->
<style>
  .mq  { display:block; background:#cc0000; height:40px; }
  .ctl { display:block; background:#0000cc; height:40px; }
  .rev { display:none;  background:#00cc00; height:40px; }
</style>
<!-- max-width block: hides .mq only when viewport is narrow (<=799px). -->
<style media="(max-width: 799px)">
  .mq { display:none; }
</style>
<!-- min-width block: reveals .rev only when viewport is wide (>=800px). -->
<style media="(min-width: 800px)">
  .rev { display:block; }
</style>
</head><body>
<nav class="mq">RESPONSIVE desktop nav (max-width style hides me when narrow)</nav>
<nav class="rev">WIDE-only nav (min-width style reveals me when wide)</nav>
<div class="ctl">CONTROL bar (no media attr — always shown)</div>
<article><h1>Article Heading</h1><p>Article body paragraph text here.</p></article>
</body></html>
