<html>
<head><title>DOM Core</title></head>
<body class="page">
<h1 id="title">Home</h1>
<div id="host">host</div>
<p id="status">core-pending</p>

<script>
  // ---- document.body / documentElement / head resolve to element nodes ----
  // spec-uppercase tagName proves each is the real element node.
  console.log("roots " + document.documentElement.tagName \
              + " " + document.body.tagName \
              + " " + document.head.tagName); // roots HTML BODY HEAD

  // document.body is the SAME object querySelector('body') returns, and carries
  // the <body class="page"> className + a live .style / .classList.
  console.log("bodycls " + document.body.className \
              + " " + (document.body === document.querySelector('body'))); // bodycls page true

  // document.documentElement.classList is a real classList (add + contains).
  document.documentElement.classList.add('js-on');
  console.log("docel " + document.documentElement.classList.contains('js-on')); // docel true

  // ---- document.body.appendChild(document.createElement('div')) renders ----
  var d = document.createElement('div');
  d.textContent = 'appended-into-body';
  document.body.appendChild(d);
  console.log("append " + d.parentNode.tagName); // append BODY

  // document.body.scrollHeight is a number (layout box height).
  console.log("scroll " + (typeof document.body.scrollHeight)); // scroll number

  // ---- scrollTop / scrollLeft: readable + writable static offsets ----------
  var host = document.getElementById('host');
  console.log("scroll0 " + host.scrollTop + " " + host.scrollLeft); // scroll0 0 0
  host.scrollTop = 42;
  host.scrollLeft = 7;
  console.log("scrollset " + host.scrollTop + " " + host.scrollLeft); // scrollset 42 7

  // ---- a mutation reached via document.body renders --------------------
  var tgt = document.querySelector('#status');
  tgt.textContent = document.body.tagName + "-CORE-OK"; // BODY-CORE-OK (renders)
</script>
</body>
</html>
