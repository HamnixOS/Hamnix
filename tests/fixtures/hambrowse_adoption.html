<!doctype html>
<html><head><title>adoption agency</title></head>
<body>
<!-- Canonical WHATWG adoption-agency misnest: <b>1<i>2</b>3</i>. The spec DOM
     reparents/reconstructs the <i> so the tree is <b>1<i>2</i></b><i>3</i>,
     i.e. "1"=bold, "2"=bold+italic, "3"=italic. Each digit is on its own line so
     it lays out as a distinct text run whose bold/italic flags can be asserted. -->
<div><b>1</b></div>
<div><b>A<i>B</b>C</i></div>
<!-- Block-crossing reconstruct-the-active-formatting-elements: a formatting
     element left open across a </p>/<p> boundary is reconstructed in the next
     block, so "Y" stays bold. -->
<p><b>X</p><p>Y</p>
</body>
</html>
