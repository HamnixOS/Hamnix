<!DOCTYPE html>
<html>
<head><title>querySelector / querySelectorAll selector grammar</title></head>
<body>
<div id="root">
  <h1 id="t1">Title</h1>
  <p id="p1">after h1</p>
  <p id="p2">second para</p>
  <ul id="list">
    <li id="i1" class="item">1</li>
    <li id="i2" class="item skip">2</li>
    <li id="i3" class="item">3</li>
    <li id="i4" class="item">4</li>
  </ul>
  <a id="a1" href="http://example.com/doc.pdf" data-x="1" class="btn primary" data-tags="news sports">L1</a>
  <a id="a2" href="/local" class="link" lang="en-US">L2</a>
  <span id="s1">span</span>
  <h2 id="h2a">Sub</h2>
</div>

<script>
  var d = document;

  // ---- combinators ---------------------------------------------------------
  console.log('CHILD ' + d.querySelectorAll('ul > li').length);          // 4
  console.log('DESC ' + d.querySelectorAll('#root li').length);          // 4
  console.log('CHILD0 ' + d.querySelectorAll('#root > li').length);      // 0 (li not direct child)
  console.log('ADJ ' + d.querySelectorAll('h1 + p').length);             // 1
  console.log('ADJ_ID ' + d.querySelector('h1 + p').id);                 // p1
  console.log('GEN ' + d.querySelectorAll('h1 ~ p').length);             // 2

  // ---- attribute operators -------------------------------------------------
  console.log('ATTR_EQ ' + d.querySelectorAll('[data-x="1"]').length);   // 1
  console.log('ATTR_PFX ' + d.querySelectorAll('[href^="http"]').length);// 1
  console.log('ATTR_SFX ' + d.querySelectorAll('[href$=".pdf"]').length);// 1
  console.log('ATTR_SUB ' + d.querySelectorAll('[class*="btn"]').length);// 1
  console.log('ATTR_WORD ' + d.querySelectorAll('[data-tags~="news"]').length); // 1
  console.log('ATTR_DASH ' + d.querySelectorAll('[lang|="en"]').length); // 1
  console.log('ATTR_HAS ' + d.querySelectorAll('[data-x]').length);      // 1

  // ---- structural pseudo-classes + An+B math -------------------------------
  console.log('EVEN ' + d.querySelectorAll('li:nth-child(2n)').length);  // 2 (i2,i4)
  console.log('ODD ' + d.querySelectorAll('li:nth-child(odd)').length);  // 2 (i1,i3)
  console.log('NB ' + d.querySelectorAll('li:nth-child(3n+1)').length);  // 2 (i1,i4)
  console.log('NOT ' + d.querySelectorAll('li:not(.skip)').length);      // 3
  console.log('FIRST ' + d.querySelector('li:first-child').id);          // i1
  console.log('LAST ' + d.querySelector('li:last-child').id);            // i4

  // ---- compound + selector list --------------------------------------------
  console.log('COMPOUND ' + d.querySelectorAll('a.btn[data-x="1"]').length); // 1
  console.log('LIST ' + d.querySelectorAll('h1, h2').length);            // 2
  console.log('LIST_ORDER ' + d.querySelector('h2, h1').id);             // t1 (document order)
  console.log('LIST_UNIQ ' + d.querySelectorAll('li.item, li.skip').length); // 4 (no dupes)

  // ---- matches() -----------------------------------------------------------
  var i2 = d.getElementById('i2');
  console.log('M_COMP ' + i2.matches('li.item.skip'));                   // true
  console.log('M_CHILD ' + i2.matches('ul > li'));                       // true
  console.log('M_FIRST ' + d.getElementById('i1').matches('li:first-child')); // true
  console.log('M_ATTR ' + d.getElementById('a1').matches('[href^="http"]'));  // true
  console.log('M_LIST ' + i2.matches('span, li'));                       // true
  console.log('M_NEG ' + i2.matches('li:first-child'));                  // false

  // ---- closest() -----------------------------------------------------------
  console.log('CL_UL ' + i2.closest('ul').id);                           // list
  console.log('CL_ROOT ' + d.getElementById('s1').closest('#root').id);  // root
</script>
</body>
</html>
