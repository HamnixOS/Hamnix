<!DOCTYPE html>
<html>
<head>
<style>
  .card   { border: 3px solid #c00; border-radius: 8px; background: #eef; width: 300px; }
  .named  { border: 2px solid teal; background: #fff; width: 300px; }
  .rgbbd  { border: 1px solid rgb(20, 120, 200); width: 300px; }
  .sepcol { border: 2px solid black; border-color: #33aa55; width: 300px; }
  .square { border: 2px solid #808080; background: #ffe; width: 300px; }
</style>
</head>
<body>
  <div class="card">rounded red bordered card on light-blue fill</div>
  <div class="named">named teal border</div>
  <div class="rgbbd">rgb() border colour</div>
  <div class="sepcol">border-color overrides shorthand colour</div>
  <div class="square">square grey border, no radius</div>
</body>
</html>
