<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ffffff; margin: 0; }
  /* Box A: DISTINCT per-side widths — thick (12px) left/right, thin (2px)
     top/bottom, all solid red. Proves true per-side widths. */
  .distinct {
    width: 240px;
    padding: 14px;
    background: #ffffff;
    border-top: 2px solid #cc0000;
    border-bottom: 2px solid #cc0000;
    border-left: 12px solid #cc0000;
    border-right: 12px solid #cc0000;
  }
  /* Box B: a single dashed side (bottom), the classic tab/underline. Solid on
     the other three so we can contrast dashed vs solid on ONE box. */
  .mixed {
    width: 240px;
    padding: 14px;
    background: #ffffff;
    border-top: 4px solid #0000cc;
    border-right: 4px solid #0000cc;
    border-left: 4px solid #0000cc;
    border-bottom: 6px dashed #0000cc;
  }
  /* Box C: uniform dashed shorthand — must render dashes, not a solid line. */
  .udash {
    width: 240px;
    padding: 14px;
    background: #ffffff;
    border: 3px dashed #008800;
  }
  /* Box D: border-width + border-style TRBL shorthands compose per side. */
  .shorthand {
    width: 240px;
    padding: 14px;
    background: #ffffff;
    border-color: #aa00aa;
    border-style: solid;
    border-width: 2px 10px 2px 10px;
  }
</style>
</head>
<body>
  <div class="distinct">Distinct per-side widths (thick sides, thin top/bottom).</div>
  <p>spacer one</p>
  <div class="mixed">Solid top/left/right, dashed bottom edge.</div>
  <p>spacer two</p>
  <div class="udash">Uniform dashed border shorthand.</div>
  <p>spacer three</p>
  <div class="shorthand">border-width TRBL shorthand: thick left/right.</div>
</body>
</html>
