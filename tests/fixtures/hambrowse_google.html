<html>
<head><title>Google</title></head>
<body>
<!--
  Representative of google.com's homepage CORE interaction: a GET form whose
  action is "/search" wrapping the query control (google now uses a <textarea
  name="q">, older markup used <input name="q">). The whole point of the page
  is: type a query -> submit -> the browser NAVIGATES to /search?q=<query>.

  google.com is JS-heavy and will never be pixel-parity in a native engine —
  this fixture pins the ONE thing that made it "not usable": that a submit
  produced "?q=cats" (re-loading the homepage) instead of "/search?q=cats"
  (the results page). A trivial <script> keeps a JS context live, matching the
  real page (which always ships script).
-->
<h1>Google</h1>
<form id="tsf" action="/search" method="get">
<textarea name="q" id="q">cats</textarea>
<input type="hidden" name="hl" value="en">
<input type="submit" name="btnK" value="Google Search">
<input type="submit" name="btnI" value="I'm Feeling Lucky">
</form>
<p id="status">ready</p>
<script>
  // Google always ships script; a no-op keeps the JS context live so the DOM
  // form controls are registered (mirrors the real page).
  document.getElementById('status').textContent = 'ready';
</script>
</body>
</html>
