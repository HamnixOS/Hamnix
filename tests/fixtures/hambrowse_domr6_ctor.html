<!DOCTYPE html>
<html><head><title>DOM R6 event ctors</title></head>
<body>
<div id="t1">event target</div>
<script>
  var t1 = document.getElementById('t1');
  var e1 = new Event('click', {bubbles:true, cancelable:true});
  console.log('EVT ' + e1.type + '|' + e1.bubbles + '|' + e1.cancelable);
  var ce = new CustomEvent('build', {detail: 42});
  console.log('CE ' + ce.type + '|' + ce.detail);
  t1.addEventListener('build', function(e){ console.log('CEFIRE ' + e.detail); });
  t1.dispatchEvent(new CustomEvent('build', {detail: 'hi'}));
  t1.addEventListener('save', function(e){ e.preventDefault(); });
  var pe = new Event('save', {cancelable:true});
  var ok = t1.dispatchEvent(pe);
  console.log('PD ' + ok + '|' + pe.defaultPrevented);
  var me = new MouseEvent('mousedown', {clientX: 10, clientY: 20, button: 1});
  console.log('ME ' + me.clientX + '|' + me.clientY + '|' + me.button);
  var ke = new KeyboardEvent('keydown', {key: 'Enter'});
  console.log('KE ' + ke.type + '|' + ke.key);
</script>
</body></html>
