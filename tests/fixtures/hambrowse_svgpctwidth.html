<html>
<head><title>Inline &lt;svg&gt; percentage-width sizing</title>
<style>
  /* Element selector matching EVERY inline <svg> — real pages (google) ship
     `svg{width:100%;height:100%}` intending it to fill a small sized parent.
     Our engine resolves the % against the PAGE width, so a replaced <svg> with
     its own intrinsic box must DECLINE this % width instead of ballooning. */
  svg { width: 100%; height: 100%; }
  /* A FIXED-length CSS size is a real pin and MUST still upscale the viewBox. */
  .big { width: 300px; height: 200px; }
</style>
</head>
<body>
<p>Icon before.</p>
<!-- viewBox-only 24x24 icon: % width must be declined -> stays 24x24. -->
<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" fill="#dc2828"/></svg>
<p>Icon middle.</p>
<!-- explicit 24x24 attrs + big viewBox: % declined, attr box wins -> 24x24. -->
<svg width="24" height="24" viewBox="0 -960 960 960"><rect x="0" y="-960" width="960" height="960" fill="#28c83c"/></svg>
<p>Icon after.</p>
<!-- fixed-length CSS 300x200 (NOT a percentage) still upscales the viewBox. -->
<svg class="big" viewBox="0 0 24 24"><rect x="0" y="0" width="24" height="24" fill="#325adc"/></svg>
<p>Icon unsized.</p>
<!-- LARGE viewBox, NO width/height attr, NO fixed CSS px (only the global
     svg{width:100%} which is declined): a Material-icon idiom. Its 960-unit
     viewBox is user space, NOT pixels — it must FALL BACK to a sane inline icon
     default (24x24), never balloon to 960/the content column and never shrink
     to 0/vanish (the "missing magnifier" regression). -->
<svg viewBox="0 -960 960 960"><rect x="0" y="-960" width="960" height="960" fill="#f0a028"/></svg>
<p>Tail.</p>
</body>
</html>
