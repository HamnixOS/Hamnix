<!DOCTYPE html>
<html>
<head>
<style>
/* A google-style search-box cluster: a flex row holding a field plus a set of
   controls on the right. Two of those controls are graphical <button>s:
     - an ICON-ONLY, aria-labelled button (voice search) — its accessible name
       lives in aria-label, its face is an <svg> glyph, and it has NO text. It
       must NOT paint a stray "Button" placeholder label.
     - an ICON+TEXT "AI Mode" chip button. As a flex item it used to take the
       block-CTA path, where its <svg> icons leaked as flow and the box grew
       several rows tall. It must render as ONE compact [ AI Mode ] button seg. */
.row  { display: flex; min-height: 50px; border: 1px solid #dadce0;
        border-radius: 26px; }
.chip { align-self: center; background: inherit; border: 1px solid #333;
        border-radius: 100px; }
</style>
</head>
<body>
<div class="row">
<textarea rows="1"></textarea>
<div class="cluster">
<div role="button" aria-label="Search by voice">
<svg viewBox="0 0 24 24"><path d="M1 2 3 4"></path></svg>
</div>
<button class="voice" aria-label="Search by image" type="button">
<svg viewBox="0 0 24 24"><path d="M5 6 7 8"></path></svg>
</button>
<button class="chip" role="link" type="button">
<span class="ic"><svg viewBox="0 0 24 24"><g><rect height="24" width="24"></rect></g><path d="M1 2"></path></svg></span>
<span class="lbl">AI Mode</span>
<span class="ic"><svg viewBox="0 0 24 24"><path d="M3 4"></path></svg></span>
</button>
</div>
</div>
<!-- A genuinely empty push-button (no value, no aria-label, no icon) still
     falls back to a visible "Button" affordance — that behaviour is preserved. -->
<input type="button">
</body>
</html>
