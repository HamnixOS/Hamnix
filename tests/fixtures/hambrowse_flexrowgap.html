<!DOCTYPE html>
<html>
<head>
<style>
  /* Two identical wrapping card grids that differ ONLY in row-gap, so the
     vertical offset of the wrapped (second) line isolates the row-gap effect. */
  .grid { display:flex; flex-wrap:wrap; }
  .card { width:160px; background:#eef3ff; color:#123; border:1px solid #99b; }
  /* control: column gap only, NO row-gap -> wrapped line sits directly below. */
  .tight { column-gap:16px; }
  /* row-gap 48px (== 3 rows at LINE_H=16) via the `gap: <row> <col>` shorthand. */
  .spaced { gap:48px 16px; }
</style>
</head>
<body>
<h2>Tight grid</h2>
<div class="grid tight">
  <div class="card">Alpha</div>
  <div class="card">Beta</div>
  <div class="card">Gamma</div>
  <div class="card">Delta</div>
  <div class="card">Epsilon</div>
</div>
<h2>Spaced grid</h2>
<div class="grid spaced">
  <div class="card">Uno</div>
  <div class="card">Dos</div>
  <div class="card">Tres</div>
  <div class="card">Cuatro</div>
  <div class="card">Cinco</div>
</div>
</body>
</html>
