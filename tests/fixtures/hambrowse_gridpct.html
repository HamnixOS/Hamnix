<html><body>
<!-- (a) three equal fr columns with a column-gap: items land in 3 aligned tracks -->
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;column-gap:24px">
<div style="background:#ff0000">Aaa</div><div style="background:#00cc00">Bbb</div><div style="background:#0000ff">Ccc</div>
</div>
<!-- (b) mixed 200px + 1fr: fixed rail beside a flexible column -->
<div style="display:grid;grid-template-columns:200px 1fr;column-gap:16px">
<div style="background:#ffaa00">Ddd</div><div style="background:#aa00ff">Eee</div>
</div>
<!-- (c) percentage tracks resolved against a NARROW nested container (300px),
     NOT the viewport: col2 must start at ~container/4, not viewport/4 -->
<div style="width:300px;background:#dddddd">
<div style="display:grid;grid-template-columns:25% 75%;column-gap:0">
<div style="background:#00cccc">Fff</div><div style="background:#cccc00">Ggg</div>
</div>
</div>
</body></html>
