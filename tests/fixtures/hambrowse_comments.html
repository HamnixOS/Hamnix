<!DOCTYPE html>
<html>
<head>
  <title>Comments Fixture</title>
  <!-- a comment in the head must not disturb the title or leak text -->
  <style>
    .lead { color: #008000; }
    /* stylesheet comments are handled by the CSS parser, not this rung */
  </style>
</head>
<body>
<h1>Comments Fixture</h1>
<p id="a" class="lead">Visible lead paragraph.</p>

<!-- A plain comment whose BODY contains markup and stray angle brackets:
     <script>document.getElementById('a').textContent='HACKED';
             document.title='EvilTitle';
             console.log('commented script executed');</script>
     a stray > and a stray < and a bogus <div> inside the comment. None of
     this may render as text nor execute as script. -->

<p>Between the two comments.</p>

<!--[if IE]><p>legacy IE-only conditional content</p><![endif]-->

<script>console.log('real script executed');</script>

<p>Final visible paragraph.</p>
</body>
</html>
