<!DOCTYPE html>
<html>
<head>
<style>
  /* Rendered at WIDTH=1200 (bw), default HEIGHT=600 (bh). A `%` inside a HEIGHT
     value resolves against the viewport height (bh=600), NOT the content-column
     width (~1184px) — this is the google-hero fix
     (`.LLD4me{height:calc(100% - 560px)}`). The host harness emits FILL spans in
     LINE_H rows (16px/row), so height rows = bot - top:

       height: calc(100% - 200px)  -> 400px -> 25 rows   (600 - 200)   [.hc]
       height: calc(100% - 450px)  -> 150px ->  9 rows   (600 - 450)   [.hc2]

     A regression that resolves the `%` against the WIDTH (1184) instead of the
     HEIGHT (600) — the pre-fix behaviour — would size .hc at 984px (61 rows)
     and fail this gate. */
  .hc  { background: #191919; height: calc(100% - 200px); }
  .hc2 { background: #2a2a2a; height: calc(100% - 450px); }
</style>
</head>
<body>
  <div class="hc">tall box</div>
  <div class="hc2">short box</div>
</body>
</html>
