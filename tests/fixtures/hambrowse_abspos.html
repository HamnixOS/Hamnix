<!DOCTYPE html>
<html>
<head>
<style>
.cont   { background: #dddddd; position: relative; width: 400px; height: 160px; }
.badge  { background: #ff0000; position: absolute; top: 8px; right: 8px; width: 90px; z-index: 2; }
.botbox { background: #00cc00; position: absolute; bottom: 8px; right: 8px; width: 90px; z-index: 2; }
.botL   { background: #ee00ee; position: absolute; bottom: 8px; left: 8px; width: 90px; z-index: 2; }
.tl     { background: #0000ee; position: absolute; top: 8px; left: 8px; width: 90px; z-index: 2; }
/* GRADIENT-backed containing block (no solid fill record): a right-anchored
   badge must still pin to the parent's top-RIGHT, not fall back to content-left. */
.gcont  { background: linear-gradient(to right, #ff0000, #0000ff); position: relative; width: 400px; height: 160px; }
.gbadge { background: #ff8800; position: absolute; top: 8px; right: 8px; width: 90px; z-index: 2; }
/* TRANSPARENT containing block (no background at all): the case the old
   paint-scan fix could NOT anchor — geometry-based CB edges fix it. */
.tcont  { position: relative; width: 400px; height: 160px; }
.tbadge { background: #ffaa00; position: absolute; top: 8px; right: 8px; width: 90px; z-index: 2; }
.after  { background: #00cccc; }
</style>
</head>
<body>
<div class="cont">
<div class="badge">TR</div>
<div class="botbox">BR</div>
<div class="botL">BL</div>
<div class="tl">TL</div>
</div>
<div class="gcont">
<div class="gbadge">GR</div>
</div>
<div class="tcont">
<div class="tbadge">XR</div>
</div>
<div class="after">heading below the card</div>
</body>
</html>
