<!DOCTYPE html>
<html>
<head>
<style>
.cont   { background: #dddddd; position: relative; width: 400px; height: 160px; }
.badge  { background: #ff0000; position: absolute; top: 8px; right: 8px; width: 90px; z-index: 2; }
.botbox { background: #00cc00; position: absolute; bottom: 8px; right: 8px; width: 90px; z-index: 2; }
.botL   { background: #ee00ee; position: absolute; bottom: 8px; left: 8px; width: 90px; z-index: 2; }
.tl     { background: #0000ee; position: absolute; top: 8px; left: 8px; width: 90px; z-index: 2; }
.after  { background: #00cccc; }
</style>
</head>
<body>
<div class="cont">
<div class="badge">TR</div>
<div class="botbox">BR</div>
<div class="botL">BL</div>
<div class="tl">TL</div>
</div>
<div class="after">heading below the card</div>
</body>
</html>
