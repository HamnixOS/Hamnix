<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ffffff; margin: 0; }
  /* Box A: FOUR distinct per-side colours via the border-<side>-color longhands
     (each side 8px solid so a pixel deep in the band samples cleanly). Proves
     border-top/-right/-bottom/-left-color paint independently — W3C §4. */
  .fourcol {
    width: 240px;
    padding: 16px;
    background: #ffffff;
    border-top: 8px solid #cc0000;
    border-right: 8px solid #00aa00;
    border-bottom: 8px solid #0000cc;
    border-left: 8px solid #ccaa00;
  }
  /* Box B: the border-color TRBL SHORTHAND (four colours) over a uniform
     border-width/border-style. red / green / blue / yellow -> T/R/B/L. */
  .shortcol {
    width: 240px;
    padding: 16px;
    background: #ffffff;
    border-width: 8px;
    border-style: solid;
    border-color: #dd1111 #11bb22 #1133dd #ddbb22;
  }
  /* Box C: a single coloured ACCENT side over a uniform base — top/left/right
     stay the uniform grey, only the bottom is the accent colour. Proves an
     unset side falls back to the uniform colour while the set side is distinct. */
  .accent {
    width: 240px;
    padding: 16px;
    background: #ffffff;
    border-width: 8px;
    border-style: solid;
    border-color: #999999;
    border-bottom-color: #e91e63;
  }
</style>
</head>
<body>
  <div class="fourcol">Four distinct per-side border colours.</div>
  <p>spacer one</p>
  <div class="shortcol">border-color TRBL shorthand: four colours.</div>
  <p>spacer two</p>
  <div class="accent">Single coloured accent side (bottom) over a grey base.</div>
</body>
</html>
