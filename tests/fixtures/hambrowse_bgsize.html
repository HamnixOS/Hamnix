<!DOCTYPE html>
<html>
<head>
<style>
  /* A wide (2:1) solid-red image placed/sized/tiled four different ways. Each
     box shows the WHITE page background wherever the image does not reach, so a
     probe can read the placement geometry from the red-vs-white boundary. */
  .cover   { background-image: url(hb_bgsize_red.png); background-size: cover;
             height: 100px; }
  .contain { background-image: url(hb_bgsize_red.png); background-size: contain;
             background-repeat: no-repeat; height: 100px; }
  .center  { background-image: url(hb_bgsize_red.png);
             background-repeat: no-repeat; background-position: center;
             height: 100px; }
  .repx    { background-image: url(hb_bgsize_red.png);
             background-repeat: repeat-x; height: 100px; }
</style>
</head>
<body>
  <!-- decode the image into the shared store (background url() reuses it). -->
  <img src="hb_bgsize_red.png" width="8" height="4">
  <div class="cover">cover</div>
  <div class="contain">contain</div>
  <div class="center">center</div>
  <div class="repx">repeatx</div>
</body>
</html>
