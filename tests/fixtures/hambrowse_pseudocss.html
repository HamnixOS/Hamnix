<!DOCTYPE html>
<html>
<head>
<style>
  /* :root matches the <html> element only (used here as a descendant
     ancestor); div:root must never match. */
  :root .rk   { background:#a0b0c0; }
  div:root    { background:#ff0000; }

  /* Boolean-attribute state pseudo-classes (the cascade keys on the presence
     of the attribute at an attribute-name boundary). */
  .st:checked  { background:#11aa22; }
  .st:disabled { background:#334455; }
  .st:required { background:#cc7700; }

  /* :disabled / :enabled on a real form control (fieldset renders a box whose
     background shows on its child). */
  fieldset:disabled { background:#225566; }
  fieldset:enabled  { background:#44aa88; }

  /* :nth-child(even|odd) zebra striping + :first-child. */
  .zebra li:nth-child(even) { background:#222222; }
  .zebra li:nth-child(odd)  { background:#eeeeee; }
  .fc li:first-child        { background:#f0f0f0; }

  /* Dynamic states are inert in a static render (never match). */
  a.hv:hover  { background:#ff00ff; }
  p.tg:target { background:#00ffff; }
</style>
</head>
<body>
  <div class="rk">under root box</div>

  <div class="st" checked>chk div</div>
  <div class="st" disabled>dis div</div>
  <div class="st" required>req div</div>
  <div class="st">plain div</div>
  <div class="st" data-checked="x">datacheck div</div>
  <div class="st" title="checked yes">quoted checked div</div>

  <fieldset disabled><span>fs disabled child</span></fieldset>
  <fieldset><span>fs enabled child</span></fieldset>

  <ul class="zebra"><li>z1</li><li>z2</li><li>z3</li><li>z4</li></ul>
  <ul class="fc"><li>f1</li><li>f2</li><li>f3</li></ul>

  <a class="hv" href="#x">hover link</a>
  <p class="tg">target para</p>
</body>
</html>
