<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; font-family:"DejaVu Sans", sans-serif; color:#202124; }
  /* A styled inline-block box: border + radius + padding + fixed width + bg.
     Must paint a REAL bordered, rounded, filled box (a search box / CTA / badge),
     not raw text. */
  .sbox { display:inline-block; border:1px solid #dfe1e5; border-radius:16px;
          padding:6px 14px; width:200px; background:#ffffff; }
  /* Inline (NOT inline-block) tabs with a right margin: must render SPACED,
     not glued (AllNewsMaps). */
  .tabs span { margin-right:20px; color:#5f6368; }
</style>
</head>
<body>
<div class="wrap"><span class="sbox">query text</span></div>
<div class="tabs"><span>All</span><span>News</span><span>Maps</span></div>
</body>
</html>
