<!DOCTYPE html>
<html>
<head>
<style>
  /* Replaced-element sizing: object-fit + object-position on an <img>, plus
     aspect-ratio on a block and text-overflow:ellipsis on a nowrap block. The
     image is a 40x20 (2:1) bitmap: LEFT half green, RIGHT half red. The page
     background is white, so letterbox bars (contain) read as white pixels. */
  .cover   { object-fit: cover; }
  .contain { object-fit: contain; }
  .noleft  { object-fit: none; object-position: left top; }
  .noright { object-fit: none; object-position: right top; }
  /* aspect-ratio: a 200px-wide, height-auto box must lay out 100px tall — i.e.
     to the SAME box height as an explicit height:100px reference of equal width
     (the engine renders a CSS 100px height to a fixed row-quantised span). */
  .ar      { width: 200px; aspect-ratio: 2 / 1; background: #c00000; }
  .arref   { width: 200px; height: 100px; background: #00a000; }
  /* single-line ellipsis idiom. */
  .ell     { width: 40px; overflow: hidden; white-space: nowrap;
             text-overflow: ellipsis; background: #dddddd; }
</style>
</head>
<body>
  <img class="cover"   src="hb_objfit.png" width="40" height="40">
  <img class="contain" src="hb_objfit.png" width="40" height="40">
  <img class="noleft"  src="hb_objfit.png" width="20" height="20">
  <img class="noright" src="hb_objfit.png" width="20" height="20">
  <div class="ar">ar</div>
  <div class="arref">ref</div>
  <div class="ell">SUPERCALIFRAGILISTICEXPIALIDOCIOUS</div>
</body>
</html>
