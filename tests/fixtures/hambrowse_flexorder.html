<!DOCTYPE html>
<html>
<head>
<style>
  /* (A) CSS `order` reorders flex items visually without touching source order.
     Source order is Aaa, Bbb, Ccc; `order` should paint them Bbb, Ccc, Aaa. */
  .orow { display:flex; justify-content:flex-start; gap:10px; background:#eef; }
  .oa { order:3; background:#fcc; }
  .ob { order:1; background:#cfc; }
  .oc { order:2; background:#ccf; }

  /* (B) space-between BAR of two PADDED groups: the left group hugs the left
     edge, the right group hugs the right edge, on the SAME row. The 15px link
     padding is folded into each group's measured width so the two groups keep
     their distance and never stack. */
  .bar { display:flex; justify-content:space-between; background:#ddd; }
  .grp { display:flex; }
  .grp a { padding:15px; background:#cdf; }
</style>
</head>
<body>
<div class="orow"><div class="oa">Aaa</div><div class="ob">Bbb</div><div class="oc">Ccc</div></div>

<div class="bar">
  <div class="grp"><a>Advertising</a><a>Business</a><a>HowSearch</a></div>
  <div class="grp"><a>Privacy</a><a>Terms</a><a>Settings</a></div>
</div>
</body>
</html>
