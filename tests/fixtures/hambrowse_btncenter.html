<!DOCTYPE html>
<html>
<head>
<style>
/* Google's "AI Mode" pill ships `background:inherit` on the <button> and lets a
   descendant fill-layer paint the visible light-grey — a paint our engine does
   not composite. The button therefore has NO own background winner and MUST
   fall back to the UA push-button grey face (#e0e3e7), NOT let the coloured
   container it sits on show through as a transparent-looking pill. */
.bar    { background:#3366cc; padding:12px; }
.inhbtn { background:inherit; border-radius:100px; }

/* A submit button taller than one text row: its label must sit VERTICALLY
   CENTRED in the box, not ride high hugging the top edge. */
.tall   { height:44px; }
</style>
</head>
<body>
<div class="bar">
<button class="inhbtn">AI Mode</button>
</div>
<p>
<input type="submit" class="tall" value="Centered">
</p>
</body>
</html>
