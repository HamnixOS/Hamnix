<!DOCTYPE html>
<html>
<head>
<style>
  /* A clipped viewport: a short box (height 48px = 3 rows) whose child is far
     taller (6 lines). overflow:hidden must clip the child to the box's edge, so
     only the first 3 lines survive; lines 4-6 are removed. */
  .clip   { background: #eeeeee; overflow: hidden; height: 48px; width: 200px; }
  .child  { background: #3366cc; }
  /* A scroll container: identical clip, different overflow keyword. */
  .scroll { background: #dddddd; overflow: auto;   height: 48px; width: 200px; }
  .tall   { background: #cc4433; }
  /* An UNCLIPPED control: same oversized child, overflow left visible — its
     child's full height (all 6 lines) must survive. */
  .vis    { background: #eeffee; overflow: visible; height: 48px; width: 200px; }
  .child2 { background: #33aa66; }
  /* Horizontal clip: a nowrap line far wider than the box, truncated at the
     box's right edge (overflow-x hidden). */
  .hclip  { background: #ffddaa; overflow: hidden; width: 160px; white-space: nowrap; }
</style>
</head>
<body>
<div class="clip"><div class="child">CkeepA<br>CkeepB<br>CkeepC<br>CgoneD<br>CgoneE<br>CgoneF</div></div>
<div class="scroll"><div class="tall">SkeepA<br>SkeepB<br>SkeepC<br>SgoneD<br>SgoneE<br>SgoneF</div></div>
<div class="vis"><div class="child2">VkeepA<br>VkeepB<br>VkeepC<br>VkeepD<br>VkeepE<br>VkeepF</div></div>
<div class="hclip">Nowrapfront must survive but Nowraptail is cut off past the right edge here.</div>
<p>After the boxes.</p>
</body>
</html>
