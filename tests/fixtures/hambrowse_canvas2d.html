<!DOCTYPE html>
<html>
<head><title>canvas2d core</title></head>
<body>
<p>Canvas 2D core: rects, path fill, text, drawImage.</p>
<canvas id="c" width="200" height="150"></canvas>
<canvas id="spr" width="20" height="20"></canvas>
<script>
// Offscreen sprite: a magenta 20x20 tile with a cyan 10x10 top-left marker,
// used as a drawImage() source (a <canvas> is a CanvasImageSource).
var s = document.getElementById('spr').getContext('2d');
s.fillStyle = '#ff00ff';
s.fillRect(0, 0, 20, 20);
s.fillStyle = '#00ffff';
s.fillRect(0, 0, 10, 10);

var ctx = document.getElementById('c').getContext('2d');
// opaque white page-cover so untouched cells read white
ctx.fillStyle = 'white';
ctx.fillRect(0, 0, 200, 150);
// a red fillRect square at a known origin
ctx.fillStyle = '#ff0000';
ctx.fillRect(20, 20, 30, 30);
// a blue stroked rectangle (lineWidth 4)
ctx.strokeStyle = 'blue';
ctx.lineWidth = 4;
ctx.strokeRect(70, 20, 40, 30);
// a filled green triangle via a path
ctx.fillStyle = '#008000';
ctx.beginPath();
ctx.moveTo(140, 20);
ctx.lineTo(180, 20);
ctx.lineTo(160, 60);
ctx.closePath();
ctx.fill();
// a purple rectangle added as a PATH via ctx.rect() then filled
ctx.fillStyle = '#800080';
ctx.beginPath();
ctx.rect(20, 115, 25, 20);
ctx.fill();
// anti-aliased black text
ctx.fillStyle = '#000000';
ctx.font = '16px sans-serif';
ctx.fillText('Hi', 20, 100);
// drawImage the sprite scaled 20x20 -> 40x40 at dest (100,90). The cyan marker
// (src 0..10) scales to dest 0..20 -> page-relative (100..120, 90..110); the
// magenta body fills the rest of dest (100..140, 90..130).
var spr = document.getElementById('spr');
ctx.drawImage(spr, 100, 90, 40, 40);
</script>
</body>
</html>
