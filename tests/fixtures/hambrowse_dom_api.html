<html>
<head><title>DOM API</title></head>
<body>
<h1>DOM</h1>
<p id="status">pending</p>
<ul id="list">
  <li class="item first" data-id="10" data-role="lead">Alpha</li>
  <li class="item" data-id="20">Beta</li>
  <li class="item last" data-id="30">Gamma</li>
</ul>
<button id="go" type="button">Go</button>
<div id="box" class="panel"></div>

<script>
  // querySelectorAll -> a NodeList with .length, indexing, and forEach
  var items = document.querySelectorAll('.item');
  console.log("qsa " + items.length);              // qsa 3
  var joined = "";
  items.forEach(function (el) { joined += el.textContent; });
  console.log("each " + joined);                    // each AlphaBetaGamma

  // getElementsByTagName / getElementsByClassName
  console.log("tag " + document.getElementsByTagName('li').length);  // tag 3
  console.log("cls " + document.getElementsByClassName('item')[1].textContent); // cls Beta

  // attribute selector + compound tag.class
  console.log("attr " + document.querySelectorAll('[data-role]').length); // attr 1
  console.log("comp " + document.querySelector('li.last').textContent);   // comp Gamma

  // element-scoped query (subtree only)
  var list = document.getElementById('list');
  console.log("scoped " + list.querySelectorAll('.item').length);   // scoped 3

  // dataset (camelCased data-* attributes)
  var lead = document.querySelector('.first');
  console.log("data " + lead.dataset.id + "/" + lead.dataset.role);  // data 10/lead

  // hasAttribute / removeAttribute
  console.log("has " + lead.hasAttribute('data-id') + lead.hasAttribute('nope')); // has truefalse

  // classList still works alongside the new surface
  var box = document.getElementById('box');
  box.classList.add('active');
  console.log("clist " + box.classList.contains('active'));  // clist true

  // addEventListener + dispatchEvent + event.target, then removeEventListener
  var go = document.getElementById('go');
  var hits = 0;
  var onclick = function (e) { hits += 1; };
  go.addEventListener('click', onclick);
  var ev = {type: 'click'};
  go.dispatchEvent(ev);
  go.dispatchEvent(ev);
  go.removeEventListener('click', onclick);
  go.dispatchEvent(ev);                              // no longer counted
  console.log("evt " + hits);                        // evt 2

  // cloneNode
  var clone = lead.cloneNode(true);
  console.log("clone " + clone.tagName + " " + clone.textContent);  // clone li Alpha (tagName is source-preserved)

  // DOM mutation that MUST show in the render: rewrite the status text.
  document.querySelector('#status').textContent = "DOM-OK";
</script>
</body>
</html>
