<!DOCTYPE html>
<html><head><title>DOM2</title>
<style>
  .warn { color: #ff0000; font-weight: bold; }
</style></head>
<body>
<div id="host"><span>old inner</span></div>
<p id="styled">style me</p>
<p id="classy" class="orig">class target</p>
<ul id="list"><li>first</li></ul>
<p class="warn">warn para</p>
<p id="attr" data-role="banner">attr target</p>
<script>
  document.getElementById('host').innerHTML = '<b>bold new</b> and text';
  var s = document.getElementById('styled').style;
  s.backgroundColor = '#ffff00';
  s.fontWeight = 'bold';
  s.textAlign = 'center';
  document.getElementById('classy').className = 'warn';
  var li = document.createElement('li');
  li.textContent = 'appended item';
  li.style.color = 'green';
  document.getElementById('list').appendChild(li);
  var q = document.querySelector('.warn');
  console.log('querySelector .warn text = ' + q.textContent);
  console.log('getAttribute data-role = ' + document.getElementById('attr').getAttribute('data-role'));
  document.getElementById('attr').setAttribute('class', 'warn');
</script>
</body></html>
