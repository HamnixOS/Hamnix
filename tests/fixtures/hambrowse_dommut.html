<html>
<head><title>DOM Mutation</title></head>
<body>
<ul id="list">
  <li class="row">Alpha</li>
  <li class="row">Beta</li>
  <li class="row">Gamma</li>
  <li class="row">Delta</li>
  <li class="row">Epsilon</li>
</ul>
<p id="status">mut-pending</p>

<script>
  // Each console.log line packs several assertions to stay under the capture cap.

  // ---- node identity: nodeType / nodeName / nodeValue ------------------
  var list = document.getElementById('list');
  var first = list.firstElementChild;                       // <li>Alpha</li>
  // element nodeType 1, nodeName == tagName (uppercase); document nodeType 9.
  console.log("nid " + list.nodeType + " " + first.nodeName + " " + document.nodeType); // nid 1 LI 9
  // a created text node reports nodeType 3, nodeName #text, nodeValue == data.
  var tn = document.createTextNode('hello');
  console.log("text " + tn.nodeType + " " + tn.nodeName + " " + tn.nodeValue); // text 3 #text hello
  // element nodeValue is null (renders as the string 'null' via concat).
  console.log("nval " + first.nodeValue); // nval null

  // ---- lastChild / previousSibling aliases -----------------------------
  console.log("alias " + list.lastChild.textContent \
              + " " + list.lastElementChild.previousSibling.textContent); // alias Epsilon Delta

  // ---- :nth-child(An+B) / even / odd -----------------------------------
  // odd = 1,3,5 -> Alpha Gamma Epsilon ; even = 2,4 -> Beta Delta.
  console.log("odd " + document.querySelectorAll('#list li:nth-child(odd)').length \
              + " even " + document.querySelectorAll('#list li:nth-child(even)').length); // odd 3 even 2
  // 2n+1 == odd (3) ; 3n == 3rd,(6th absent) -> just Gamma (1) ; n+3 -> 3,4,5 (3).
  console.log("anb " + document.querySelectorAll('#list li:nth-child(2n+1)').length \
              + " " + document.querySelectorAll('#list li:nth-child(3n)').length \
              + " " + document.querySelectorAll('#list li:nth-child(n+3)').length); // anb 3 1 3
  // -n+2 selects the first two -> Alpha Beta (2).
  console.log("negn " + document.querySelectorAll('#list li:nth-child(-n+2)').length); // negn 2

  // ---- insertBefore keeps the live .children in sync -------------------
  // (appendChild/insertBefore/replaceChild/removeChild relocate CREATED nodes;
  // a created <li> mounted before a source ref proves the array + parentNode.)
  var ins = document.createElement('li');
  ins.textContent = 'Inserted';
  list.insertBefore(ins, list.firstElementChild);           // before Alpha
  console.log("ins " + list.children.length + " " + list.children[0].textContent \
              + " " + ins.parentNode.tagName); // ins 6 Inserted UL

  // ---- replaceChild swaps a node in place ------------------------------
  var rep = document.createElement('li');
  rep.textContent = 'Replaced';
  // children: [Inserted, Alpha, Beta, Gamma, Delta, Epsilon]; swap the created
  // 'Inserted' for 'Replaced' at the same index; returns the old node.
  var old = list.replaceChild(rep, ins);
  console.log("rep " + list.children.length + " " + list.children[0].textContent \
              + " " + rep.parentNode.tagName + " " + old.textContent); // rep 6 Replaced UL Inserted

  // ---- removeChild drops from the live .children -----------------------
  list.removeChild(rep);                                    // drop the created node
  console.log("del " + list.children.length + " " + list.children[0].textContent); // del 5 Alpha

  // a mutation whose text is derived from the tree, baked into the render.
  var st = document.getElementById('status');
  st.textContent = st.nodeName + "-MUT-OK";                 // P-MUT-OK (renders)
</script>
</body>
</html>
