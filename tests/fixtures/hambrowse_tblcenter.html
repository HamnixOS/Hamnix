<!DOCTYPE html>
<html><head><title>margin:auto / align=center centre a fixed-width table like &lt;center&gt; (HN/forum centred-layout gutter)</title></head>
<body style="margin:0">
<!-- 1. CSS margin:0 auto on a 85% table => centred (GREEN title cell) -->
<table width="85%" border="0" cellpadding="0" cellspacing="0" style="margin:0 auto">
<tr><td align="right" valign="top"><span>1.</span></td><td bgcolor="#00cc00"><a href="x">Native browsers are back on the desktop and this is a long story title</a></td></tr>
</table>
<!-- 2. presentational align="center" on a 85% table => centred (BLUE title cell) -->
<table width="85%" border="0" cellpadding="0" cellspacing="0" align="center">
<tr><td align="right" valign="top"><span>2.</span></td><td bgcolor="#0000cc"><a href="x">Native browsers are back on the desktop and this is a long story title</a></td></tr>
</table>
<!-- 3. CONTROL: a plain 85% table (no centring) => stays LEFT (RED title cell) -->
<table width="85%" border="0" cellpadding="0" cellspacing="0">
<tr><td align="right" valign="top"><span>3.</span></td><td bgcolor="#cc0000"><a href="x">Native browsers are back on the desktop and this is a long story title</a></td></tr>
</table>
<!-- 4. CONTROL: width:100% + margin:auto => must still FILL, not centre (YELLOW cell) -->
<table width="100%" border="0" cellpadding="0" cellspacing="0" style="margin:0 auto">
<tr><td bgcolor="#cccc00"><a href="x">A full-width nav bar spanning the whole viewport width must not be centred</a></td></tr>
</table>
</body></html>
