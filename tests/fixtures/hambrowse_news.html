<html>
<head><title>The Daily</title></head>
<body>
<nav class="gb" data-track="nav">
  <a class="gb-link" href="/" data-id="home">Home</a>
  <a class="gb-link" href="/world" data-id="world">World</a>
  <a class="gb-link active" href="/tech" data-id="tech">Tech</a>
</nav>
<main>
  <article class="post" data-post-id="4471">
    <h2 class="post-title">Native browsers are back</h2>
    <p class="byline">by staff</p>
    <p>Body paragraph one.</p>
    <p>Body paragraph two.</p>
  </article>
</main>
<footer id="ft">(c) The Daily</footer>

<script>
  // gbar/analytics SHAPE: iterate links, wire click tracking, read data-*.
  // Before DOM completeness this threw "cannot read property of null" because
  // querySelectorAll / dataset / forEach did not exist.
  (function () {
    var links = document.querySelectorAll('nav.gb .gb-link');
    var ids = [];
    links.forEach(function (a) {
      ids.push(a.dataset.id);
      a.addEventListener('click', function (e) { e.preventDefault(); });
    });
    console.log("links " + links.length + " " + ids.join(","));

    // active nav item via compound selector
    var cur = document.querySelector('.gb-link.active');
    console.log("active " + cur.dataset.id);

    // article metadata + tag enumeration (getElementsByTagName)
    var post = document.getElementsByClassName('post')[0];
    console.log("post " + post.dataset.postId);
    var paras = post.getElementsByTagName('p');
    console.log("paras " + paras.length);

    // headline text + a class toggle (the "read" state a real site sets)
    var title = document.querySelector('.post-title');
    post.classList.add('seen');
    console.log("head " + title.textContent + " seen=" + post.classList.contains('seen'));

    // analytics ping serialised into the footer — a visible mutation.
    document.getElementById('ft').textContent = "loaded:" + ids.length;
  })();
</script>
</body>
</html>
