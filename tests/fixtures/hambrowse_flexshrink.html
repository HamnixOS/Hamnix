<!DOCTYPE html>
<html>
<head><title>flex-shrink resolved flexible lengths (overflow shrinkage)</title></head>
<body>
  <h1>flex-shrink distribution</h1>

  <!-- three flex-basis:300px items overflow an ~760px row and shrink EQUALLY
       (equal flex-shrink:1) to fit within the container -->
  <div style="display:flex">
    <div style="flex-basis:300px;flex-shrink:1;background:#aa1111">SEa</div>
    <div style="flex-basis:300px;flex-shrink:1;background:#22bb22">SEb</div>
    <div style="flex-basis:300px;flex-shrink:1;background:#3333cc">SEc</div>
  </div>

  <!-- a flex-shrink:0 item holds its 300px basis while its two shrinkable
       siblings absorb ALL of the overflow -->
  <div style="display:flex">
    <div style="flex-basis:300px;flex-shrink:0;background:#dd4444">S0f</div>
    <div style="flex-basis:300px;flex-shrink:1;background:#55ee55">S0a</div>
    <div style="flex-basis:300px;flex-shrink:1;background:#ee55ee">S0b</div>
  </div>

  <!-- mixed shrink factors: two 500px items overflow the ~800px row by 200px;
       flex-shrink:3 loses 3x the width of flex-shrink:1 (same 500px basis), so
       the 200px overflow splits 50/150 -> 450px vs 350px, the 3x item CLEARLY
       NARROWER. (500px, not 400px: 2*400 exactly fills an 800px container = no
       overflow to distribute.) -->
  <div style="display:flex">
    <div style="flex-basis:500px;flex-shrink:1;background:#661166">SMlo</div>
    <div style="flex-basis:500px;flex-shrink:3;background:#77dd77">SMhi</div>
  </div>
</body>
</html>
