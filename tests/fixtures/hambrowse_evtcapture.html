<!DOCTYPE html>
<html>
<head><title>Event Capture / Propagation</title></head>
<body>
<div id="outer">
  <div id="mid">
    <button id="btn">Click me</button>
  </div>
</div>
<div id="p1">
  <div id="p2"><span id="p3">x</span></div>
</div>
<div id="w1"><div id="w2"><b id="w3">y</b></div></div>
<div id="ph1"><i id="ph2">z</i></div>
<div id="rm1"><em id="rm2">r</em></div>

<script>
  var outer = document.getElementById('outer');
  var mid   = document.getElementById('mid');
  var btn   = document.getElementById('btn');

  // ---- (1) FULL three-phase order for a click on #btn.
  // capture: outer, mid (root->target's parent); target: btn fires both a
  // capture-registered AND a bubble-registered listener in REGISTRATION order;
  // bubble: mid, outer (target's parent->root). Packed into one accumulator so
  // the ORDER is a single readback: cO cM tA tB bM bO.
  var L = '';
  outer.addEventListener('click', function(e){ L += ' cO'; }, true);
  mid.addEventListener('click',   function(e){ L += ' cM'; }, true);
  btn.addEventListener('click',   function(e){ L += ' tA'; }, true);   // capture, but at-target
  btn.addEventListener('click',   function(e){ L += ' tB'; });          // bubble, at-target
  mid.addEventListener('click',   function(e){ L += ' bM'; });          // bubble
  outer.addEventListener('click', function(e){ L += ' bO'; });          // bubble
  btn.dispatchEvent({type:'click'});
  console.log('ORDER' + L);

  // ---- (2) eventPhase + currentTarget per hop for a #p3 click.
  // capture hop on #p1: eventPhase===1, currentTarget===p1, target===p3.
  // target hop on #p3: eventPhase===2. bubble hop on #p1: eventPhase===3.
  var p1 = document.getElementById('p1');
  var p3 = document.getElementById('p3');
  p1.addEventListener('click', function(e){
    console.log('CAP phase=' + e.eventPhase + ' ct=' + e.currentTarget.id + ' tg=' + e.target.id);
  }, true);
  p3.addEventListener('click', function(e){
    console.log('AT phase=' + e.eventPhase + ' ct=' + e.currentTarget.id);
  });
  p1.addEventListener('click', function(e){
    console.log('BUB phase=' + e.eventPhase + ' ct=' + e.currentTarget.id);
  });
  p3.dispatchEvent({type:'click'});

  // ---- (3) stopPropagation IN the capture phase halts before target.
  // A capture listener on #w1 stops; neither #w3 (target) nor any bubble hop runs.
  var w1 = document.getElementById('w1');
  var w3 = document.getElementById('w3');
  var W = '';
  w1.addEventListener('click', function(e){ W += 'C'; e.stopPropagation(); }, true);
  w3.addEventListener('click', function(e){ W += 'T'; });
  w1.addEventListener('click', function(e){ W += 'B'; });
  w3.dispatchEvent({type:'click'});
  console.log('WSTOP ' + W);

  // ---- (4) bubbles:false (new Event default) => NO bubble hop; capture+target
  // still run. A generic type through the string-typed table.
  var ph1 = document.getElementById('ph1');
  var ph2 = document.getElementById('ph2');
  var P = '';
  ph1.addEventListener('ping', function(e){ P += 'c'; }, true);   // capture -> runs
  ph2.addEventListener('ping', function(e){ P += 't'; });          // target -> runs
  ph1.addEventListener('ping', function(e){ P += 'b'; });          // bubble -> suppressed
  ph2.dispatchEvent(new Event('ping'));                            // bubbles:false
  console.log('NB ' + P);

  // ---- (5) removeEventListener drops a capture listener before dispatch.
  var rm1 = document.getElementById('rm1');
  var rm2 = document.getElementById('rm2');
  var R = '';
  var capH = function(e){ R += 'C'; };
  rm1.addEventListener('click', capH, true);
  rm1.addEventListener('click', function(e){ R += 'B'; });
  rm1.removeEventListener('click', capH, true);
  rm2.dispatchEvent({type:'click'});
  console.log('RM ' + R);
</script>
</body>
</html>
