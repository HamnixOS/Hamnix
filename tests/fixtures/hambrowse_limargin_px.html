<!-- Chrome-parity round 8: SUB-ROW list-item margin PIXEL height.
     The danluu-blog pattern `li{display:flex;margin:0 0 .9em}` (14px bottom
     margin) — a link/date index. Each item is one line; the authored .9em gap
     quantises to exactly ONE blank grid row. hambrowse used to draw that lone
     gap row at the full BODY_H (~19px) body line pitch, inflating every item
     ~5px over Chrome down a long list. The fix tags the gap row with its REAL
     px (14) so the pixel pass draws it at 14, matching Chrome's ~32px item
     pitch instead of ~38px.
     The `spaced` list below alternates a 19px content row with a 14px gap row;
     the `tight` control (margin:0) has NO gap row (all 19px). -->
<style>
d{width:4em}
ul{margin:0;padding:0;list-style:none}
.spaced li{display:flex;margin:0 0 .9em}
.tight  li{display:flex;margin:0}
</style>
