<!DOCTYPE html>
<html>
<head>
<style>
  /* Dashboard: 3 equal columns, THREE fixed-height rows, a hero that spans 2. */
  .dash { display:grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 96px 96px 96px; gap:10px; }
  .cell { background:#e8eefc; color:#123; border:1px solid #99b; }
  .hero { grid-column: span 2; background:#ffeeaa; }
  /* Banner shell: 4 columns, a banner placed on explicit lines 1 / 4 (span 3). */
  .shell2 { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; }
  .box    { background:#e8eefc; color:#123; }
  .banner { grid-column: 1 / 4; background:#ddffdd; }
</style>
</head>
<body>
<h2>Dashboard</h2>
<div class="dash">
  <div class="cell hero">Hero</div>
  <div class="cell">Bravo</div>
  <div class="cell">Charlie</div>
  <div class="cell">Delta</div>
  <div class="cell">Echo</div>
  <div class="cell">Foxtrot</div>
  <div class="cell">Golf</div>
</div>
<h2>Banner shell</h2>
<div class="shell2">
  <div class="box banner">Banner</div>
  <div class="box">Side</div>
  <div class="box">Body</div>
  <div class="box">Note</div>
  <div class="box">Tail</div>
</div>
</body>
</html>
