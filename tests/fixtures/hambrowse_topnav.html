<!doctype html>
<!-- hambrowse_topnav.html — regression fixture for the MASTHEAD / TOP-NAV guard
     on the app-shell landmark float (lib/web/dom/forms.ad _is_landmark_side +
     the g_header_depth guard in _handle_tag).

     A modern semantic page declares a <main> landmark, so the engine floats a
     preceding COMPLEMENTARY sidebar into a 240px left gutter (see
     hambrowse_appshell.html). But a pre-<main> <nav> is, on real sites, almost
     always a full-width horizontal TOP BAR — the site masthead or primary
     navigation — NOT a narrow side column. Its (usually external) CSS lays it
     across the top; absent that CSS it holds a big expanded menu. Floating THAT
     into a 240px gutter overlapped the article on every real doc/news page
     tested (MDN's reference mega-menu <nav>; BBC's section + region <nav>).

     Two masthead idioms that must NOT float, both exercised here:
       (1) a <nav> nested INSIDE the page <header> (MDN pattern), and
       (2) a top-level <nav> sibling that FOLLOWS </header> (BBC pattern).

     Both stay full-width in-flow blocks, so <main> renders at the content left
     edge (x0 = 8), NOT indented past a phantom 240px gutter, and is not
     overlapped by the menu. Assertions read STABLE POSFILL pixel rects, so a
     regression fails on the dev host with no QEMU boot. -->
<html>
<head><meta charset="utf-8"><title>top-nav</title></head>
<body>
<!-- (1) MASTHEAD: a <nav> inside <header>. #112233 background => one POSFILL
     rect. Must stay full-width (NOT a 240px float). -->
<header>
  <nav style="background:#112233">M1<br>M2<br>M3<br>M4</nav>
</header>
<!-- (2) PRIMARY NAV: a top-level <nav> after the header (BBC pattern). #223344
     background => one POSFILL rect. Must also stay full-width. -->
<nav style="background:#223344">P1<br>P2<br>P3<br>P4</nav>
<main>
  <!-- position:relative + a background => its own POSFILL rect (#abcdef). With
       no nav floated to a gutter, it renders at the content left edge (x0=8),
       NOT indented past a phantom 240px gutter. -->
  <div style="position:relative;background:#abcdef">MAINBOX</div>
</main>
</body>
</html>
