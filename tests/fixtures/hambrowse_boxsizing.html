<!DOCTYPE html>
<html>
<head>
<style>
  /* Two IDENTICAL boxes (width:200 padding:20 border:5) differing only in
     box-sizing. content-box: outer = 200 + 2*20 + 2*5 = 250. border-box:
     outer = 200 (content = 200 - 40 - 10 = 150). The declared props live in
     ONE rule here. */
  .cb { box-sizing: content-box; width: 200px; padding: 20px;
        border: 5px solid #cc0000; background: #eeeeff; }
  .bb { box-sizing: border-box;  width: 200px; padding: 20px;
        border: 5px solid #00aa00; background: #eeffee; }

  /* Split-rule reset: the ubiquitous `*{box-sizing:border-box}` sets the mode,
     width+padding+border come from a DIFFERENT rule. Must still reduce. */
  * { box-sizing: border-box; }
  .reset { width: 200px; padding: 20px; border: 5px solid #0000cc;
           background: #ffffee; }
  /* Control: same geometry but forced back to content-box overriding the *. */
  .resetcb { box-sizing: content-box; width: 200px; padding: 20px;
             border: 5px solid #aa00aa; background: #ffeeff; }

  /* Two border-box 50% items in a flex row line up without overflow. */
  .row  { display: flex; }
  .half { box-sizing: border-box; width: 50%; padding: 10px;
          border: 2px solid #333333; background: #ddeeff; }
</style>
</head>
<body>
  <div class="cb">content box two hundred</div>
  <div class="bb">border box two hundred</div>
  <div class="reset">reset border box</div>
  <div class="resetcb">reset forced content box</div>
  <div class="row">
    <div class="half">half A</div>
    <div class="half">half B</div>
  </div>
</body>
</html>
