<!DOCTYPE html>
<html>
<head>
<style>
  :root { --known:#0a0b0c; }
  /* var() fallback completeness: plain fallback, nested var() fallback,
     functional-colour fallback (rgb/hsl), the fallback ignored when the
     custom property IS defined, and a var() *inside* the fallback. */
  .a { background: var(--miss, #cc0000); }
  .b { background: var(--miss, var(--also, #00cc00)); }
  .c { background: var(--miss, rgb(10, 20, 30)); }
  .d { background: var(--known, #ffffff); }
  .e { background: var(--miss, hsl(120,100%,50%)); }
  .f { background: var(--miss, var(--known)); }
  /* no fallback + undefined => the declaration is dropped (the sibling wins). */
  .g { color: var(--miss); background:#334455; }
</style>
</head>
<body>
  <div class="a">a</div>
  <div class="b">b</div>
  <div class="c">c</div>
  <div class="d">d</div>
  <div class="e">e</div>
  <div class="f">f</div>
  <div class="g">g</div>
</body>
</html>
