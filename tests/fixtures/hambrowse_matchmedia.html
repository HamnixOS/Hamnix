<!DOCTYPE html>
<html>
<head><title>matchMedia</title></head>
<body>
<script>
  var mqBig = window.matchMedia('(min-width: 600px)');
  console.log('minw600 ' + mqBig.matches + ' media=' + mqBig.media);
  console.log('maxw500 ' + window.matchMedia('(max-width: 500px)').matches);
  console.log('bare ' + matchMedia('(min-width: 600px)').matches);
  console.log('range ' + matchMedia('(min-width: 600px) and (max-width: 900px)').matches);
  console.log('screen ' + matchMedia('screen and (min-width: 400px)').matches);
  console.log('print ' + matchMedia('print').matches);
  console.log('dark ' + matchMedia('(prefers-color-scheme: dark)').matches);
  console.log('light ' + matchMedia('(prefers-color-scheme: light)').matches);
  console.log('orient ' + matchMedia('(orientation: landscape)').matches);
  // listener registration is accepted (no-op in the static render) and must not throw
  var mql = matchMedia('(min-width: 700px)');
  var fired = false;
  mql.addEventListener('change', function(){ fired = true; });
  mql.addListener(function(){ fired = true; });
  console.log('listeners-ok ' + (mql.onchange === null) + ' fired=' + fired);
</script>
</body>
</html>
