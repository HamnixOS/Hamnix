<html>
<head><title>Required blocks submit</title></head>
<body>
<form id="f" action="/signup" method="POST">
  <input id="email" name="email" type="email" required value="">
  <input type="submit" value="Join">
</form>

<script>
  // A required, empty field must BLOCK submission: submit() fires but no
  // navigation happens (no NAV/BODY line). This is the login/signup guard.
  var f = document.getElementById('f');
  f.submit();
  console.log('AFTER-BLOCKED-SUBMIT ok');
</script>
</body>
</html>
