<!DOCTYPE html>
<html>
<head>
<style>
  .tall  { background: #ffcc00; height: 80px; }
  .floor { background: #00ccff; min-height: 64px; }
  .cap   { background: #ff8800; max-height: 32px; }
  .plain { background: #cccccc; }
</style>
</head>
<body>
<div class="tall">Tall box single line grows to eighty px.</div>
<div class="floor">Floor box single line floored to sixty four px.</div>
<div class="cap">Cap line1<br>Cap line2<br>Cap line3<br>Cap line4<br>Cap line5</div>
<div class="plain">Plain box stays one line tall.</div>
<p>After the boxes.</p>
</body>
</html>
