<!DOCTYPE html>
<html><head><style>
  /* minmax: a fixed-floor first rail (minmax(150px,1fr)) beside two fr tracks. */
  .mm    { display:grid; grid-template-columns: minmax(150px, 1fr) 1fr 1fr; }
  .mmc   { background:#eef; color:#123; }
  /* auto-fill: responsive columns sized by the container / min track width. */
  .af    { display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .afc   { background:#fee; color:#321; }
</style></head><body>
<h2>minmax</h2>
<div class="mm"><div class="mmc">Uno</div><div class="mmc">Dos</div><div class="mmc">Tres</div></div>
<h2>autofill</h2>
<div class="af"><div class="afc">Item1</div><div class="afc">Item2</div><div class="afc">Item3</div><div class="afc">Item4</div><div class="afc">Item5</div><div class="afc">Item6</div><div class="afc">Item7</div><div class="afc">Item8</div></div>
</body></html>
