<!DOCTYPE html>
<html>
<head>
<style>
  /* Each box is a solid colour of a known size, generously margined so its
     transformed quad never overlaps a neighbour. transform-origin defaults to
     the box centre (50% 50%), so scale/rotate pivot about the centre. The
     rotate box is deliberately WIDE so a 90deg turn makes it visibly TALL. */
  .base { width: 90px; height: 40px; margin: 90px 0 90px 70px; }
  #t { background: #ff0000; transform: translate(50px, 30px); }
  #s { background: #00cc00; transform: scale(2); }
  #r { width: 150px; background: #0000ff; transform: rotate(90deg); }
  #m { background: #cc00cc; transform: matrix(1, 0, 0, 1, 50, 30); }
</style>
</head>
<body>
  <div id="t" class="base">translate</div>
  <div id="s" class="base">scale</div>
  <div id="r" class="base">rotate</div>
  <div id="m" class="base">matrix</div>
</body>
</html>
