<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- A: <g translate> moves a rect. rect(0,0,20,20) -> device (40,40)-(60,60) -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="20" height="20" fill="#ff0000"/>
  </g>
  <!-- B: <g translate + scale(2)> composes. rect(0,0,10,10) -> (5,70)-(25,90) -->
  <g transform="translate(5,70) scale(2)">
    <rect x="0" y="0" width="10" height="10" fill="#00ff00"/>
  </g>
  <!-- C: shape-level rotate(90) about (50,25): vertical rect(45,10,10,30)
       becomes a horizontal bar x35..65 y20..30 -->
  <rect x="45" y="10" width="10" height="30" fill="#0000ff"
        transform="rotate(90 50 25)"/>
  <!-- D: shape-level matrix() pure translate. rect(0,0,15,15) -> (70,5)-(85,20) -->
  <rect x="0" y="0" width="15" height="15" fill="#ffa500"
        transform="matrix(1 0 0 1 70 5)"/>
  <!-- E: NESTED <g> transforms stack. translate(50,50) then translate(20,20):
       rect(0,0,8,8) -> device (70,70)-(78,78) -->
  <g transform="translate(50,50)">
    <g transform="translate(20,20)">
      <rect x="0" y="0" width="8" height="8" fill="#800080"/>
    </g>
  </g>
</svg>
