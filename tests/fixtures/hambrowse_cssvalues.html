<!DOCTYPE html>
<html>
<head>
<style>
  :root {
    --brand: #2255aa;
    --accent: hsl(120, 100%, 50%);
    --pad-w: 160px;
    --ink: rebeccapurple;
  }
  .hslbox   { background-color: hsl(120, 100%, 50%); }
  .hslatext { color: hsla(240, 100%, 50%, 0.4); }
  .tokbg    { background: var(--brand); }
  .toklen   { width: var(--pad-w); background-color: #123456; }
  .tokink   { color: var(--ink); }
  .fallback { background: var(--missing, #cc0000); }
  .calcbox  { width: calc(100px + 50px); background-color: #eeeeee; margin: 0 auto; }
  .calcpct  { width: calc(100% - 200px); background-color: #ff9900; }
  .rembox   { width: 10rem; background-color: #445566; }
  .hex8box  { background-color: #11223344; }
  .named    { background-color: steelblue; }
  .plainrow { background-color: #00ffcc; }
  /* CSS math functions: min()/max()/clamp() (incl. nested in calc()). */
  .minbox   { width: min(100%, 300px); background-color: #778899; }
  .maxbox   { width: max(200px, 40%);  background-color: #99aabb; }
  .clampbox { width: clamp(150px, 10%, 400px); background-color: #bbccdd; }
  .calcmin  { width: calc(min(100px, 50px) + 20px); background-color: #ddeeff; }
</style>
</head>
<body>
  <div class="hslbox">hsl green box</div>
  <p class="hslatext">hsla blue text</p>
  <div class="tokbg">brand token box</div>
  <div class="toklen">token length box</div>
  <p class="tokink">rebecca token text</p>
  <div class="fallback">fallback box</div>
  <div class="calcbox">calc sum box</div>
  <div class="calcpct">calc percent box</div>
  <div class="rembox">rem width box</div>
  <div class="hex8box">hex8 box</div>
  <div class="named">named steelblue box</div>
  <p class="plainrow">plain full-width row</p>
  <div class="minbox">min box</div>
  <div class="maxbox">max box</div>
  <div class="clampbox">clamp box</div>
  <div class="calcmin">calc min box</div>
</body>
</html>
