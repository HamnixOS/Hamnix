<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Flex item top-padding</title>
<style>
  body { font-family: "DejaVu Sans", sans-serif; margin:0; }
  .row  { display:flex; }
  /* control column: no top padding — its text sits at the container top row. */
  .base { width:200px; background:#eef; }
  /* padded column: 64px top padding (= 4 rows @ LINE_H 16) MUST inset its
     content DOWN from the shared flex cross-start, exactly like Chrome insets
     a `.main{padding:20px..}` docs column. Regression pin for the dropped
     flex-item padding-top bug. */
  .pad  { flex:1; padding:64px 24px; background:#fee; }
</style>
</head>
<body>
<div class="row">
  <div class="base">Baseline</div>
  <div class="pad">Inset</div>
</div>
</body>
</html>
