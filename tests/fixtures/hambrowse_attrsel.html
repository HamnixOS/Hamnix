<!DOCTYPE html>
<html>
<head>
<style>
  /* [attr] exists */
  a[data-active]        { background-color: #112233; }
  /* [attr=value] exact */
  div[data-role=hero]   { background-color: #445566; }
  /* [attr~=value] whitespace-token */
  p[data-tags~=news]    { color: #ff0000; }
  /* [attr^=value] prefix */
  div[data-x^=abc]      { background-color: #00aa00; }
  /* [attr$=value] suffix */
  div[data-y$=zzz]      { background-color: #0000ff; }
  /* [attr*=value] substring */
  div[data-z*=mid]      { background-color: #aa00aa; }
  /* [attr|=value] dash-match */
  p[lang|=en]           { color: #008080; }
  /* tag + attr combined, and specificity: attr adds a class weight */
  div[data-role=card]   { background-color: #123456; }
  .card                 { background-color: #eeeeee; }
  /* descendant combinator with attribute on ancestor */
  section[data-theme=dark] span { color: #ffaa00; }
</style>
</head>
<body>
  <a data-active href="#">active link</a>
  <a href="#">plain link no bg</a>
  <div data-role="hero">hero box</div>
  <div data-role="other">other box no bg</div>
  <p data-tags="sports news weather">tagged para red</p>
  <p data-tags="sportsnews">not tokenized para</p>
  <div data-x="abcdef">prefix box green</div>
  <div data-x="xabc">no prefix box</div>
  <div data-y="foozzz">suffix box blue</div>
  <div data-z="leftmidright">substr box magenta</div>
  <p lang="en-US">english dashmatch teal</p>
  <p lang="fr">french no color</p>
  <div class="card" data-role="card">specificity card box</div>
  <section data-theme="dark"><span>themed span orange</span></section>
</body>
</html>
