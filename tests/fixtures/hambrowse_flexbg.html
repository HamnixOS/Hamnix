<html><head></head><body>
<!-- (A) a display:flex nav bar with a dark background + light-text links: the
     container must paint its background BAND behind the items (the on-device
     "renders its links but not its background" defect). -->
<nav style="display:flex; justify-content:space-between; background:#333333">
<a href="#" style="color:#ffffff">Home</a>
<a href="#" style="color:#ffffff">About</a>
<a href="#" style="color:#ffffff">Contact</a>
</nav>
<!-- (B) a flex container whose ITEMS carry their OWN backgrounds: the container
     band (#446688) must paint BEHIND the red/green item chips, so all three
     colours are visible at once (container between the space-between chips). -->
<div style="display:flex; justify-content:space-between; background:#446688">
<div style="background:#cc0000">RED</div>
<div style="background:#00aa00">GRN</div>
</div>
<!-- (C) a grid container with a background: its band paints behind the cells. -->
<div style="display:grid; grid-template-columns:1fr 1fr; background:#224488">
<div>cell one</div><div>cell two</div>
</div>
</body></html>
