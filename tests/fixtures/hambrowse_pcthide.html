<!DOCTYPE html>
<html>
<head>
<style>
  /* Two real-page fidelity fixes exercised together (both from google.com):

     (1) BARE `height:100%` = AUTO (content-sized), NOT a viewport-height pin.
         A percentage height resolves against the containing block's height,
         which is INDEFINITE for the document flow chain, so per CSS 2.1 it
         computes to `auto`. Google's flex-column hero shell carries
         `height:100%`; the pre-fix engine pinned it to the viewport (bh) and
         PADDED ~37 blank rows above the logo/search hero. Here `.shell`
         wraps a single 32px (2-row) box, so with the fix `.shell` is 2 rows
         tall and the `.marker` box that follows sits at row ~2 — NOT shoved to
         row ~37 by a spurious 600px pin. `.shell` background fill height proves
         it: 2 rows (auto), not 37 (bh=600/16).

     (2) display:none SUBTREE with NESTED SAME-TAG children is FULLY skipped.
         The skip must count nesting depth: a hidden <div> whose subtree holds
         more <div>s (google's `display:none` "tools" popup) otherwise ended
         the skip at the FIRST inner </div>, leaking the rest of the popup
         (the "Create images"/"Canvas" chips) onto the page over the search box.
         `.menu` is display:none and holds nested <div>s + trailing text; NONE
         of HIDEONE / HIDETWO / HIDETAIL may appear as a laid-out SEG. */
  .shell  { background: #191919; height: 100%; }
  .inner  { background: #2a2a2a; height: 32px; }
  .marker { background: #3c3c3c; height: 16px; }
  .menu   { display: none; }
</style>
</head>
<body>
  <div class="shell"><div class="inner">inner box</div></div>
  <div class="marker">marker box</div>
  <div class="menu">
    <div>HIDEONE</div>
    <div><div>HIDETWO</div></div>
    HIDETAIL
  </div>
  <div>VISIBLEROW</div>
</body>
</html>
