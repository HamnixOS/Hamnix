<!DOCTYPE html>
<html>
<head>
<style>
  .hgrad { background: linear-gradient(to right, red, blue); height: 70px; }
  .vgrad { background: linear-gradient(to bottom, #00ff00, #000000); height: 70px; }
  .diag  { background-image: linear-gradient(135deg, red, yellow); height: 70px; }
  .three { background: linear-gradient(to right, red, lime, blue); height: 70px; }
  .rad   { background: radial-gradient(circle, white, black); height: 70px; }
</style>
</head>
<body>
  <div class="hgrad">horizontal</div>
  <div class="vgrad">vertical</div>
  <div class="diag">diagonal</div>
  <div class="three">three stops</div>
  <div class="rad">radial</div>
</body>
</html>
