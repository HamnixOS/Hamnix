<html>
<head><title>Event Dispatch</title></head>
<body>
<div id="outer">
  <div id="mid">
    <button id="btn">Click me</button>
  </div>
</div>
<p id="box">start</p>

<script>
  var btn = document.getElementById('btn');
  var mid = document.getElementById('mid');
  var outer = document.getElementById('outer');
  var box = document.getElementById('box');

  // ---- (1) fire order: two addEventListener handlers + one onclick property
  //          fire A,B,C in order, then the bubbled ancestor listener O. Packed
  //          into one accumulator so the fire ORDER is a single readback line.
  var L = '';
  btn.addEventListener('click', function(e){ L += 'A'; });
  btn.addEventListener('click', function(e){ L += 'B'; });
  btn.onclick = function(e){ L += 'C'; };
  outer.addEventListener('click', function(e){ L += 'O'; });

  // ---- (2) Event object props: type/target/currentTarget on the target and
  //          on the bubbled ancestor (currentTarget changes per level).
  btn.addEventListener('click', function(e){
    console.log('PROPS type=' + e.type + ' target=' + e.target.id + ' ctarget=' + e.currentTarget.id);
  });
  outer.addEventListener('click', function(e){
    console.log('BUB target=' + e.target.id + ' ctarget=' + e.currentTarget.id);
  });

  var ret1 = btn.dispatchEvent({type:'click'});
  console.log('SEQ1 ' + L);
  console.log('RET1 ' + ret1);

  // ---- (3) preventDefault -> dispatchEvent returns false + defaultPrevented.
  box.addEventListener('click', function(e){ e.preventDefault(); });
  var pev = {type:'click'};
  var pret = box.dispatchEvent(pev);
  console.log('PD ret=' + pret + ' dp=' + pev.defaultPrevented);

  // ---- (4) stopPropagation halts bubbling: dispatch on mid; mid stops, so the
  //          outer listeners must NOT run. S records who ran.
  var S = '';
  mid.addEventListener('click', function(e){ S += 'M'; e.stopPropagation(); });
  outer.addEventListener('click', function(e){ S += 'X'; });
  mid.dispatchEvent({type:'click'});
  console.log('STOP ' + S);

  // ---- (5) a handler mutating the DOM reflects in a subsequent re-render.
  box.addEventListener('click', function(e){ e.target.textContent = 'MUTATED-OK'; });
  box.dispatchEvent({type:'click'});
</script>
</body>
</html>
