<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ffffff; }
  /* stylesheet accent-color on a full range: fill should be RED */
  .redrng { accent-color: #dd2222; }
  /* stylesheet accent-color on a half progress: fill should be GREEN */
  .greenpr { accent-color: #22aa33; }
</style>
</head>
<body>
  <p><input type="range" class="redrng" min="0" max="100" value="100"> full red range</p>
  <p><progress class="greenpr" value="50" max="100">50%</progress> half green progress</p>
  <p><input type="range" min="0" max="100" value="50"> default blue range half</p>
  <p><progress style="accent-color:#ee8800" value="80" max="100">80%</progress> inline orange progress</p>
</body>
</html>
