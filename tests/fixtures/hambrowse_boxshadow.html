<!DOCTYPE html>
<html>
<head>
<style>
  body       { background: #ffffff; }
  /* opacity on a solid box: its fill composites at 50% over the white page
     (periwinkle), instead of rendering the fully-saturated blue. */
  .dim       { background: #3060c0; opacity: 0.5; width: 220px; }
  /* rgba() fill: 50%-alpha red over white must read PINK, not pure red. */
  .rgba      { background: rgba(255, 0, 0, 0.5); width: 220px; }
  /* box-shadow: a dark 30% drop shadow offset down/right of the card, feathered
     by the blur radius. The card fill is a light blue-grey so the grey shadow
     shows in the surrounding white margin. */
  .card      { background: #dfe6f5; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
               width: 220px; }
  .spacer    { background: #ffffff; width: 220px; }
</style>
</head>
<body>
  <div class="dim">opacity half blue</div>
  <p>gap</p>
  <div class="rgba">rgba half red</div>
  <p>gap</p>
  <div class="card">shadowed card</div>
  <div class="spacer">spacer below the shadowed card so the drop shadow lands on white paper and can be sampled</div>
</body>
</html>
