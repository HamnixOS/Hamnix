<!DOCTYPE html>
<html>
<head>
<style>
/* A real-site flex nav bar: left-aligned links + a right-aligned CTA <button>.
   The button must render a VISIBLE box (button-grey face + 1px border) with its
   "Sign up" label, at the right side — not vanish. */
nav    { display: flex; justify-content: space-between; background: #f5f6f8;
         padding: 10px; }
a      { color: #1155cc; }
</style>
</head>
<body>
<nav>
<a href="#">Home</a>
<a href="#">Docs</a>
<a href="#">Pricing</a>
<button>Sign up</button>
</nav>
</body>
</html>
