<!doctype html>
<!-- Regression fixture: inline runs INSIDE a table cell must FLOW proportionally,
     not overprint each other on the engine's 8px monospace grid. This reproduces
     the Hacker News top-nav ("Hacker News | new | past …") and the wrapped
     sitebit "(site.com)" defects: a bold/proportional run is WIDER than the grid
     columns it was wrapped on, so the following same-cell run used to paint back
     ON TOP of it. A cell-text pen guard (seg_cellx) now flows the next run past
     the previous run's real glyphs. The bold black word below is followed by a
     uniquely-coloured marker word; when the cell flows correctly the marker sits
     just PAST the bold word's real right edge, not overprinting its middle. -->
<html><body>
<table border="0" cellpadding="0" cellspacing="0"><tr>
<td><b>WWWWWWWWWWWW</b><span style="color:#e0115f">MARKER</span></td>
</tr></table>
</body></html>
