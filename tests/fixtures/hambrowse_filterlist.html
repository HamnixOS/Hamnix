<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #ffffff; }
  div.b { height: 60px; color: #ffffff; font-size: 14px; }
  /* CHAINED filter lists (>= 2 functions) must apply IN ORDER. */
  .chain   { background-color: #cc4422; filter: grayscale(100%) brightness(150%); }
  .chain2  { background-color: #6688aa; filter: sepia(100%) invert(100%); }
  /* hue-rotate: a NEW single function (real colour-matrix rotation). */
  .hue     { background-color: #cc0000; filter: hue-rotate(120deg); }
  /* single-function control: legacy path, byte-identical grayscale. */
  .single  { background-color: #cc4422; filter: grayscale(100%); }
  .plain   { background-color: #55dd77; }
</style>
</head>
<body>
  <div class="b chain">chain grayscale+brightness</div>
  <div class="b chain2">chain sepia+invert</div>
  <div class="b hue">hue-rotate 120</div>
  <div class="b single">single grayscale</div>
  <div class="b plain">no filter</div>
</body>
</html>
