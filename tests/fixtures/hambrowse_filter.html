<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #ffffff; }
  div.b {
    height: 60px;
    color: #ffffff;
    font-size: 14px;
  }
  /* Each box has a DISTINCTIVE solid background so a whole-image pixel scan can
     prove the original colour is gone and the filtered colour is present. */
  .grayscale { background-color: #cc4422; filter: grayscale(100%); }
  .brightness { background-color: #4c4c4c; filter: brightness(150%); }
  .invert    { background-color: #204060; filter: invert(100%); }
  .sepia     { background-color: #6688aa; filter: sepia(100%); }
  .contrast  { background-color: #909090; filter: contrast(200%); }
  .saturate  { background-color: #a06040; filter: saturate(200%); }
  .opacity   { background-color: #402010; filter: opacity(50%); }
  .blur      { background-color: #123456; filter: blur(4px); }
  .plain     { background-color: #55dd77; }
</style>
</head>
<body>
  <div class="b grayscale">grayscale</div>
  <div class="b brightness">brightness</div>
  <div class="b invert">invert</div>
  <div class="b sepia">sepia</div>
  <div class="b contrast">contrast</div>
  <div class="b saturate">saturate</div>
  <div class="b opacity">opacity</div>
  <div class="b blur">blur</div>
  <div class="b plain">no filter</div>
</body>
</html>
