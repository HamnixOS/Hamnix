<html>
<head><title>Programmatic Submit</title></head>
<body>
<form id="f" action="/search">
  <input id="q" name="q" type="text" value="">
  <input id="c1" name="agree" type="checkbox" value="yes" checked>
  <input id="c2" name="spam" type="checkbox" value="no">
  <input id="r1" name="plan" type="radio" value="free">
  <input id="r2" name="plan" type="radio" value="pro" checked>
  <select id="s" name="size">
    <option>small</option>
    <option selected>large</option>
  </select>
  <input type="submit" value="Go">
</form>

<script>
  var f = document.getElementById('f');
  var q = document.getElementById('q');

  // a submit listener that observes but does NOT cancel: navigation proceeds.
  f.addEventListener('submit', function(e){
    console.log('SUBMIT-EVT type=' + e.type + ' target=' + e.target.id);
  });

  // set the search text from JS (reserved chars must URL-encode), then submit.
  q.value = 'hello world&x';
  f.submit();
</script>
</body>
</html>
