<!DOCTYPE html>
<html>
<head>
<style>
  /* The canonical single-line truncation idiom: a narrow box that clips its
     overflow, never wraps, and renders a `…` (emitted as "...") at the cut so
     the reader knows the text continues. */
  .ell   { background: #ffddaa; overflow: hidden; width: 160px;
           white-space: nowrap; text-overflow: ellipsis; }
  /* Control: identical box but text-overflow:clip (the default) — a HARD cut at
     the box edge with NO ellipsis. */
  .clip  { background: #aaddff; overflow: hidden; width: 160px;
           white-space: nowrap; text-overflow: clip; }
  /* Default (text-overflow unspecified) must behave like clip. */
  .deflt { background: #ddffaa; overflow: hidden; width: 160px;
           white-space: nowrap; }
  /* A box wider than its content: nothing overflows, so NO ellipsis appears
     even though text-overflow:ellipsis is set. */
  .fits  { background: #ffaadd; overflow: hidden; width: 400px;
           white-space: nowrap; text-overflow: ellipsis; }
</style>
</head>
<body>
<div class="ell">Truncateme this label is far too long to fit inside the narrow box</div>
<div class="clip">Truncateme this label is far too long to fit inside the narrow box</div>
<div class="deflt">Truncateme this label is far too long to fit inside the narrow box</div>
<div class="fits">Short</div>
<p>After the boxes.</p>
</body>
</html>
