<!DOCTYPE html>
<html>
<head>
<style>
  /* content:"string" — a star glyph before the tagged word, in the pseudo's
     own colour (orange). Trailing space separates it from the element text. */
  .tag::before   { content: "* "; color: #ff8800; font-weight: bold; }

  /* content:"string" — an arrow marker after a link, in the pseudo's own blue. */
  a.ext::after   { content: " >>"; color: #0088ff; }

  /* content:attr(x) — echo the element's data-x attribute value before it. */
  [data-x]::before { content: attr(data-x); color: #11aa22; }

  /* content:"" — an empty inline box (clearfix idiom): generates no glyphs and
     must NOT disturb the element's own text. */
  .empty::before { content: ""; }

  /* none — explicitly suppresses any generated box. */
  .quiet::before { content: none; color: #ff0000; }
</style>
</head>
<body>
<p><span class="tag">Widget</span></p>
<p><a class="ext" href="https://example.com/">Docs</a></p>
<p><span data-x="SKU42-">Gizmo</span></p>
<p><span class="empty">Plain</span></p>
<p><span class="quiet">Silent</span></p>
</body>
</html>
