<html>
<head><title>DOM geometry + traversal</title></head>
<body class="page">
<main id="app">
  <section class="panel" data-role="main">
    <div id="box" class="widget">Rectangle</div>
    <ul class="menu">
      <li class="item" id="first"><a class="link" id="alink">Link</a></li>
      <li class="item selected" id="second">Second</li>
    </ul>
  </section>
</main>

<script>
  var box   = document.getElementById('box');
  var alink = document.getElementById('alink');
  var second = document.getElementById('second');

  // ---- document roots resolve to the real element nodes (spec-uppercase) ----
  console.log("roots " + document.documentElement.tagName \
              + " " + document.body.tagName \
              + " " + document.head.tagName);           // roots HTML BODY HEAD

  // ---- Element.matches(): class / compound / id / negative -----------------
  console.log("m1 " + box.matches('.widget'));          // class -> true
  console.log("m2 " + box.matches('div.widget'));       // compound -> true
  console.log("m3 " + box.matches('#box'));             // id -> true
  console.log("m4 " + box.matches('.item'));            // negative -> false
  console.log("m5 " + second.matches('.item.selected'));// compound class -> true

  // ---- Element.closest(): walks self-or-ancestor to the #id / .class -------
  console.log("c1 " + box.closest('#app').id);          // far ancestor by id -> app
  console.log("c2 " + box.closest('.panel').className); // ancestor by class -> panel ...
  console.log("c3 " + (box.closest('.nope') === null)); // no match -> true
  console.log("c4 " + alink.closest('.item').id);       // event-delegation walk -> first

  // ---- getBoundingClientRect() / offset* on a laid-out box ------------------
  // "Rectangle" is 9 chars: width == 9*CELL_W(8) == 72, height == LINE_H == 16.
  var r = box.getBoundingClientRect();
  console.log("wh " + r.width + " " + r.height);         // wh 72 16
  console.log("off " + box.offsetWidth + " " + box.offsetHeight); // off 72 16
  console.log("cli " + box.clientWidth + " " + box.clientHeight); // cli 72 16
  // left/top mirror x/y; right/bottom == x+width / y+height.
  console.log("edge " + (r.left === r.x) + " " + (r.top === r.y) \
              + " " + (r.right === r.x + r.width) \
              + " " + (r.bottom === r.y + r.height));    // edge true true true true
  // offset* left/top equal the DOCUMENT box (no scroll applied here).
  console.log("xy " + r.x + " " + r.y \
              + " " + box.offsetLeft + " " + box.offsetTop); // xy <X> <Y> <X> <Y>
</script>
</body>
</html>
