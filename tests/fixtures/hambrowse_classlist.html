<!DOCTYPE html>
<html><head><title>ClassList</title>
<style>
  .hot  { color: #ff0000; font-weight: bold; }
  .hide { display: none; }
</style></head>
<body>
<p id="target">status line</p>
<p id="notice" class="hide">now visible</p>
<button id="on"  onclick="document.getElementById('target').classList.add('hot')">on</button>
<button id="off" onclick="document.getElementById('notice').classList.remove('hide')">off</button>
<script>
  // classList query API is live from the first render (before any click).
  var t = document.getElementById('target');
  console.log('start hot = ' + t.classList.contains('hot'));
  console.log('toggle probe = ' + t.classList.toggle('probe'));
  console.log('after toggle = ' + t.className);
  console.log('untoggle probe = ' + t.classList.toggle('probe'));
  console.log('final class = ' + t.className);
</script>
</body></html>
