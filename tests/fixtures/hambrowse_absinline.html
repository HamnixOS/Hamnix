<!DOCTYPE html>
<html>
<head>
<style>
/* A position:relative card holding an EARLY position:absolute badge before a
   long <h1>. The badge is out of flow: it must anchor top-RIGHT and must NOT
   push the heading (which must start at the card LEFT and not clip). */
.card   { background: #eeeeee; position: relative; width: 640px; }
/* an INLINE element (span) — position:absolute must blockify + remove it from
   inline flow (the "top-left badge" bug when it stays inline at the line start). */
.ibadge { background: #ff0000; color: #ffffff; position: absolute; top: 4px; right: 4px; z-index: 5; }
h1      { color: #222222; }
.card2  { background: #cccccc; position: relative; width: 640px; }
/* a BLOCK element (div) badge — the "heading-clip" variant. */
.bbadge { background: #0000ee; color: #ffffff; position: absolute; top: 4px; right: 4px; z-index: 5; }
h2      { color: #222222; }
</style>
</head>
<body>
<div class="card">
<span class="ibadge">NEW</span>
<h1>A fairly long heading that should fit inside the card width without clipping</h1>
</div>
<div class="card2">
<div class="bbadge">HOT</div>
<h2>Another long heading beside a block badge that must also stay within the card</h2>
</div>
</body>
</html>
