<!doctype html>
<html>
<head>
<style>
.ins   { display:none; }
.adopt { display:none; }
.dyn   { display:none; }
.del   { display:none; }
.keep  { display:none; }
</style>
</head>
<body>
<div class="ins">CSSOM-INSERTRULE-SHOWN</div>
<div class="adopt">CSSOM-ADOPTED-SHOWN</div>
<div class="dyn">CSSOM-DYNSTYLE-SHOWN</div>
<div class="del">CSSOM-DELETERULE-HIDDEN</div>
<div class="keep">CSSOM-CONTROL-HIDDEN</div>
<script>
// 1. CSSStyleSheet.insertRule on a sheet reached via document.styleSheets.
var ss = document.styleSheets[0];
console.log("SSLEN", document.styleSheets.length);
console.log("PRERULES", ss.cssRules.length);
ss.insertRule(".ins{display:block}", ss.cssRules.length);
console.log("POSTRULES", ss.cssRules.length);

// 2. Constructible CSSStyleSheet + replaceSync + adoptedStyleSheets.
var cs = new CSSStyleSheet();
cs.replaceSync(".adopt{display:block}");
console.log("ADOPTRULES", cs.cssRules.length);
document.adoptedStyleSheets = [cs];
console.log("ADOPTLEN", document.adoptedStyleSheets.length);

// 3. A dynamically-appended STYLE element joins the cascade.
var st = document.createElement('style');
st.textContent = ".dyn{display:block}";
document.head.appendChild(st);

// 4. deleteRule: reveal `.del` then delete the rule again -> stays hidden.
ss.insertRule(".del{display:block}", ss.cssRules.length);
ss.deleteRule(ss.cssRules.length - 1);
console.log("FINALRULES", ss.cssRules.length);
console.log("CSSOM-DONE");
</script>
</body>
</html>
