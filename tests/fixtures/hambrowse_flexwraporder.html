<!DOCTYPE html>
<html>
<head>
<style>
  /* Deferred WRAP-RELOCATE: a `display:flex; flex-wrap:wrap` container whose
     children carry a real CSS `order` AND a `width:100%` promo child. This is
     Google's homepage footer shape. Three features must combine:

       (1) `order` ACROSS wrap lines — the promo is DOM index 1 but order:0, so it
           must paint ABOVE its earlier siblings (a later-DOM item lifted to the
           top line).
       (2) `width:100%` honoured on the wrap path — the promo takes a FULL line of
           its own, pushing the other two groups onto the next line.
       (3) per-wrap-line `justify-content:space-between` — the two remaining groups
           spread to opposite edges of the SAME line (left group flush-left, right
           group flush-right).

     Source order is grpA / promo / grpC; the rendered order must be:
       line 0: PROMO (full width)
       line 1: grpA (flush-left)  ....  grpC (flush-right) */
  .bar   { display:flex; flex-wrap:wrap; justify-content:space-between; background:#ddd; }
  .grpA  { order:1; background:#fcc; }
  .promo { order:0; width:100%; background:#cfc; }
  .grpC  { order:3; background:#ccf; }
</style>
</head>
<body>
<div class="bar">
  <div class="grpA">Advertising Business HowSearch</div>
  <div class="promo">BuildCreateDoMore promo band</div>
  <div class="grpC">Privacy Terms Settings</div>
</div>
</body>
</html>
