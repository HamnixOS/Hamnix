<!DOCTYPE html>
<html>
<head><title>Raw-text (script/style) scope</title>
<style>
  /* Real CSS for the class we DO have as a real element. */
  .para { margin: 0; }
  /* A phantom start-tag hidden in a CSS string value. If the source-text
     scanner reads a <style> body, this becomes a phantom .para + #cssghost. */
  .decoy::before { content: "<div class='para' id='cssghost'>"; }
</style>
</head>
<body>
<p class="para">Real one</p>
<p class="para">Real two</p>
<div id="host"></div>

<script type="text/javascript">
  // JS string literals containing phantom markup. If the source scanner reads
  // this script body, these become phantom DOM nodes double-counting .para /
  // .ghost / p / the #ghosty id.
  var s = '<p class="para">phantom</p>';
  var u = '<span class="ghost" id="ghosty">x</span>';
  var a = 3;
  var b = 5;
  var lt = (a < b);                 // a bare '<' inside the raw-text body
  if (lt) { s = s + '<i class="ghost"></i>'; }

  console.log("para " + document.querySelectorAll('.para').length);
  console.log("ghost " + document.querySelectorAll('.ghost').length);
  console.log("ptag " + document.getElementsByTagName('p').length);
  console.log("ghostid " + (document.getElementById('ghosty') === null));
  console.log("cssid " + (document.getElementById('cssghost') === null));
</script>

<script>
  // A second raw-text block: proves multiple script/style blocks are handled,
  // and that a real element AFTER them still matches (see the trailing <p>).
  console.log("after " + document.querySelectorAll('.para').length);
</script>
<p class="para">Real three</p>
</body>
</html>
