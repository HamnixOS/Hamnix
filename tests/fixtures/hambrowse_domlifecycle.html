<!DOCTYPE html>
<html><head><title>DOM lifecycle + event round-trip</title></head>
<body>
<div id="tgt">target</div>
<script>
  // (A) document.addEventListener('DOMContentLoaded'/'load') fire AFTER all
  //     scripts run, in spec order (DOMContentLoaded before load). These are
  //     document-level listeners: the document object is not a DOM element.
  var order = '';
  document.addEventListener('DOMContentLoaded', function(e){
    order += 'D';
    console.log('DCL type=' + e.type + ' tt=' + e.target.nodeName);
  });
  document.addEventListener('load', function(){ order += 'L'; });
  // deferred: the marker is logged from the load handler so ORDER is observable.
  document.addEventListener('load', function(){ console.log('LIFE ' + order); });

  // (B) el.addEventListener('keydown', fn) + el.dispatchEvent(new Event('keydown'))
  //     — an arbitrary (non-legacy) event type constructed via `new Event`.
  var tgt = document.getElementById('tgt');
  var kd = 0;
  tgt.addEventListener('keydown', function(e){ kd = kd + 1; console.log('KD fired type=' + e.type); });
  tgt.dispatchEvent(new Event('keydown'));
  tgt.dispatchEvent(new Event('keyup'));      // must NOT fire the keydown listener
  console.log('KDCOUNT ' + kd);

  // (C) new CustomEvent('foo',{detail:42}) round-trips numeric detail through
  //     dispatchEvent to the listener.
  var got = -1;
  tgt.addEventListener('foo', function(e){ got = e.detail; });
  var ce = new CustomEvent('foo', {detail: 42});
  console.log('CEDETAIL ' + ce.detail);
  tgt.dispatchEvent(ce);
  console.log('CEFIRE ' + got);
</script>
</body></html>
