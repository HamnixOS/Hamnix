<!doctype html>
<html>
<head><title>h1 no-border</title></head>
<body>
<h1>Heading One</h1>
<p>This is a plain paragraph beneath the heading. There is no CSS border,
underline, or horizontal rule declared anywhere on this page, so a real
browser draws NOTHING between the heading and this text.</p>
<h2>Heading Two</h2>
<p>A second plain paragraph. Neither h1 nor h2 should sprout a hairline.</p>
</body>
</html>
