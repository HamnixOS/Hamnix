<html>
<head><title>Arbitrary Event Types</title></head>
<body>
<div id="outer">
  <div id="mid">
    <button id="btn">Click me</button>
  </div>
</div>
<p id="box">start</p>

<script>
  var btn = document.getElementById('btn');
  var mid = document.getElementById('mid');
  var outer = document.getElementById('outer');
  var box = document.getElementById('box');

  // ---- (1) a NON-standard type (keydown) fires + carries event.type/target ----
  btn.addEventListener('keydown', function(e){
    console.log('KD type=' + e.type + ' target=' + e.target.id);
  });
  btn.dispatchEvent({type:'keydown'});

  // ---- (2) generic types bubble target -> ancestor, currentTarget per level --
  var B = '';
  btn.addEventListener('mouseover', function(e){ B += 'b'; });
  outer.addEventListener('mouseover', function(e){
    B += 'o'; console.log('MO ctarget=' + e.currentTarget.id + ' target=' + e.target.id);
  });
  btn.dispatchEvent({type:'mouseover'});
  console.log('MOSEQ ' + B);

  // ---- (3) distinct types do NOT cross-fire (keyup must not run keydown) -----
  var K = '';
  btn.addEventListener('keyup',   function(e){ K += 'U'; });
  btn.addEventListener('keydown', function(e){ K += 'D'; });
  btn.dispatchEvent({type:'keyup'});
  console.log('CROSS ' + K);

  // ---- (4) a fully custom application type fires -----------------------------
  box.addEventListener('my:thing', function(e){ console.log('CUSTOM ok type=' + e.type); });
  box.dispatchEvent({type:'my:thing'});

  // ---- (5) removeEventListener for a generic type stops it -------------------
  var R = '';
  function focusH(e){ R += 'F'; }
  mid.addEventListener('focus', focusH);
  mid.dispatchEvent({type:'focus'});
  mid.removeEventListener('focus', focusH);
  mid.dispatchEvent({type:'focus'});
  console.log('REMGEN ' + R);

  // ---- (6) stopPropagation halts a generic bubble ----------------------------
  var S = '';
  mid.addEventListener('scroll', function(e){ S += 'M'; e.stopPropagation(); });
  outer.addEventListener('scroll', function(e){ S += 'X'; });
  mid.dispatchEvent({type:'scroll'});
  console.log('GSTOP ' + S);
</script>
</body>
</html>
