<!DOCTYPE html>
<html>
<head><title>class-resolved flex-grow (stylesheet, no inline flex)</title>
<style>
  .row  { display:flex; }
  .col  { flex:1; }
  .wide { flex:2; }
  .a { background:#aa1111; }
  .b { background:#22bb22; }
  .c { background:#3333cc; }
  .w { background:#dd4444; }
  .n { background:#55ee55; }
</style>
</head>
<body>
  <h1>class-resolved flex distribution</h1>

  <!-- three .col{flex:1} items split the row EVENLY — factors come ONLY from
       the stylesheet, NOT from an inline style="flex…". -->
  <div class="row">
    <div class="col a">EQa</div>
    <div class="col b">EQb</div>
    <div class="col c">EQc</div>
  </div>

  <!-- .wide{flex:2} beside .col{flex:1} splits the row ~2:1, again class-only. -->
  <div class="row">
    <div class="wide w">GRw</div>
    <div class="col  n">GRn</div>
  </div>
</body>
</html>
