<!DOCTYPE html>
<html>
<head>
<style>
  /* class-resolved (cascade) width on a text field */
  .wide { width: 240px; }
</style>
</head>
<body>
<form>
  <!-- default: no CSS width -> the >=8-cell UA minimum field -->
  <input type="text" value="ab">
  <!-- CSS width via a class (cascade): 240px / 8 - 2 = 28 inner cells -->
  <input type="text" value="ab" class="wide">
  <!-- CSS width via inline style: 120px / 8 - 2 = 13 inner cells -->
  <input type="text" value="cd" style="width:120px">
  <!-- password honours width too: 160px / 8 - 2 = 18 inner cells (masked) -->
  <input type="password" value="pw" style="width:160px">
</form>
</body>
</html>
