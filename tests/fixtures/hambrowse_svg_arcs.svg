<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="64" viewBox="0 0 96 64">
  <!-- rounded rect (green): corners are quarter-ellipse arcs, so the extreme
       corner pixel is transparent while the centre is solid green -->
  <rect x="4" y="4" width="40" height="24" rx="10" ry="10" fill="#28c83c"/>
  <!-- square rect (navy) directly below: identical box, square corners, so its
       extreme corner pixel IS filled — the corner-pixel contrast proves rx/ry -->
  <rect x="4" y="36" width="40" height="24" fill="#1030a0"/>
  <!-- elliptical-arc pie (red): a quarter disc centred at (74,20) sweeping from
       the +x axis down to the +y axis; the interior is filled, the region just
       beyond the 18px radius is empty -->
  <path d="M 74 20 L 92 20 A 18 18 0 0 1 74 38 Z" fill="#dc2828"/>
  <!-- smooth cubic S (orange): a wave; the S control is the reflection of the
       preceding C control, giving a continuous curve through (74,52) -->
  <path d="M 54 52 C 60 44 68 44 74 52 S 88 60 92 52" fill="none"
        stroke="#ffa500" stroke-width="3"/>
</svg>
