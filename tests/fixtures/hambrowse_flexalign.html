<!DOCTYPE html>
<html>
<head>
<style>
  .row { display: flex; }
  .tall { width: 240px; }
  .chip { width: 240px; }
</style>
</head>
<body>
  <h1>align-items cross-axis alignment</h1>

  <!-- flex-start (the engine default): short item pinned to the line TOP -->
  <div class="row" style="align-items: flex-start">
    <div class="tall">Sa1<br>Sa2<br>Sa3<br>Sa4</div>
    <div class="chip" style="background:#111aaa">Sshort</div>
  </div>

  <!-- center: short item vertically CENTRED in the line's cross extent -->
  <div class="row" style="align-items: center">
    <div class="tall">Ca1<br>Ca2<br>Ca3<br>Ca4</div>
    <div class="chip" style="background:#222bbb">Cshort</div>
  </div>

  <!-- flex-end: short item dropped to the line BOTTOM -->
  <div class="row" style="align-items: flex-end">
    <div class="tall">Ea1<br>Ea2<br>Ea3<br>Ea4</div>
    <div class="chip" style="background:#333ccc">Eshort</div>
  </div>

  <!-- stretch: content stays at top, box background grows to full line height -->
  <div class="row" style="align-items: stretch">
    <div class="tall">Ta1<br>Ta2<br>Ta3<br>Ta4</div>
    <div class="chip" style="background:#44dd55">Tshort</div>
  </div>
</body>
</html>
