<!DOCTYPE html>
<html><head><title>DOM R6 attributes</title></head>
<body>
<img id="pic" src="x.png" alt="hero pic" data-role="hero">
<p id="hp"><b>bold</b></p>
<script>
  var pic = document.getElementById('pic');
  var names = pic.getAttributeNames();
  console.log('GAN ' + names.length + '|' + names.join(','));
  console.log('HAS ' + pic.hasAttributes());
  var b = document.getElementById('hp').firstElementChild;
  console.log('HAS3 ' + b.hasAttributes());
</script>
</body></html>
