<!DOCTYPE html>
<html>
<head>
<style>
.sib1 { background: #00aa00; }
.rel  { background: #0000ee; position: relative; top: 20px; left: 30px; }
.sib2 { background: #aa0000; }
.cont { background: #dddddd; position: relative; }
.abs1 { background: #ff8800; position: absolute; top: 20px; left: 10px; z-index: 1; width: 180px; }
.abs2 { background: #8800ff; position: absolute; top: 20px; left: 10px; z-index: 5; width: 180px; }
.after { background: #00cccc; }
</style>
</head>
<body>
<div class="sib1">Alpha static box one</div>
<div class="rel">Beta relative offset box</div>
<div class="sib2">Gamma static box two</div>
<div class="cont">
<div class="abs1">Orange absolute low z</div>
<div class="abs2">Purple absolute high z</div>
<div class="after">Delta after absolute flows into vacated slot</div>
</div>
</body>
</html>
