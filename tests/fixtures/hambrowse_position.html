<!DOCTYPE html>
<html>
<head>
<style>
  .card   { position: relative; border: 1px solid black; width: 320px; }
  .tl     { position: absolute; top: 0; left: 0; background-color: #ff0000; color: #ffffff; }
  .tr     { position: absolute; top: 0; right: 0; background-color: #00aa00; color: #ffffff; }
</style>
</head>
<body>
<h1>Position</h1>
<div class="card">
<p>Card body text line one here.</p>
<div class="tl">TL</div>
<div class="tr">TR</div>
</div>
<p style="position:relative;left:48px;top:16px;color:#0000ff">Nudged para here.</p>
<p>Plain trailing paragraph.</p>
</body>
</html>
