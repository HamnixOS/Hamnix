<!doctype html>
<html>
<head>
<style>
  .col  { width: 640px; }
  .full { width: 100%; }
</style>
</head>
<body>
<div class="col">
  <p>A responsive css width:100% broken image (BBC/Wikipedia thumbnail idiom)</p>
  <img class="full" src="http://example.invalid/missing-hero.png" alt="hero">
  <p>B explicit width/height attributes on a broken image</p>
  <img src="http://example.invalid/missing-attr.png" alt="attr" width="120" height="90">
  <p>C broken image with no size hint at all</p>
  <img src="http://example.invalid/missing-nosize.png" alt="nosize">
  <p>end</p>
</div>
</body>
</html>
