<html>
<head><title>Observers</title></head>
<body>
<h1>Observer APIs</h1>

<div id="mo-target">seed</div>
<div id="mo-attr">attr</div>
<div id="mo-filter">filter</div>
<div id="mo-disc">disc</div>
<div id="mo-take">take</div>

<div id="io-visible">VIS</div>
<div id="io-offscreen" style="position:absolute;top:6000px;left:0">OFF</div>

<div id="ro-target" style="width:120px">RESIZE</div>

<script>
  // ============ MutationObserver: childList batched as ONE microtask ==========
  var moCalls = 0;
  var target = document.getElementById('mo-target');
  var moChild = new MutationObserver(function (records, observer) {
    moCalls += 1;
    var added = 0, removed = 0;
    for (var i = 0; i < records.length; i++) {
      var r = records[i];
      if (r.type === 'childList') { added += r.addedNodes.length; removed += r.removedNodes.length; }
    }
    console.log("mo-child records " + records.length + " added " + added + " removed " + removed);
    console.log("mo-child calls " + moCalls + " observerok " + (observer === moChild));
  });
  moChild.observe(target, { childList: true, subtree: true });

  var c1 = document.createElement('span'); c1.textContent = 'A'; target.appendChild(c1);
  var c2 = document.createElement('span'); c2.textContent = 'B'; target.appendChild(c2);
  target.removeChild(c1);

  // This SYNC line must be logged BEFORE any mo-child callback line (microtask
  // fires after the current script finishes).
  console.log("mo-sync done-mutating");

  // ============ MutationObserver: attributes + attributeOldValue + filter =====
  var at = document.getElementById('mo-attr');
  var moAttr = new MutationObserver(function (records) {
    var name = '', old = '';
    var n = 0;
    for (var i = 0; i < records.length; i++) {
      if (records[i].type === 'attributes') { n += 1; name = records[i].attributeName; old = records[i].oldValue; }
    }
    console.log("mo-attr records " + n + " name " + name + " old " + old);
  });
  moAttr.observe(at, { attributes: true, attributeOldValue: true });
  at.setAttribute('data-x', 'v1');   // record 1: oldValue undefined (no prior prop)
  at.setAttribute('data-x', 'v2');   // record 2: oldValue 'v1'

  var ft = document.getElementById('mo-filter');
  var moFilt = new MutationObserver(function (records) {
    var names = '';
    for (var i = 0; i < records.length; i++) names += records[i].attributeName + ',';
    console.log("mo-filter records " + records.length + " names " + names);
  });
  moFilt.observe(ft, { attributeFilter: ['data-keep'] });
  ft.setAttribute('data-keep', '1');   // recorded
  ft.setAttribute('data-skip', '1');   // filtered out

  // ============ disconnect() stops delivery ==================================
  var dt = document.getElementById('mo-disc');
  var discCount = 0;
  var moDisc = new MutationObserver(function (records) { discCount += records.length; console.log("mo-disc FIRED"); });
  moDisc.observe(dt, { childList: true });
  moDisc.disconnect();
  dt.appendChild(document.createElement('i'));
  console.log("mo-disc synccount " + discCount);

  // ============ takeRecords() drains synchronously ===========================
  var tt = document.getElementById('mo-take');
  var moTake = new MutationObserver(function (records) { console.log("mo-take CB-FIRED " + records.length); });
  moTake.observe(tt, { childList: true });
  tt.appendChild(document.createElement('u'));
  var taken = moTake.takeRecords();
  console.log("mo-take taken " + taken.length + " type " + taken[0].type + " added " + taken[0].addedNodes.length);

  // ============ IntersectionObserver: on-screen vs far off-screen ============
  var vis = document.getElementById('io-visible');
  var off = document.getElementById('io-offscreen');
  var io = new IntersectionObserver(function (entries) {
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      var which = (e.target === vis) ? 'vis' : 'off';
      console.log("io " + which + " intersect " + e.isIntersecting + " ratiopos " + (e.intersectionRatio > 0));
    }
  });
  io.observe(vis);
  io.observe(off);

  // ============ ResizeObserver: contentRect of a laid-out element ============
  var rt = document.getElementById('ro-target');
  var ro = new ResizeObserver(function (entries) {
    var e = entries[0];
    console.log("ro targetok " + (e.target === rt) + " w " + (e.contentRect.width > 0) + " h " + (e.contentRect.height > 0));
  });
  ro.observe(rt);
</script>
</body>
</html>
