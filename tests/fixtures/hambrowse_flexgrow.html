<!DOCTYPE html>
<html>
<head><title>flex-grow / flex-basis resolved flexible lengths</title></head>
<body>
  <h1>flex-grow distribution</h1>

  <!-- three flex:1 items split the row EVENLY (equal widths) -->
  <div style="display:flex">
    <div style="flex:1;background:#aa1111">EQa</div>
    <div style="flex:1;background:#22bb22">EQb</div>
    <div style="flex:1;background:#3333cc">EQc</div>
  </div>

  <!-- flex:2 vs flex:1 splits the row 2:1 -->
  <div style="display:flex">
    <div style="flex:2;background:#dd4444">GRw</div>
    <div style="flex:1;background:#55ee55">GRn</div>
  </div>

  <!-- fixed flex-basis (0 0 200px) + a growing flex:1 fills the rest -->
  <div style="display:flex">
    <div style="flex:0 0 200px;background:#661166">BSf</div>
    <div style="flex:1;background:#77dd77">BSg</div>
  </div>
</body>
</html>
