<html>
<head><title>Google</title></head>
<body>
<!--
  Regression fixture for #317. This mirrors the SHAPE of google.com's inline
  scripts: several independent <script> blocks that (a) use ES constructs the
  engine gained (labeled block + break, |=, .call, switch, for-in, window.*),
  and (b) rely on SCRIPT ISOLATION — an earlier script that deliberately throws
  must NOT stop the later script that wires the page. The final script writes a
  computed status via textContent, so a successful run is VISIBLE in the render.
-->
<h1>Google</h1>
<p id="status">pending</p>

<script>
  // publishes a global object the way google does: window.google = {...}
  window.google = window.google || {};
  google.flags = 0;
  google.flags |= 4;            // bitwise compound assignment
  google.flags |= 1;
</script>

<script>
  // an EARLY script that throws — must not abort the scripts after it
  var broken = null;
  broken.oops();                // TypeError: cannot read property ...
</script>

<script>
  // labeled block + break, .call, switch, for-in — the constructs from the bug
  function build() {
    var parts = [];
    scan: {
      parts.push("g" + google.flags);   // "g5"
      break scan;
      parts.push("unreached");
    }
    var pick = function (n) {
      switch (n) {
        case 5: return "five";
        default: return "n";
      }
    };
    parts.push(pick.call(null, google.flags));   // "five"
    var o = {a: 1, b: 1};
    var c = 0, k;
    for (k in o) c += 1;
    parts.push("k" + c);                          // "k2"
    return parts.join("-");
  }
  document.getElementById('status').textContent = build();
</script>
</body>
</html>
