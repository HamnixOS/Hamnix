<html>
<head><title>Form Value Round-Trip</title></head>
<body>
<form id="f" action="/x">
  <input id="t" name="t" type="text" value="orig">
  <textarea id="ta" name="ta">body-orig</textarea>
</form>

<script>
  var t = document.getElementById('t');
  var ta = document.getElementById('ta');

  // ---- (1) READ the current field text through JS ----------------------
  console.log('READ t=' + t.value + ' ta=' + ta.value);

  // ---- (2) WRITE a new value from JS, then read it BACK ----------------
  t.value = 'typed';
  ta.value = 'edited';
  console.log('SET t=' + t.value + ' ta=' + ta.value);

  // ---- (3) reflected props the serializer/UI depend on -----------------
  console.log('META name=' + t.name + ' type=' + t.type);

  // ---- (4) a value the field renders (baked into the box on re-layout) -
  t.value = 'RENDERVAL';
</script>
</body>
</html>
