<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ffffff; margin: 0; }
  /* 2 equal columns; the implicit rows are sized by grid-auto-rows (no
     grid-template-rows is given, so EVERY row is implicit). */
  .g {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: 72px;
    gap: 0;
  }
  .g > div { color: #ffffff; }
  .a { background: #dd2222; }
  .b { background: #22aa33; }
  .c { background: #2244dd; }
  .d { background: #ee8800; }
</style>
</head>
<body>
  <div class="g">
    <div class="a">A</div>
    <div class="b">B</div>
    <div class="c">C</div>
    <div class="d">D</div>
  </div>
</body>
</html>
