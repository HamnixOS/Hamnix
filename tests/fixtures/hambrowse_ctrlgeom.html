<!doctype html>
<html><head><title>form-control geometry</title>
<style>
  .tall  { height: 48px; }         /* 48px / 16px line = 3 rows */
  .bare  { appearance: none; }     /* suppress the default field chrome */
</style></head>
<body>
<p><input type="text" value="plain"></p>
<p><input type="text" class="bare" value="bare"></p>
<p><input type="text" class="tall" value="tall"></p>
<p><input type="text" value="ibare" style="appearance:none"></p>
<p><input type="text" value="itall" style="height:32px"></p>
<p><button class="bare">Bare</button></p>
<p><button>Face</button></p>
</body>
</html>
