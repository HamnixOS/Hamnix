<html>
<head><title>Web Storage + History</title></head>
<body>
<h1>Storage / History / Location</h1>
<p id="status">pending</p>

<script>
  // ---- Web Storage: localStorage / sessionStorage (Storage objects) --------
  localStorage.clear();
  sessionStorage.clear();

  // setItem stringifies its value; getItem round-trips a string.
  localStorage.setItem('n', 5);
  console.log("coerce " + localStorage.getItem('n') + " " + (typeof localStorage.getItem('n')));  // coerce 5 string

  // getItem of an absent key is null (not undefined, not "").
  console.log("absent " + (localStorage.getItem('nope') === null));   // absent true

  // removeItem drops a key -> back to null.
  localStorage.setItem('a', 'one');
  localStorage.removeItem('a');
  console.log("removed " + (localStorage.getItem('a') === null));     // removed true

  // length + key(i) reflect insertion order.
  localStorage.clear();
  localStorage.setItem('x', '1');
  localStorage.setItem('y', '2');
  console.log("len " + localStorage.length + " key " + localStorage.key(0)); // len 2 key x

  // clear() empties the store.
  localStorage.clear();
  console.log("cleared " + localStorage.length);                     // cleared 0

  // localStorage and sessionStorage are INDEPENDENT stores.
  localStorage.setItem('shared', 'L');
  sessionStorage.setItem('shared', 'S');
  console.log("indep " + localStorage.getItem('shared') + sessionStorage.getItem('shared')); // indep LS

  // ---- History API ----------------------------------------------------------
  var popped = [];
  window.addEventListener('popstate', function (e) {
    popped.push(e.state ? e.state.p : 'none');
    console.log("pop " + (e.state ? e.state.p : 'none'));
  });

  console.log("hist0 " + history.length + " " + (history.state === null)); // hist0 1 true

  history.pushState({ p: 1 }, '', '/a');
  console.log("push " + history.length + " " + history.state.p);     // push 2 1

  history.pushState({ p: 2 }, '', '/b');
  console.log("push2 " + history.length + " " + history.state.p);    // push2 3 2

  // replaceState updates the current entry WITHOUT growing length.
  history.replaceState({ p: 9 }, '', '/b2');
  console.log("repl " + history.length + " " + history.state.p);     // repl 3 9

  // back(): index 2 -> 1, restores {p:1}, fires popstate (pop 1 above).
  history.back();
  console.log("back " + history.length + " " + history.state.p);     // back 3 1

  // forward(): index 1 -> 2, restores {p:9}, fires popstate (pop 9 above).
  history.forward();
  console.log("fwd " + history.length + " " + history.state.p);      // fwd 3 9

  // go(-2): index 2 -> 0, state is null again, fires popstate (pop none above).
  history.go(-2);
  console.log("go " + history.length + " " + (history.state === null)); // go 3 true

  // ---- Location component parsing -------------------------------------------
  __setLocation('https://user@example.com:8080/path/to?q=1&x=2#frag');
  console.log("loc " + location.protocol + " " + location.host + " " + location.hostname + " " + location.port);
  // loc https: example.com:8080 example.com 8080
  console.log("loc2 " + location.pathname + " " + location.search + " " + location.hash);
  // loc2 /path/to ?q=1&x=2 #frag
  console.log("loc3 " + location.origin);                            // loc3 https://example.com:8080

  // root path defaults to "/".
  __setLocation('http://a.com');
  console.log("root " + location.pathname + " " + location.origin); // root / http://a.com

  // location.href = ... re-parses the components.
  location.href = 'http://a.com/z?k=v';
  console.log("href " + location.pathname + " " + location.search); // href /z ?k=v

  // location.hash = ... updates the fragment + fires a hashchange event.
  window.addEventListener('hashchange', function () { console.log("hc"); });
  location.hash = '#new';
  console.log("hash " + location.hash);                             // hc  then  hash #new
</script>
</body>
</html>
