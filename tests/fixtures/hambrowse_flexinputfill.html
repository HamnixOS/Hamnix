<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>flex:1 item fills the row beside a hidden-content sibling</title>
<style>
  /* The trailing control carries a CLASS-hidden popup whose prose, if counted
     as content width, overflows the row and starves the flex:1 field of any
     free space (google's search input crammed to the right). Skipping the
     display:none subtree lets the flex:1 item grow to fill the bar. */
  .hid  { display: none; }
  .bar  { display: flex; width: 800px; }
  .grow { flex: 1; background: #22bb22; }
</style>
</head>
<body>
<div class="bar">
  <div style="background:#aa1111">ICON</div>
  <div class="grow">FIELD</div>
  <div style="background:#3333cc">AIMode<span class="hid">HIDDENPOPUP CreateImages Canvas DeepResearch VideoOverview ThisHiddenMenuIsVeryLongAndWouldOtherwiseMeasureThousandsOfPixelsWideStarvingTheFlexOneField AndEvenMoreHiddenText</span></div>
</div>
</body>
</html>
