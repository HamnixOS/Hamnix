<!DOCTYPE html>
<html>
<head>
<style>
  /* Padded badges: vertical padding grows the inline-block box into a real
     multi-row box (12px top + 12px bottom + one 16px text line = 40px = 3 rows). */
  .badge { display:inline-block; background:#cc3355; color:#ffffff; padding:12px 10px; }
  /* Control: same chip, NO vertical padding -> stays one text-line (1 row) tall. */
  .flat  { display:inline-block; background:#22aa66; color:#ffffff; padding:0 10px; }
</style>
</head>
<body>
<p>Status:
  <span class="badge">Live</span>
  <span class="badge">Beta</span>
  <span class="badge">New</span>
</p>
<p>Flat tags:
  <span class="flat">alpha</span>
  <span class="flat">beta</span>
</p>
<p>Trailing paragraph after the badges.</p>
</body>
</html>
