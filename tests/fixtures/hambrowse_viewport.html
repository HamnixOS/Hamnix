<!DOCTYPE html>
<html>
<head>
<style>
  /* Rendered at WIDTH=800 (bw), default HEIGHT=600 (bh). Viewport units:
       50vw   = 1% of width  * 50  = 400px
       25vw                        = 200px
       50vh   = 1% of height * 50  = 300px   (proves vh uses HEIGHT, not width)
       50vmin = 1% of min(800,600) = 300px   (smaller axis = height)
       50vmax = 1% of max(800,600) = 400px   (larger axis = width)
     Each box's FILL span (x1-x0 == width + 16 chrome, x0=100) pins the
     resolved pixel width. vw50/vh50 differ and vmin50/vmax50 differ, so a
     unit resolved against the wrong axis fails the gate. */
  .vw50   { width: 50vw;   background-color: #111111; }
  .vw25   { width: 25vw;   background-color: #222222; }
  .vh50   { width: 50vh;   background-color: #333333; }
  .vmin50 { width: 50vmin; background-color: #555555; }
  .vmax50 { width: 50vmax; background-color: #666666; }
</style>
</head>
<body>
  <div class="vw50">vw50 box</div>
  <div class="vw25">vw25 box</div>
  <div class="vh50">vh50 box</div>
  <div class="vmin50">vmin50 box</div>
  <div class="vmax50">vmax50 box</div>
</body>
</html>
