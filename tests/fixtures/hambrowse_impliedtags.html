<html><head><style>
  h2 { color:#14306e; }
</style></head><body>
<!-- (A) unclosed <li>: siblings, not nested -->
<ul>
<li>Uno<li>Dos<li>Tres</ul>

<!-- (B) <p> with an OMITTED </p> closed by a following block <h2> -->
<p>Para closed by a heading
<h2>Heading</h2>
<p>After

<!-- (C) two <p> in a row, first has no </p> -->
<p>PfirstNoClose
<p>PsecondNoClose

<!-- (D) definition list with omitted </dt>/</dd> -->
<dl>
<dt>TermOne<dd>DefOne<dt>TermTwo<dd>DefTwo</dl>
<p>AfterDL

<!-- (E) table row/cells with omitted </td>/</tr> -->
<table border=1>
<tr><td>Cellx<td>Celly
<tr><td>Cellz<td>Cellw</table>
<p>AfterTable
</body></html>
