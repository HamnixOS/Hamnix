<html>
<head><title>Constraint Validation</title></head>
<body>
<form id="f" action="/signup" method="POST">
  <input id="email" name="email" type="email" required value="">
  <input id="age" name="age" type="number" min="18" max="120" value="">
  <input id="nick" name="nick" type="text" maxlength="5" value="">
  <input type="submit" value="Join">
</form>

<script>
  var f = document.getElementById('f');
  var email = document.getElementById('email');
  var age = document.getElementById('age');
  var nick = document.getElementById('nick');

  // (1) required + empty email blocks the form: checkValidity() false, and the
  //     control's validity.valueMissing is set.
  console.log('EMPTY-FORM-VALID ' + f.checkValidity());
  console.log('EMAIL-MISSING ' + email.validity.valueMissing);

  // (2) a bad e-mail is rejected (type=email); "abc" has no '@'.
  email.value = 'abc';
  console.log('EMAIL-ABC-VALID ' + email.checkValidity());
  console.log('EMAIL-ABC-TYPEMISMATCH ' + email.validity.typeMismatch);

  // (3) a well-formed e-mail passes.
  email.value = 'me@site.com';
  console.log('EMAIL-GOOD-VALID ' + email.checkValidity());

  // (4) number type + range: non-numeric is badInput; below min is rangeUnderflow.
  age.value = 'xyz';
  console.log('AGE-XYZ-VALID ' + age.checkValidity());
  console.log('AGE-XYZ-BADINPUT ' + age.validity.badInput);
  age.value = '9';
  console.log('AGE-9-VALID ' + age.checkValidity());
  console.log('AGE-9-UNDERFLOW ' + age.validity.rangeUnderflow);
  age.value = '25';
  console.log('AGE-25-VALID ' + age.checkValidity());

  // (5) maxlength=5 -> tooLong when exceeded.
  nick.value = 'toolongnick';
  console.log('NICK-LONG-VALID ' + nick.checkValidity());
  console.log('NICK-LONG-TOOLONG ' + nick.validity.tooLong);
  nick.value = 'ok';
  console.log('NICK-OK-VALID ' + nick.checkValidity());

  // (6) whole form now valid -> checkValidity() true; reportValidity() agrees.
  console.log('FULL-FORM-VALID ' + f.checkValidity());
  console.log('FULL-FORM-REPORT ' + f.reportValidity());

  // (7) setCustomValidity() forces invalid until cleared.
  nick.setCustomValidity('nope');
  console.log('CUSTOM-VALID ' + nick.checkValidity());
  console.log('CUSTOM-ERROR ' + nick.validity.customError);
  console.log('CUSTOM-MSG ' + nick.validationMessage);
  nick.setCustomValidity('');
  console.log('CUSTOM-CLEARED-VALID ' + nick.checkValidity());

  // (8) the form is valid now, so submit() navigates (POST body present).
  f.submit();
</script>
</body>
</html>
