<!DOCTYPE html>
<html>
<head>
<style>
/* Mirrors the on-device QA hero card: a position:relative gradient panel with
   padding whose FIRST child is a position:absolute, auto-width badge pinned to
   the top-right, immediately followed by the heading. The badge must shrink to
   fit "NEW" (a small box at the top-RIGHT), NOT span the full card width and
   overlap the <h1>. */
.hero   { position: relative; background: linear-gradient(to right, #223366, #4477cc);
          padding: 14px; }
.badge  { position: absolute; top: 8px; right: 8px; background: #ffff00;
          color: #000000; padding: 4px; z-index: 5; }
h1      { color: #ffffff; }
</style>
</head>
<body>
<div class="hero">
<div class="badge">NEW</div>
<h1>Welcome to the launch of our brand new product</h1>
<p>Everything you need, right here on the page.</p>
</div>
</body>
</html>
