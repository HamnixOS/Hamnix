<!DOCTYPE html>
<html>
<head>
<title>Dynamic Page</title>
<style>
  body { font-family: sans-serif; }
  h1 { color: #003399; }
  .ready { color: #006600; font-weight: bold; }
</style>
</head>
<body>
  <h1>Async DOM Integration</h1>

  <p>Promise result: <span id="promiseOut">PENDING_PROMISE</span></p>
  <p>Timeout result: <span id="timerOut">PENDING_TIMER</span></p>
  <p>Async/await result: <span id="asyncOut">PENDING_ASYNC</span></p>
  <p>Fetch result: <span id="fetchOut">PENDING_FETCH</span></p>
  <p>Status: <span id="statusOut">loading</span></p>

<script>
  // Register a deterministic fixture (no network; fixture-backed fetch).
  __setFetchFixture("/api/user.json", {
    status: 200,
    body: '{"name":"Ada Lovelace","score":1815}'
  });

  // 1) Plain Promise .then mutating the DOM.
  Promise.resolve(42).then(function (v) {
    document.getElementById("promiseOut").textContent = "resolved=" + v;
  });

  // 2) setTimeout(...,0) callback mutating the DOM.
  setTimeout(function () {
    var el = document.querySelector("#timerOut");
    el.textContent = "fired-after-timeout";
  }, 0);

  // 3) async function with await mutating the DOM.
  async function loadAsync() {
    var doubled = await Promise.resolve(21 * 2);
    document.getElementById("asyncOut").textContent = "awaited=" + doubled;
  }
  loadAsync();

  // 4) fetch(url).then(r => r.json()) — fixture-backed — mutating the DOM.
  fetch("/api/user.json")
    .then(function (r) { return r.json(); })
    .then(function (data) {
      document.getElementById("fetchOut").textContent =
        data.name + " score=" + data.score;
      document.getElementById("statusOut").textContent = "done";
      document.getElementById("statusOut").className = "ready";
    });
</script>
</body>
</html>
