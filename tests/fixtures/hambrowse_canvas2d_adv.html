<!DOCTYPE html>
<html>
<head><title>canvas2d advanced</title></head>
<body>
<p>Canvas 2D advanced: gradients, transforms, save/restore, imageData.</p>
<canvas id="c" width="240" height="180"></canvas>
<script>
var ctx = document.getElementById('c').getContext('2d');
// opaque white ground so untouched cells read white
ctx.fillStyle = 'white';
ctx.fillRect(0, 0, 240, 180);

// (1) LINEAR GRADIENT: horizontal red->blue across x=[10,110], y=[10,50].
var g = ctx.createLinearGradient(10, 0, 110, 0);
g.addColorStop(0, '#ff0000');
g.addColorStop(1, '#0000ff');
ctx.fillStyle = g;
ctx.fillRect(10, 10, 100, 40);

// (2) TRANSFORM: translate then rotate 90deg, draw a green rect. With
// translate(150,90)+rotate(pi/2), the user rect (0,0,40,12) maps so its
// far corner lands up-left of the pivot; sample the transformed interior.
ctx.save();
ctx.translate(150, 90);
ctx.rotate(3.14159265 / 2);
ctx.fillStyle = '#00aa00';
ctx.fillRect(0, 0, 40, 12);
ctx.restore();

// (3) SAVE/RESTORE isolation: after restore the CTM is back to identity, so
// this orange rect lands exactly at its literal (10,120) device position.
ctx.fillStyle = '#ff8800';
ctx.fillRect(10, 120, 30, 20);

// (4) RADIAL GRADIENT: yellow center -> purple edge, centered (200,40) r=30.
var rg = ctx.createRadialGradient(200, 40, 0, 200, 40, 30);
rg.addColorStop(0, '#ffff00');
rg.addColorStop(1, '#800080');
ctx.fillStyle = rg;
ctx.fillRect(170, 10, 60, 60);

// (5) getImageData / putImageData round trip. Draw a known cyan block, read it
// back, then write the SAME pixels to a new location via putImageData.
ctx.fillStyle = '#00ffff';
ctx.fillRect(60, 120, 16, 16);
var img = ctx.getImageData(60, 120, 16, 16);
ctx.putImageData(img, 100, 120);
// also mutate a copy to solid magenta and put it a third place, proving the
// data array is writable and rendered.
var img2 = ctx.createImageData(16, 16);
var i = 0;
while (i < 16 * 16) {
  img2.data[i * 4 + 0] = 255;
  img2.data[i * 4 + 1] = 0;
  img2.data[i * 4 + 2] = 255;
  img2.data[i * 4 + 3] = 255;
  i = i + 1;
}
ctx.putImageData(img2, 140, 120);
</script>
</body>
</html>
