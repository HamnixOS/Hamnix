<html>
<head><title>POST Submit</title></head>
<body>
<form id="f" action="/login" method="POST">
  <input id="u" name="a" type="text" value="1">
  <input id="p" name="b" type="text" value="2">
  <input id="c1" name="agree" type="checkbox" value="yes" checked>
  <input type="submit" value="Sign in">
</form>

<script>
  // A method=POST form serializes its named controls into a request BODY
  // (application/x-www-form-urlencoded), NOT a query string. The action target
  // stays query-free. Host prints "NAV POST /login" then "BODY a=1&b=2&agree=yes".
  var f = document.getElementById('f');
  f.submit();
</script>
</body>
</html>
