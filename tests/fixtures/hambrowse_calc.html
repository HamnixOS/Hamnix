<!DOCTYPE html>
<html>
<head>
<style>
  /* Rendered at WIDTH=800 (bw), default HEIGHT=600 (bh). The body content
     column here is 584px (same box model as the cssvalues gate: 100% - 200px
     rendered as a 384px FILL, so 100% == 584). Each box's FILL span pins the
     calc()-resolved pixel width (x0=100, x1 = 100 + width + 16 chrome).

       calc(100px + 50px)      = 150px   (fixed sum)
       calc(100% - 40px)       = 544px   (percentage minus px; 584-40)
       calc(10px * 3)          = 30px    (multiply by unitless)
       calc(2rem + 10px)       = 42px    (rem=16 -> 32 + 10)
       calc(10px + 2px * 5)    = 20px    (precedence: * before +)
       calc((10px + 2px) * 2)  = 24px    (nested parens override precedence)
       calc(50vw - 100px)      = 300px   (viewport unit inside calc; 400-100)
       calc(100% - var(--g))   = 576px   (var() substituted inside calc; 584-8)
  */
  :root { --g: 8px; }
  .sum    { width: calc(100px + 50px);     background-color: #111111; }
  .pct    { width: calc(100% - 40px);      background-color: #222222; }
  .mul    { width: calc(10px * 3);         background-color: #333333; }
  .rem    { width: calc(2rem + 10px);      background-color: #444444; }
  .prec   { width: calc(10px + 2px * 5);   background-color: #555555; }
  .nest   { width: calc((10px + 2px) * 2); background-color: #666666; }
  .vwcalc { width: calc(50vw - 100px);     background-color: #777777; }
  .varc   { width: calc(100% - var(--g));  background-color: #888888; }
</style>
</head>
<body>
  <div class="sum">sum box</div>
  <div class="pct">pct box</div>
  <div class="mul">mul box</div>
  <div class="rem">rem box</div>
  <div class="prec">prec box</div>
  <div class="nest">nest box</div>
  <div class="vwcalc">vwcalc box</div>
  <div class="varc">varc box</div>
</body>
</html>
