<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ffffff; }
  /* .fade: base grey, animation settles it to green (100% frame) */
  .fade { background: #333333; color: #000000; animation: fadein 2s ease-in forwards; }
  @keyframes fadein {
    from { background: #cccccc; }
    50%  { background: #999999; }
    100% { background: #00aa00; color: #ffffff; }
  }
  /* .slide: animation-name longhand; settled state uses `to` keyframe */
  .slide { background: #222244; animation-duration: 1s; animation-name: reveal; }
  @keyframes reveal {
    from { background: #222244; }
    to   { background: #cc0000; }
  }
  /* .noanim: has NO animation; base colour must survive untouched */
  .noanim { background: #112233; }
  /* .missing: animation-name refers to a keyframes that does not exist -> base */
  .missing { background: #445566; animation: ghost 3s linear infinite; }
</style>
</head>
<body>
  <div class="fade">Fading box settles green</div>
  <div class="slide">Sliding box settles red</div>
  <div class="noanim">No animation stays base</div>
  <div class="missing">Missing keyframes stays base</div>
</body>
</html>
