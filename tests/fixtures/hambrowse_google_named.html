<html>
<head><title>Google</title></head>
<body>
<!--
  #317: the REAL google.com search box identifies its controls by `name`, not
  `id` — `<form name="f" action="/search">` wrapping `<input name="q">`. Field
  resolution must fall back to `name` so a type+submit still navigates to the
  results page. (The minimal hambrowse_google.html fixture uses id="q"; this one
  guards the id-LESS shape the live homepage actually ships.)
-->
<h1>Google</h1>
<form action="/search" name="f">
<input class="lst" autocomplete="off" value="" title="Google Search" maxlength="2048" name="q" size="57">
<input name="hl" type="hidden" value="en">
<input name="btnK" type="submit" value="Google Search">
</form>
</body>
</html>
