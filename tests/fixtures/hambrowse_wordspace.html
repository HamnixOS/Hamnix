<!DOCTYPE html>
<html><head><title>in-cell inter-word space is proportional, not CELL_W monospace</title></head>
<body style="margin:0">
<!-- Hacker News sitebit pattern: a title, a link, then a (domain) span inside a
     presentational table cell. In-cell inline spacing must be the ~5px DejaVu
     space advance (what the paint draws), not the old 8px CELL_W monospace grid
     that stranded a ~25px phantom gap before the link. -->
<table border="0" cellpadding="0" cellspacing="0"><tr>
<td>Show HN My project title here <span><a href="#">alpha</a></span> <span>(github.com)</span></td>
</tr></table>
</body></html>
