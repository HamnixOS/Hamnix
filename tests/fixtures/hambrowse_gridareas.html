<!doctype html>
<html>
<head><style>
.page {
  display: grid;
  grid-template-columns: 150px 1fr;
  grid-template-rows: 60px 200px 40px;
  grid-template-areas:
    "head head"
    "side main"
    "foot foot";
  gap: 0;
}
.h { grid-area: head; background: #112233; }
.s { grid-area: side; background: #227722; }
.m { grid-area: main; background: #aa3344; }
.f { grid-area: foot; background: #445566; }

/* second grid: named areas WITHOUT grid-template-columns (columns derived
   from the areas template => three equal 1fr tracks). */
.auto {
  display: grid;
  grid-template-rows: 50px 50px;
  grid-template-areas:
    "aa aa bb"
    "cc cc bb";
}
.x { grid-area: aa; background: #123456; }
.y { grid-area: bb; background: #654321; }
.z { grid-area: cc; background: #abcdef; }
</style></head>
<body>
<div class="page">
<div class="h">HeaderZ</div>
<div class="s">SidebarZ</div>
<div class="m">MainZ</div>
<div class="f">FooterZ</div>
</div>
<div class="auto">
<div class="x">Xarea</div>
<div class="y">Yarea</div>
<div class="z">Zarea</div>
</div>
</body>
</html>
