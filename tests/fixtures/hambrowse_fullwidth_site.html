<!doctype html>
<html>
<head>
<title>Full-width site — readable-measure scoping probe</title>
<style>
  body { margin: 0; background: #f4f6f9; color: #1c2530; }
  /* A full-bleed navigation bar: a display:flex container whose background must
     span the WHOLE window width (edge to edge), like Firefox/Chrome — NOT a
     584px readable-measure strip centred in a wide window. */
  .nav { display: flex; gap: 20px; align-items: center;
         padding: 12px 24px; background: #16324f; color: #ffffff; }
  .nav .brand { font-weight: bold; }
  /* A three-card flex row that must use the full available width. */
  .cards { display: flex; gap: 20px; padding: 20px 24px; }
  .card { flex: 1; background: #d7e2ee; height: 90px; }
</style>
</head>
<body>
<header class="nav">
  <span class="brand">FullBleed</span>
  <span>Home</span>
  <span>Products</span>
  <span>About</span>
</header>
<section class="cards">
  <div class="card"></div>
  <div class="card"></div>
  <div class="card"></div>
</section>
</body>
</html>
