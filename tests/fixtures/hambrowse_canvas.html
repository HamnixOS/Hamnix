<!doctype html>
<html>
<head><title>Canvas 2D demo</title></head>
<body>
<h1>Canvas bar chart</h1>
<p>A script draws bars, a circle and a label into the canvas below.</p>
<canvas id="chart" width="320" height="200"></canvas>
<p>Text after the canvas flows below it.</p>
<script>
var cv = document.getElementById('chart');
var ctx = cv.getContext('2d');

// opaque white background for the whole canvas
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, 320, 200);

// three bars in different colours (a tiny bar chart)
ctx.fillStyle = 'red';
ctx.fillRect(20, 120, 40, 60);
ctx.fillStyle = '#00a000';
ctx.fillRect(80, 80, 40, 100);
ctx.fillStyle = 'blue';
ctx.fillRect(140, 40, 40, 140);

// a hollow (stroked) circle
ctx.strokeStyle = '#ff8800';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.arc(250, 100, 45, 0, 6.2831853);
ctx.stroke();

// a filled triangle via a path
ctx.fillStyle = '#8000c0';
ctx.beginPath();
ctx.moveTo(210, 180);
ctx.lineTo(290, 180);
ctx.lineTo(250, 150);
ctx.closePath();
ctx.fill();

// a text label
ctx.fillStyle = 'black';
ctx.font = 'bold 18px sans-serif';
ctx.fillText('Chart', 24, 28);

// clearRect proof: fill a navy block then punch a transparent hole in it
// (the punched hole composites to the white page behind the canvas).
ctx.fillStyle = 'navy';
ctx.fillRect(280, 10, 34, 30);
ctx.clearRect(290, 18, 14, 14);
</script>
</body>
</html>
