<html><head><style>
  body { background:#101830; color:#e8e8f0; }

  .nav span { color:#ffffff; }
  .stack { display:flex; flex-direction:column; }
  .stack div { background:#eeeeee; }
</style></head><body>
<label>First name</label>
<input type="text">
<label>Second name</label>
<input type="text">

</div>
<div class="stack">
<div>Stacked one</div>
<div>Stacked two</div>
</div>
<p>Body colour inherits to this paragraph.</p>
</body></html>
