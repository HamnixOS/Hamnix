<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>display:block on inline-default anchors</title>
<style>
  body { margin:0; font-family:"DejaVu Sans", sans-serif; }
  /* An inline-by-default <a> given display:block must STACK vertically,
     each link on its own full-width row — computed display overrides the
     tag's inline default (CSS 2.1 §9.2.1). */
  .side a { display:block; color:#33507f; padding:3px 0; }
  /* Control: a plain inline <a> (no display override) still flows inline. */
  .bar a  { color:#33507f; }
</style>
</head>
<body>
<div class="side">
  <a href="#a">Introduction</a>
  <a href="#b">Namespaces</a>
  <a href="#c">Packaging</a>
</div>
<div class="bar">
  <a href="#x">First</a>
  <a href="#y">Second</a>
</div>
</body>
</html>
