<!DOCTYPE html>
<html>
<head>
<title>DOM Construction</title>
<style>
  body { font-family: sans-serif; }
  th { font-weight: bold; }
  .built { color: #006600; }
</style>
</head>
<body>
  <h1>Built From Data</h1>
  <div id="mount">MOUNT_EMPTY_PLACEHOLDER</div>

<script>
  // A real single-page-app pattern: FETCH a JSON array, then CONSTRUCT a
  // <table> from it entirely via createElement + createTextNode + appendChild
  // and mount it. Because the build runs inside the fetch .then reaction, the
  // whole subtree is drain-dependent — the gate's "nodrain" control renders
  // the page with the placeholder still present and NO table, proving the
  // rows come from script-built DOM (not static markup).
  __setFetchFixture("/api/rows.json", {
    status: 200,
    body: '[{"name":"Ada","score":1815},{"name":"Grace","score":1906},{"name":"Alan","score":1912}]'
  });

  fetch("/api/rows.json")
    .then(function (r) { return r.json(); })
    .then(function (rows) {
      var mount = document.getElementById("mount");
      mount.textContent = "";                 // clear the placeholder

      var table = document.createElement("table");

      var head = document.createElement("tr");
      var hName = document.createElement("th");
      hName.textContent = "NAME_COL";
      var hScore = document.createElement("th");
      hScore.appendChild(document.createTextNode("SCORE_COL"));
      head.appendChild(hName);
      head.appendChild(hScore);
      table.appendChild(head);

      for (var i = 0; i < rows.length; i++) {
        var tr = document.createElement("tr");
        var tdName = document.createElement("td");
        tdName.appendChild(document.createTextNode(rows[i].name));
        var tdScore = document.createElement("td");
        tdScore.className = "built";
        tdScore.textContent = "s=" + rows[i].score;
        tr.appendChild(tdName);
        tr.appendChild(tdScore);
        table.appendChild(tr);
      }

      mount.appendChild(table);
    });
</script>
</body>
</html>
