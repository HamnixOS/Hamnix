<!DOCTYPE html>
<html><head><style>
  .mw { min-width:300px; background:#eeeeee; color:#111; }
  .bb { box-sizing:border-box;  width:300px; padding-left:40px; padding-right:40px; background:#ddccbb; color:#111; }
  .cb { box-sizing:content-box; width:300px; padding-left:40px; padding-right:40px; background:#bbccdd; color:#111; }
  .fb { flex-basis:250px; background:#c0ffee; color:#111; }
  .fx { flex: 0 0 180px; background:#facade; color:#111; }
  .va { vertical-align:middle; text-indent:24px; background:#abcabc; color:#111; }
</style></head><body>
<div class="mw">MinW</div>
<div class="bb">BorderBox</div>
<div class="cb">ContentBox</div>
<div class="fb">FlexBasis</div>
<div class="fx">FlexShort</div>
<div class="va">ValignIndent</div>
<div style="position:sticky; left:60px; top:0px; background:#001122; color:#eee;">StickyEl</div>
<div style="position:static;  left:60px; background:#221100; color:#eee;">StaticEl</div>
</body></html>
