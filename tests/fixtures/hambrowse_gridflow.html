<!DOCTYPE html>
<html>
<head>
<style>
  /* Three 3-column content-height grids, gap 0 so a grid row == one text row
     and dense's fixed-row model matches the sparse wrap seam exactly. Each grid
     holds Aspan2 + Bspan2 + Csingle: sparse flow leaves a HOLE at (row0,col2)
     because Bspan2 cannot fit the single free cell left on row0, so it wraps to
     row1 and the trailing single item follows the cursor onto row1. Dense
     backfills that hole with the single item. */
  .g   { display:grid; grid-template-columns: repeat(3, 1fr); }
  .gd  { display:grid; grid-template-columns: repeat(3, 1fr); grid-auto-flow: dense; }
  .w   { grid-column: span 2; background:#ffddaa; color:#111; }
  .c   { background:#cceecc; color:#111; }

  /* Column-major flow: 2 columns x 2 fixed rows. Row flow fills 1,2 / 3,4 across;
     column flow fills 1,3 down col0 then 2,4 down col1. */
  .col { display:grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: 20px 20px; grid-auto-flow: column; }
  .row { display:grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: 20px 20px; }
  .k   { background:#dde6ff; color:#111; }
</style>
</head>
<body>
<h2>Sparse</h2>
<div class="g">
  <div class="w">Asp</div>
  <div class="w">Bsp</div>
  <div class="c">Csing</div>
</div>
<h2>Dense</h2>
<div class="gd">
  <div class="w">Adn</div>
  <div class="w">Bdn</div>
  <div class="c">Cdn</div>
</div>
<h2>Rowflow</h2>
<div class="row">
  <div class="k">R1</div>
  <div class="k">R2</div>
  <div class="k">R3</div>
  <div class="k">R4</div>
</div>
<h2>Colflow</h2>
<div class="col">
  <div class="k">K1</div>
  <div class="k">K2</div>
  <div class="k">K3</div>
  <div class="k">K4</div>
</div>
</body>
</html>
