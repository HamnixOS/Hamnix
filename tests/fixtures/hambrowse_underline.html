<!DOCTYPE html>
<html>
<head>
<style>
  .u  { text-decoration: underline; }
  .flat a { text-decoration: none; }
</style>
</head>
<body>
  <p>Plain text with no decoration at all here.</p>
  <p><span class="u">This whole phrase is CSS underlined.</span></p>
  <p style="text-decoration: underline;">Inline underline on a block paragraph.</p>
  <p class="flat"><a href="http://example.com/">A nav link with underline stripped.</a></p>
  <p><a href="http://example.com/">A default link keeps its underline.</a></p>
</body>
</html>
