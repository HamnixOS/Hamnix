<!doctype html>
<!-- hambrowse_appshell.html — regression fixture for the APP-SHELL landmark
     layout mechanism (lib/web/dom/forms.ad + lib/web/layout/flow.ad).

     Real modern CMS/app shells (Wikipedia's Vector skin, most site chromes)
     place their nav/sidebar/TOC side-regions BESIDE the main column via CSS
     that frequently lives in an EXTERNAL stylesheet the engine never fetches.
     Absent that CSS those tall regions stack in document order ABOVE <main>,
     burying the article far down the page. This fixture reproduces the two
     idioms the engine now handles WITHOUT the external CSS:

       (1) A chrome <nav> that PRECEDES <main> on a page that declares a <main>
           landmark is floated into a fixed-width LEFT gutter, so the article
           content flows up BESIDE it (near the top) instead of below it.

       (2) A CSS-checkbox-hack dropdown popup (a `*dropdown-content` panel,
           display:none until its toggle is :checked via an external rule) is
           collapsed by default instead of dumping its whole expanded menu.

     Assertions read STABLE POSFILL pixel rects + a text-absence check, so a
     regression fails on the dev host with no QEMU boot. -->
<html>
<head><meta charset="utf-8"><title>app-shell</title></head>
<body>
<!-- (1) pre-<main> complementary sidebar: eight lines tall. #112233 background
     so its floated box shows up as one POSFILL rect. Must float to a 240px
     gutter. A pre-<main> <aside> is a reliable "beside main" region; a pre-main
     <nav> is deliberately NOT floated (it is usually a full-width masthead/top
     bar) — see hambrowse_topnav.html for that guard. -->
<aside style="background:#112233">N1<br>N2<br>N3<br>N4<br>N5<br>N6<br>N7<br>N8</aside>
<main>
  <!-- position:relative + a background => its own POSFILL rect (#abcdef). It
       must render at the TOP (same row as the nav), in the channel indented
       past the floated gutter — NOT stacked below the tall nav. -->
  <div style="position:relative;background:#abcdef">MAINBOX</div>
  <!-- (2) collapsed dropdown popup: its content must NOT render at all. -->
  <div class="foo-dropdown-content" style="background:#fedcba">SECRETMENU</div>
</main>
</body>
</html>
