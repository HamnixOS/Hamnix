<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; font-family:"DejaVu Sans", sans-serif; }
  /* Google's top-bar nav idiom: adjacent display:inline-block links carrying a
     horizontal margin (margin:0 5px) + padding. In the PIXEL render these MUST
     stay SEPARATED ("About  Store"), not glue into "AboutStore". The pixel
     renderer flows prose contiguously and only inserts an inter-run gap via
     seg_lmarg, so the inline-block chip open/close must thread its horizontal
     margin into that gap (mirroring the inline <span> path). */
  a.nav { display:inline-block; padding:5px; margin:0 5px; color:#1a4fd0; }
</style>
</head>
<body>
<a class="nav" href="#">About</a><a class="nav" href="#">Store</a>
</body>
</html>
