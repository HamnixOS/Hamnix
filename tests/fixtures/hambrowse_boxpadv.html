<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Borderless box vertical padding (ROUND-11)</title>
<style>
  body { font-family: "DejaVu Sans", sans-serif; margin: 0; }
  /* A plain BORDERLESS box (background, no border) with real vertical padding.
     Chrome paints its background over the PADDING box: a single 16px line inset
     by 16px top + 16px bottom is ~50px tall. hambrowse used to quantise the
     folded padding into whole ~19px LINE_H blank rows AND paint the fill over
     the content row only (~19px), so the box read ~10-15% too tall in flow yet
     its background under-covered the padding. ROUND-11 bakes the padding at
     REAL px into the first/last content row (a no-stroke kind-3 padding bbox),
     so the fill spans the padded box at Chrome's height. */
  .pad  { background:#aa2244; padding:16px; }
  /* control: SAME box, no padding -> one bare content line (~19px). */
  .flat { background:#2244aa; padding:0; }
</style>
</head>
<body>
<div class="pad">Padded sixteen box</div>
<div class="flat">Flat control box</div>
</body>
</html>
