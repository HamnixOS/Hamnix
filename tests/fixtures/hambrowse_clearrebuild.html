<!doctype html>
<html>
<head>
<style>
  #list { list-style: none; }
  .done { text-decoration: line-through; color: #8a94a3; }
</style>
</head>
<body>
<h1>Clear + rebuild</h1>
<ul id="list"></ul>
<p>Static: <s>tagstrike</s> and <span class="done">classstrike</span></p>
<ul id="plain"><li>bulletitem</li></ul>

<script>
  function render(n) {
    var list = document.getElementById('list');
    list.innerHTML = '';
    for (var i = 0; i < n; i = i + 1) {
      var li = document.createElement('li');
      li.textContent = 'ROWITEM';
      if (i === 1) { li.className = 'done'; }
      list.appendChild(li);
    }
  }
  render(3);          // first build: 3 rows
  render(4);          // clear + rebuild: 4 rows (must NOT leave the old 3)
  var list = document.getElementById('list');
  console.log('cn ' + list.childNodes.length);
</script>
</body>
</html>
