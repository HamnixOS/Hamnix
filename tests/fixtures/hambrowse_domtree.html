<html>
<head><title>DOM Tree</title></head>
<body>
<h1 id="title">Menu</h1>
<nav id="nav">
  <ul class="menu">
    <li class="mi">Home</li>
    <li class="mi">World</li>
    <li class="mi">Tech</li>
  </ul>
</nav>
<section id="content">
  <p class="intro">First para</p>
  <p class="body">Second para</p>
  <article>
    <p class="deep">Nested para</p>
  </article>
</section>
<p id="status">walk-pending</p>

<script>
  // The whole page's console output must stay under the engine's capture cap,
  // so each line packs several assertions.

  // ---- tree walking: real parent / child / sibling links --------------
  var world = document.querySelectorAll('.mi')[1];          // the middle <li>
  // parentNode + grandparent, both spec-uppercase tagName.
  console.log("nav " + world.parentNode.tagName + " " + world.parentNode.parentNode.tagName); // nav UL NAV
  // THE walk the flat model could not do (parent -> children[0] -> nextSibling)
  // + firstElementChild + lastElementChild.
  console.log("walk " + world.parentNode.children[0].nextElementSibling.textContent \
              + " " + world.parentNode.firstElementChild.textContent \
              + " " + world.parentNode.lastElementChild.textContent); // walk World Home Tech
  // prev/next element sibling + element-only children count.
  console.log("sibs " + world.previousElementSibling.textContent \
              + " " + world.nextElementSibling.textContent \
              + " " + world.parentNode.children.length); // sibs Home Tech 3

  // ---- true selector combinators --------------------------------------
  // child (>), adjacent (+), general sibling (~).
  console.log("comb " + document.querySelectorAll('.menu > li').length \
              + " " + document.querySelectorAll('.menu li + li').length \
              + " " + document.querySelectorAll('.intro ~ p').length); // comb 3 2 1
  // descendant vs child (the article-nested p is excluded by '>').
  console.log("desc " + document.querySelectorAll('#content p').length \
              + " " + document.querySelectorAll('#content > p').length); // desc 3 2

  // ---- structural pseudo-classes --------------------------------------
  console.log("pseudo " + document.querySelector('.menu li:first-child').textContent \
              + " " + document.querySelector('.menu li:last-child').textContent \
              + " " + document.querySelector('.menu li:nth-child(2)').textContent); // pseudo Home Tech World

  // getElementById(...).nextElementSibling proves the up/side links on an
  // id-resolved element too.
  console.log("sib " + document.getElementById('title').nextElementSibling.tagName); // sib NAV

  // ---- appendChild operates on the real tree --------------------------
  var ul = world.parentNode;
  var li4 = document.createElement('li');
  li4.textContent = 'News';
  ul.appendChild(li4);
  console.log("append " + ul.children.length + " " + li4.parentNode.tagName); // append 4 UL

  // ---- a mutation reached purely by walking the tree ------------------
  var tgt = document.querySelector('#status');
  tgt.textContent = tgt.parentNode.tagName + "-WALK-OK";     // BODY-WALK-OK (renders)
</script>
</body>
</html>
