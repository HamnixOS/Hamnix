<!doctype html>
<html>
<head>
<title>Create your account</title>
<style>
  body { font-size: 15px; color: #202733; margin-left: 40px; }
  fieldset { border: 1px solid #c3ccd8; padding: 16px; max-width: 460px; }
  legend { font-weight: bold; color: #12345a; }
  label { display: inline-block; width: 140px; color: #3a4656; }
  .row { margin-top: 10px; }
  .hint { color: #6b7788; font-size: 12px; }
  .primary { background: #12345a; color: #ffffff; padding: 10px; }
</style>
</head>
<body>
<h1>Create your account</h1>
<form action="/register" method="post">
  <fieldset>
    <legend>Account</legend>
    <div class="row">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com">
    </div>
    <div class="row">
      <label for="pw">Password</label>
      <input type="password" id="pw" name="pw" placeholder="At least 8 chars">
    </div>
    <div class="row">
      <label for="pw2">Confirm</label>
      <input type="password" id="pw2" name="pw2">
    </div>
  </fieldset>

  <fieldset>
    <legend>Profile</legend>
    <div class="row">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" value="Ada Lovelace">
    </div>
    <div class="row">
      <label for="country">Country</label>
      <select id="country" name="country">
        <option value="us">United States</option>
        <option value="uk" selected>United Kingdom</option>
        <option value="de">Germany</option>
      </select>
    </div>
    <div class="row">
      <label>Plan</label>
      <input type="radio" name="plan" value="free" checked> Free
      <input type="radio" name="plan" value="pro"> Pro
    </div>
    <div class="row">
      <label for="bio">Bio</label>
      <textarea id="bio" name="bio" rows="3">Hello, world.</textarea>
    </div>
    <div class="row">
      <label for="tos">Agree</label>
      <input type="checkbox" id="tos" name="tos" checked> I accept the terms
    </div>
  </fieldset>

  <div class="row">
    <button type="submit" class="primary">Create account</button>
    <button type="reset">Reset</button>
  </div>
  <p class="hint">By signing up you agree to our policy.</p>
</form>
</body>
</html>
