<html><head></head><body>
<!-- A plain upright control line, then the SAME letters in <em>, <i> and CSS
     font-style:italic. The pixel backend renders emphasis as a FAUX-OBLIQUE
     (a horizontal shear of the single bitmap face) so italic runs visibly slant
     (top pushed right of the bottom) while staying legible. Vertical strokes
     ('l') make the shear easy to measure. NOT a true italic typeface. -->
<p>llllllll</p>
<p><em>llllllll</em></p>
<p><i>llllllll</i></p>
<p style="font-style:italic">llllllll</p>
<p>Normal prose with an <em>emphasized phrase</em> then normal again.</p>
</body></html>
