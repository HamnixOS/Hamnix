<!DOCTYPE html>
<html>
<head><title>QSel over created nodes</title></head>
<body>
<div id="app" class="container"></div>
<ul id="list">
  <li class="src-item">One</li>
</ul>

<script>
  var app = document.getElementById('app');

  // (1) createElement + appendChild, then querySelector finds it. The class /
  // tag names below appear only as JS strings (never as a literal start-tag in
  // the source), so document-scope selectors see ONLY the created nodes.
  var card = document.createElement('div');
  card.className = 'card';
  card.id = 'card1';
  card.setAttribute('data-kind', 'hero');
  app.appendChild(card);
  var span = document.createElement('span');
  span.className = 'label';
  span.textContent = 'Hi';
  card.appendChild(span);

  console.log("q_card " + (document.querySelector('.card') !== null));
  console.log("q_span " + (document.querySelector('.card .label') !== null));
  console.log("q_attr " + document.querySelectorAll('[data-kind=hero]').length);
  console.log("gcls " + document.getElementsByClassName('card').length);
  console.log("gtag " + document.getElementsByTagName('span').length);

  // getElementById over a created node returns the SAME object.
  var byid = document.getElementById('card1');
  console.log("byid " + (byid !== null) + " " + (byid === card));

  // (3) combinator/class query SPANNING source (#app.container) + created (.card),
  // both descendant and child ('>').
  console.log("span1 " + document.querySelectorAll('.container .card').length);
  console.log("span2 " + document.querySelectorAll('#app > .card').length);

  // (2) innerHTML, then a query finds a node inside it. Scoped to the created
  // parent so the match is provably the created node (an element-scoped query
  // has an empty source span, so only the created subtree is searched).
  var box = document.createElement('div');
  box.id = 'box';
  app.appendChild(box);
  box.innerHTML = '<p class="para">A</p><p class="para hot">B</p>';
  console.log("box_p " + box.querySelectorAll('p').length);
  console.log("box_hot " + (box.querySelector('p.hot') !== null));
  console.log("box_ident " + (box.querySelector('.para') === box.childNodes[0]));

  // querySelector over the innerHTML subtree by id (a created node).
  box.innerHTML = '<b id="inner">X</b>';
  console.log("box_inner " + (box.querySelector('#inner') !== null));

  // Regression guard: the source-text scan still resolves a source-only class.
  console.log("src " + document.querySelectorAll('.src-item').length);

  // Structural pseudos over created siblings (:nth-child / :last-child), scoped.
  var wrap = document.createElement('ul');
  wrap.id = 'wrap';
  app.appendChild(wrap);
  var a = document.createElement('li'); a.textContent = 'a'; wrap.appendChild(a);
  var b = document.createElement('li'); b.className = 'pick'; b.textContent = 'b'; wrap.appendChild(b);
  var c = document.createElement('li'); c.textContent = 'c'; wrap.appendChild(c);
  console.log("nth " + (wrap.querySelector('li:nth-child(2)') === b));
  console.log("last " + (wrap.querySelector('li:last-child') === c));
</script>
</body>
</html>
