<html>
<head><title>Cancelable Submit</title></head>
<body>
<div id="wrap">
  <form id="f" action="/search">
    <input id="q" name="q" type="text" value="cats">
    <input type="submit" value="Go">
  </form>
</div>

<script>
  var f = document.getElementById('f');
  var wrap = document.getElementById('wrap');

  // the SPA pattern: intercept submit + preventDefault() -> NO navigation.
  var pev = null;
  f.addEventListener('submit', function(e){
    pev = e;
    e.preventDefault();
    console.log('CANCEL type=' + e.type);
  });

  // the submit event BUBBLES: a listener on the ancestor #wrap also sees it.
  wrap.addEventListener('submit', function(e){
    console.log('BUBBLE ctarget=' + e.currentTarget.id + ' target=' + e.target.id);
  });

  f.submit();
  console.log('AFTER dp=' + pev.defaultPrevented);
</script>
</body>
</html>
