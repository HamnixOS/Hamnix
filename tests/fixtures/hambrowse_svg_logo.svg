<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- a stylized "feature icon": rounded-ish badge built from shapes + a path -->
  <g fill="#2a7ae2">
    <circle cx="32" cy="32" r="30"/>
  </g>
  <circle cx="32" cy="32" r="24" fill="#ffffff"/>
  <!-- an arrow/chevron path (absolute + relative + curve commands) -->
  <path d="M 22 20 L 42 32 L 22 44 Z" fill="#2a7ae2"/>
  <path d="M20 52 h24 v4 h-24 z" fill="#e23a2a"/>
  <ellipse cx="32" cy="12" rx="10" ry="4" fill="#f2c200"/>
</svg>
