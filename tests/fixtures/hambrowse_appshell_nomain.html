<!doctype html>
<!-- hambrowse_appshell_nomain.html — CONTROL for hambrowse_appshell.html.
     Identical chrome <aside>, but the page declares NO <main> landmark, so the
     app-shell landmark-float must NOT engage: the <aside> stays a full-width
     in-flow block (no 240px gutter float) and following content stacks BELOW
     it, exactly as before the mechanism existed. Proves the feature is gated on
     the presence of a <main> landmark (pages without one render unchanged). -->
<html>
<head><meta charset="utf-8"><title>no-main</title></head>
<body>
<aside style="background:#112233">N1<br>N2<br>N3<br>N4<br>N5<br>N6<br>N7<br>N8</aside>
<div style="position:relative;background:#abcdef">MAINBOX</div>
</body>
</html>
