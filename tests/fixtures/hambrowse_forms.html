<html>
<head><title>Forms</title></head>
<body>
<h1>Forms Demo</h1>

<p>Name field: <input type="text" id="name" name="who" value="hi"></p>
<p id="echo">echo: </p>

<p>Subscribe: <input type="checkbox" id="sub" name="sub" checked></p>
<p id="substate">sub is on</p>

<p>Colour: <input type="radio" id="rc" name="col" value="red" checked> red</p>

<p>Notes: <textarea id="notes">note text</textarea></p>

<p>Pick: <select id="pick" name="pick">
<option>alpha</option>
<option selected>beta</option>
<option>gamma</option>
</select></p>

<p><button id="go">Save</button></p>
<p id="btnmsg">not saved</p>

<form id="f1" onsubmit="onSub(event)">
Query: <input type="text" id="q" name="q" value="cats">
<input type="checkbox" id="fancy" name="fancy" checked>
<input type="submit" value="Search">
</form>
<p id="result">no result</p>

<form id="f2" action="/search">
<input type="text" id="term" name="term" value="dogs">
<input type="hidden" name="lang" value="en">
<input type="submit" value="Go">
</form>

<script>
  // oninput on the text field updates another paragraph.
  document.getElementById('name').oninput = function() {
    document.getElementById('echo').textContent = 'echo: ' + document.getElementById('name').value;
  };
  // onchange on the checkbox toggles a status line.
  document.getElementById('sub').onchange = function() {
    var s = document.getElementById('sub').checked ? 'sub is on' : 'sub is off';
    document.getElementById('substate').textContent = s;
  };
  // button onclick mutates the DOM.
  document.getElementById('go').onclick = function() {
    document.getElementById('btnmsg').textContent = 'saved!';
  };
  // onsubmit reads a field value and updates the page; preventDefault stops nav.
  function onSub(e) {
    e.preventDefault();
    var q = document.getElementById('q').value;
    var f = document.getElementById('fancy').checked ? 'yes' : 'no';
    document.getElementById('result').textContent = 'searched ' + q + ' fancy=' + f;
    console.log('submit q=' + q);
  }
  // DOM surface probes: type/name, select.value/selectedIndex, collections.
  console.log('name.type=' + document.getElementById('name').type);
  console.log('name.name=' + document.getElementById('name').name);
  console.log('pick.value=' + document.getElementById('pick').value);
  console.log('pick.idx=' + document.getElementById('pick').selectedIndex);
  console.log('f1.elements=' + document.getElementById('f1').elements.length);
  console.log('doc.forms=' + document.forms.length);
  console.log('forms script ran');
</script>
</body>
</html>
