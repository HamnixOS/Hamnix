<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Heading author-margin honoured</title>
<style>
  /* p margins zeroed so the ONLY vertical gap above each heading is the
     heading's OWN resolved top margin — isolates author-vs-UA margin. */
  p { margin: 0; }
</style>
</head>
<body>
<p>Alpha paragraph before the big margin heading.</p>
<h2 style="margin-top:64px">Big Margin Heading</h2>
<p>Beta paragraph before the medium margin heading.</p>
<h2 style="margin-top:32px">Medium Margin Heading</h2>
<p>Gamma paragraph before the plain heading.</p>
<h2>Plain Heading</h2>
<p>Delta paragraph after the plain heading.</p>
</body>
</html>
