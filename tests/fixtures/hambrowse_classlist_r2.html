<html><head><title>classList round 2</title></head><body>
<p id="t" class="one two">hi</p>
<script>
  var t = document.getElementById('t');
  console.log('force-add ' + t.classList.toggle('one', true) + ' ' + t.className);
  console.log('force-rem ' + t.classList.toggle('two', false) + ' ' + t.className);
  console.log('replace ' + t.classList.replace('one', 'x') + ' ' + t.className);
  console.log('replace-miss ' + t.classList.replace('nope', 'q'));
  console.log('item0 ' + t.classList.item(0));
  console.log('item-oob ' + t.classList.item(5));
</script>
</body></html>
