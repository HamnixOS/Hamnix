<html><head><title>css</title>
<style>
  /* element, id, class, descendant selectors + specificity */
  h1   { color: navy; text-align: center; }
  p    { color: #333; }
  .warn { color: red; font-weight: bold; }
  #lead { color: rgb(0, 128, 0); }
  div p { background-color: yellow; }
  .box  { text-align: right; }
  .hidden { display: none; }
</style></head><body>
<h1>Centered Title</h1>
<p id="lead">Lead paragraph green here.</p>
<p>Normal gray paragraph.</p>
<p class="warn">Warning bold red text.</p>
<div><p>Nested para on yellow bg.</p></div>
<p class="box">Right aligned line.</p>
<p class="hidden">You should not see this hidden line.</p>
<p>Visible after hidden line.</p>
<p style="color: rgb(10,20,200)">Inline rgb override wins.</p>
<p style="text-align:center">Inline centered paragraph.</p>
</body></html>
