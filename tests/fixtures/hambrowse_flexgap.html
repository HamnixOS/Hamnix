<h3>custom gap (40px) + author link colour</h3>

<h3>default gap (8px) + author link colour</h3>
<div class="tight"><a href="/a">One</a><a href="/b">Two</a><a href="/c">Three</a></div>

<p>text <a href="/x">plainlink</a> word</p>
</body></html>
