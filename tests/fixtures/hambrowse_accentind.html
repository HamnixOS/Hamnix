<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ffffff; }
  /* stylesheet accent-color on a checked checkbox: fill should be RED */
  .redcb { accent-color: #dd2222; }
  /* stylesheet accent-color on a checked radio: dot should be GREEN */
  .greenrb { accent-color: #22aa33; }
</style>
</head>
<body>
  <p><input type="checkbox" class="redcb" checked> red accent checked</p>
  <p><input type="checkbox" indeterminate> indeterminate (default blue dash)</p>
  <p><input type="checkbox" checked> default blue checked</p>
  <p><input type="radio" class="greenrb" checked> green accent radio</p>
  <p><input type="checkbox" style="accent-color:#ee8800" checked> inline orange</p>
</body>
</html>
