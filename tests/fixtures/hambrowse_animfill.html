<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ffffff; }
  /* One 2-edge keyframe used by the fill-mode boxes: 0% red, 100% green. */
  @keyframes cyc {
    0%   { background: #cc0000; }
    100% { background: #00aa00; }
  }
  /* forwards  -> paint the SETTLED end (100%) frame -> green */
  .fwd  { background: #333333; animation: cyc 2s ease-in forwards; }
  /* both      -> also end frame -> green */
  .both { background: #333333; animation-name: cyc; animation-fill-mode: both; }
  /* backwards -> paint the FROM (0%) frame -> red */
  .bwd  { background: #333333; animation: cyc 2s ease-in backwards; }
  /* none (explicit) -> paint the FROM (0%) frame -> red */
  .non  { background: #333333; animation-name: cyc; animation-fill-mode: none; }
  /* unspecified fill-mode -> LEGACY settled-end behaviour -> green */
  .leg  { background: #333333; animation-name: cyc; }

  /* widened overlay: the end frame animates WIDTH from 80px to 300px. With
     `forwards` the settled width is 300px. */
  @keyframes grow { from { width: 80px; } to { width: 300px; } }
  .wide { background: #2244aa; width: 80px; animation: grow 1s linear forwards; }
</style>
</head>
<body>
  <div class="fwd">forwards settles green</div>
  <div class="both">both settles green</div>
  <div class="bwd">backwards shows red from-frame</div>
  <div class="non">none shows red from-frame</div>
  <div class="leg">unspecified stays legacy green</div>
  <div class="wide">grow to 300px</div>
</body>
</html>
