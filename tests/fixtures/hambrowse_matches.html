<html>
<head><title>matches / closest</title></head>
<body>
<div id="app" class="root">
  <section class="panel" data-role="main">
    <ul class="list">
      <li class="item active" id="li1"><span class="label" id="lbl">Hello</span></li>
      <li class="item" id="li2">World</li>
    </ul>
  </section>
</div>

<script>
  var lbl = document.getElementById('lbl');
  var li1 = document.getElementById('li1');
  var li2 = document.getElementById('li2');

  // ---- matches(): tag, class, id, [attr], compound, and a negative ----------
  console.log('M1 ' + li1.matches('li'));            // tag -> true
  console.log('M2 ' + li1.matches('.item'));         // class -> true
  console.log('M3 ' + li1.matches('.active'));       // second class -> true
  console.log('M4 ' + li1.matches('li.item.active'));// compound -> true
  console.log('M5 ' + li1.matches('#li1'));          // id -> true
  console.log('M6 ' + li2.matches('.active'));       // negative -> false
  console.log('M7 ' + lbl.matches('[id="lbl"]'));    // attr selector -> true

  // ---- closest(): self, ancestor, and no-match -----------------------------
  console.log('C1 ' + lbl.closest('.label').id);     // self -> lbl
  console.log('C2 ' + lbl.closest('li').id);         // nearest ancestor li -> li1
  console.log('C3 ' + lbl.closest('.panel').className); // ancestor by class -> panel
  console.log('C4 ' + lbl.closest('#app').id);       // far ancestor by id -> app
  console.log('C5 ' + (lbl.closest('.nope') === null)); // no match -> true

  // ---- closest() as event-delegation helper --------------------------------
  document.getElementById('app').addEventListener('click', function(e){
    var it = e.target.closest('.item');
    console.log('DELEGATE ' + (it ? it.id : 'none'));
  });
  lbl.dispatchEvent({type:'click'});
</script>
</body>
</html>
