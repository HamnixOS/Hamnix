<!DOCTYPE html>
<html><head><title>word-wrap + figure margin + table rules</title></head>
<body>
<p>Intro paragraph at the body left margin.</p>

<!-- (A) DEFAULT overflow-wrap:normal — an over-wide word must NOT split; it
     wraps as a whole word and OVERFLOWS the narrow box (like real browsers). -->
<div style="width:44px;border:1px solid black"><p>Platform testing</p></div>

<!-- (A') overflow-wrap:break-word OPT-IN — the over-wide word MAY split mid-run. -->
<div style="width:44px;border:1px solid black;overflow-wrap:break-word"><p>Breakword testing</p></div>

<!-- (A'') word-break:break-all OPT-IN — also splits mid-run. -->
<div style="width:44px;border:1px solid black;word-break:break-all"><p>Wordbreak testing</p></div>

<!-- (C) <figure> UA default ~40px left/right margins. -->
<figure><figcaption>Figure caption content here.</figcaption></figure>

<p>Outro paragraph at the body left margin.</p>
</body></html>
