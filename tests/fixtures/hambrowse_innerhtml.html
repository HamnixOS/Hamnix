<!DOCTYPE html>
<html><head><title>innerHTML setter</title></head>
<body>
<div id="host"><span>old inner</span><em>drop me</em></div>
<div id="nest">placeholder</div>
<script>
  var h = document.getElementById('host');
  h.innerHTML = '<span class="a">hi</span><b>bold</b> tail';
  // childNodes now reflects the parsed fragment (real nodes, not a string)
  console.log('cn ' + h.childNodes.length);
  console.log('t0 ' + h.childNodes[0].tagName + ' ' + h.childNodes[0].className +
              ' ' + h.childNodes[0].textContent);
  console.log('t1 ' + h.childNodes[1].tagName + ' ' + h.childNodes[1].textContent);
  console.log('t2 ' + h.childNodes[2].nodeType + ' ' + h.childNodes[2].textContent);
  console.log('htext ' + h.textContent);
  console.log('first ' + h.firstChild.tagName + ' last ' + h.lastChild.nodeType);

  // nested + real child arrays on the created subtree
  var n = document.getElementById('nest');
  n.innerHTML = '<ul><li>one</li><li>two</li></ul>';
  var ul = n.childNodes[0];
  console.log('ul ' + ul.tagName + ' kids ' + ul.childNodes.length);
  console.log('li0 ' + ul.childNodes[0].tagName + ' ' + ul.childNodes[0].textContent);
  console.log('li1 ' + ul.childNodes[1].textContent);
  console.log('ultext ' + ul.textContent);
</script>
</body></html>
