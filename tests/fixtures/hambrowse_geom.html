<html>
<head><title>Geom</title></head>
<body>
<div id="a">AlphaOne</div>
<p id="b">BetaTwoThree</p>
<span id="c">GammaInline</span>
<div id="wrap"><em id="d">DeltaChild</em></div>

<script>
  var a = document.getElementById('a');
  var r = a.getBoundingClientRect();
  // rect: x y width height  (x==left, y==top, cross-checked vs the SEG dump)
  console.log("rect " + r.x + " " + r.y + " " + r.width + " " + r.height);
  console.log("edge " + r.left + " " + r.top + " " + r.right + " " + r.bottom);
  // offset* / client* mirror the box (no borders/scrollbars modelled).
  console.log("off " + a.offsetLeft + " " + a.offsetTop + " " + a.offsetWidth + " " + a.offsetHeight);
  console.log("client " + a.clientWidth + " " + a.clientHeight);
  // getComputedStyle: display by tag, resolved width in px.
  console.log("disp " + getComputedStyle(a).display);
  console.log("bdisp " + getComputedStyle(document.getElementById('b')).display);
  console.log("cdisp " + getComputedStyle(document.getElementById('c')).display);
  console.log("awidth " + getComputedStyle(a).width);
  // offsetParent walks to the containing element.
  var d = document.getElementById('d');
  console.log("op " + (d.offsetParent ? d.offsetParent.id : "null"));
</script>
</body>
</html>
