<html>
<head><title>Geom2</title></head>
<body>
<div id="a">AlphaOne</div>
<div id="wrap"><em id="d">DeltaChild</em></div>

<script>
  var a = document.getElementById('a');
  // Baseline (unscrolled) bounding box, cross-checked against the SEG dump.
  var r0 = a.getBoundingClientRect();
  console.log("base " + r0.x + " " + r0.y + " " + r0.width + " " + r0.height);

  // getClientRects() returns a one-entry DOMRectList holding the bounding rect.
  var rl = a.getClientRects();
  console.log("rects " + rl.length);
  var rc = rl[0];
  console.log("rl0 " + rc.x + " " + rc.y + " " + rc.width + " " + rc.height);

  // Scroll the viewport: getBoundingClientRect() must become viewport-relative,
  // i.e. offset UP by the page scroll amount (y - scrollTop). Set on the
  // scrolling element (documentElement) as a page normally would.
  document.documentElement.scrollTop = 40;
  document.documentElement.scrollLeft = 10;
  var r1 = a.getBoundingClientRect();
  console.log("scrolled " + r1.x + " " + r1.y + " " + r1.width + " " + r1.height);
  console.log("delta " + (r0.x - r1.x) + " " + (r0.y - r1.y));

  // getClientRects() honours the same scroll translation.
  var rl2 = a.getClientRects();
  console.log("srect0 " + rl2[0].x + " " + rl2[0].y);

  // Expanded getComputedStyle resolved properties (UA defaults + inline wins).
  var cs = getComputedStyle(a);
  console.log("pad " + cs.padding);
  console.log("mar " + cs.margin);
  console.log("fs " + cs.fontSize);
  console.log("bg " + cs.backgroundColor);
  a.style.backgroundColor = "red";
  a.style.fontSize = "22px";
  var cs2 = getComputedStyle(a);
  console.log("bg2 " + cs2.backgroundColor);
  console.log("fs2 " + cs2.fontSize);
</script>
</body>
</html>
