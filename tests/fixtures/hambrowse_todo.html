<!doctype html>
<html>
<head>
<title>Tasks</title>
<style>
  body { font-size: 15px; margin-left: 30px; }
  .done { text-decoration: line-through; color: #8a94a3; }
  #list { list-style: none; }
  .count { font-weight: bold; }
</style>
</head>
<body>
<h1>Tasks</h1>
<p>Open: <span id="count">0</span></p>
<ul id="list"></ul>
<button id="add">Add task</button>

<script>
  var tasks = [
    { text: "Write the spec", done: false },
    { text: "Review the PR", done: true },
    { text: "Ship the release", done: false }
  ];

  function render() {
    var list = document.getElementById('list');
    list.innerHTML = '';
    tasks.forEach(function (t, i) {
      var li = document.createElement('li');
      li.textContent = t.text;
      li.dataset.idx = i;
      if (t.done) { li.className = 'done'; }
      li.addEventListener('click', function () {
        tasks[i].done = !tasks[i].done;
        render();
      });
      list.appendChild(li);
    });
    var open = tasks.filter(function (t) { return !t.done; }).length;
    document.getElementById('count').textContent = open;
  }

  document.getElementById('add').addEventListener('click', function () {
    tasks.push({ text: "Task " + (tasks.length + 1), done: false });
    render();
  });

  render();
</script>
</body>
</html>
