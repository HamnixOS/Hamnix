<!DOCTYPE html>
<html><head><title>DOM R6 traversal</title></head>
<body>
<ul id="list"><li id="a">a</li><li id="b">b</li><li id="c">c</li></ul>
<script>
  var list = document.getElementById('list');
  console.log('CEC ' + list.childElementCount);
  console.log('FLC ' + list.firstElementChild.id + '|' + list.lastElementChild.id
              + '|' + list.children[1].nextElementSibling.id);
</script>
</body></html>
