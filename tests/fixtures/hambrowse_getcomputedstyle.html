<!DOCTYPE html>
<html>
<head><title>getComputedStyle resolved values</title></head>
<body>
<div id="parent" style="width:400px">
  <div id="child">ChildBox</div>
  <span id="inl">InlineBit</span>
</div>
<p id="para">ParaText</p>
<script>
// A framework measuring layout: set inline styles, then read the RESOLVED
// values back through getComputedStyle (colours as rgb(), lengths as used px).
document.getElementById('parent').style.width = "400px";  // containing block
var child = document.getElementById('child');
child.style.width = "50%";          // used value == 50% of the 400px parent
child.style.color = "red";
child.style.backgroundColor = "#00ff00";
child.style.fontSize = "20px";
child.style.margin = "10px";
child.style.padding = "5px";
child.style.fontWeight = "bold";
child.style.position = "relative";
child.style.visibility = "hidden";
child.style.opacity = "0.5";
child.style.zIndex = "7";
child.style.height = "30px";

var cs = getComputedStyle(child);
console.log("width " + cs.width);                 // 200px (50% of 400)
console.log("height " + cs.height);               // 30px
console.log("color " + cs.color);                 // rgb(255, 0, 0)
console.log("bg " + cs.backgroundColor);          // rgb(0, 255, 0)
console.log("display " + cs.display);             // block
console.log("position " + cs.position);           // relative
console.log("fontsize " + cs.fontSize);           // 20px
console.log("fontweight " + cs.fontWeight);       // 700
console.log("margin " + cs.margin);               // 10px
console.log("padding " + cs.padding);             // 5px
console.log("visibility " + cs.visibility);       // hidden
console.log("opacity " + cs.opacity);             // 0.5
console.log("zindex " + cs.zIndex);               // 7
console.log("fontfamily " + cs.fontFamily);       // monospace

// getPropertyValue() + kebab-case access.
console.log("gpv_color " + cs.getPropertyValue("color"));       // rgb(255, 0, 0)
console.log("gpv_fs " + cs.getPropertyValue("font-size"));      // 20px
console.log("gpv_bg " + cs.getPropertyValue("background-color"));// rgb(0, 255, 0)
console.log("gpv_unset " + cs.getPropertyValue("--nope"));      // '' (empty)
console.log("gpv_this " + (cs.getPropertyValue("color") === cs.color)); // true

// An UNSTYLED sibling: colours/keywords fall to UA defaults.
var para = document.getElementById('para');
var cp = getComputedStyle(para);
console.log("p_display " + cp.display);           // block
console.log("p_color " + cp.color);               // rgb(...) (laid-out text)
console.log("p_bg " + cp.backgroundColor);        // rgba(0, 0, 0, 0)
console.log("p_margin " + cp.margin);             // 0px
console.log("p_fontsize " + cp.fontSize);         // 16px
console.log("p_position " + cp.position);         // static
console.log("p_visibility " + cp.visibility);     // visible
console.log("p_opacity " + cp.opacity);           // 1
console.log("p_zindex " + cp.zIndex);             // auto
console.log("p_fontweight " + cp.fontWeight);     // 400

// A named-colour on an unstyled element resolves to rgb().
para.style.color = "blue";
console.log("p_color2 " + getComputedStyle(para).color);   // rgb(0, 0, 255)

// span default display.
console.log("inl_display " + getComputedStyle(document.getElementById('inl')).display); // inline
</script>
</body>
</html>
