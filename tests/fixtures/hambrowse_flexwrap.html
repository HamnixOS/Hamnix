<!DOCTYPE html>
<html>
<head>
<style>
  .grid { display:flex; flex-wrap:wrap; gap:16px; }
  .card { width:160px; background:#eef3ff; color:#123; border:1px solid #99b; }
  .pillbar { display:flex; flex-wrap:wrap; gap:12px; justify-content:flex-start; }
  .pill { background:#3355cc; color:#fff; }
</style>
</head>
<body>
<h2>Cards</h2>
<div class="grid">
  <div class="card">Alpha card body text one</div>
  <div class="card">Beta card body text two</div>
  <div class="card">Gamma card body text three</div>
  <div class="card">Delta card body text four</div>
  <div class="card">Epsilon card five</div>
</div>
<h2>Responsive nav</h2>
<div class="pillbar">
  <span class="pill">Dashboard</span>
  <span class="pill">Reports</span>
  <span class="pill">Analytics</span>
  <span class="pill">Settings</span>
  <span class="pill">Team</span>
  <span class="pill">Billing</span>
  <span class="pill">Integrations</span>
  <span class="pill">Help</span>
</div>
</body>
</html>
