<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ffffff; margin: 8px; }
  h2 { margin: 12px 0; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  .card {
    border: 1px solid #cccccc;
    padding: 12px;
  }
  .c1 { background: #ffdddd; }
  .c2 { background: #ddffdd; }
  .c3 { background: #ddddff; }
</style>
</head>
<body>
<h2>Featured cards</h2>
<div class="grid">
  <div class="card c1">Card one title here and a bit of body text.</div>
  <div class="card c2">Card two title here and a bit of body text.</div>
  <div class="card c3">Card three title here and a bit of body text.</div>
</div>
</body>
</html>
