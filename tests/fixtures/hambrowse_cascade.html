<html><head><style>
/* equal-specificity class conflict: later rule wins PER property (source order) */
.base { color: blue; font-weight: normal }
.hot  { color: red;  font-weight: bold }
/* specificity beats source order: #id and inline must win regardless of order */
#idwin { color: green }
.cwin  { color: red }
/* multi-class compound `.a.b` must require BOTH classes, spec 20 > .b spec 10 */
.a.b { color: red }
.b   { color: blue }
</style></head><body>
<p class="base hot">|conflict|</p>
<p id="idwin" class="cwin">|idbeatsclass|</p>
<p class="cwin" style="color:purple">|inlinebeats|</p>
<p class="b">|onlyB|</p>
<p class="a b">|bothAB|</p>
</body></html>
