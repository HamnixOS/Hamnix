name: Hamnix CI

# Replaces the retired MCU-OS workflow (commit d4d066e). Scope: the
# bare-metal x86_64 kernel + the core regression battery under
# scripts/test_*.sh. The Linux ABI track (test_u*.sh / test_l*.sh)
# needs musl-gcc + a built Linux kernel tree and is intentionally
# left out of this commit; a follow-up workflow will own that lane.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hamnix-bare-metal:
    name: Bare-metal kernel + regression battery
    runs-on: ubuntu-latest
    # A full pass of all 14 tests rebuilds the kernel ~14 times and
    # boots QEMU ~14 times. GitHub runners have NO /dev/kvm, so every
    # boot runs under pure-TCG software emulation (the qemu shim only
    # injects -accel kvm when /dev/kvm is usable) — several times slower
    # than the local KVM numbers (~30-90s/test). Budget ~2.5 min/test +
    # build overhead. 40 min gives headroom; if QEMU hangs the timeout
    # still fires before the runner is wasted.
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Adder is now INLINED under adder/ (the HamnixOS/adder repo was
          # folded into this one, 2026-05-30), so `python3 -m
          # compiler.adder` resolves through the `compiler -> adder/compiler`
          # symlink in a plain checkout — no submodule fetch needed.
          submodules: false

      - name: Adder compiler functional check
        # Drift is impossible now that Adder is in-tree; this just guards
        # that the compiler still compiles a trivial program through the
        # canonical import path the build scripts use.
        run: bash scripts/test_adder_pin.sh

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            grub-pc-bin \
            grub-efi-amd64-bin \
            xorriso \
            mtools \
            ovmf

      - name: Build userland
        run: bash scripts/build_user.sh

      - name: Compile bare-metal kernel
        run: |
          # build/ doesn't exist on a fresh checkout — create it so the
          # linker can write its output.
          mkdir -p build
          # fs/initramfs_blob.S is a generated, gitignored file (it is
          # NOT in the checkout). The kernel link needs the symbols it
          # defines (initramfs_cpio_base / initramfs_cpio_size), so it
          # must be regenerated here — which needs the userland init
          # binary built in the step above.
          INIT_ELF=build/user/init.elf python3 scripts/build_initramfs.py
          python3 -m compiler.adder compile \
            --target=x86_64-bare-metal \
            init/main.ad \
            -o build/hamnix-kernel.elf

      # Compiler regression suite now lives in HamnixOS/adder's own
      # GitHub Actions workflow (the host-side tests there cover the
      # parser + codegen). The QEMU-bound per-fixture compiler tests
      # are preserved in adder/scripts/ for reuse, but Hamnix's broader
      # regression battery below (test_hamsh, test_ahci, etc.) already
      # exercises the pinned Adder compiler end-to-end on every commit
      # — so a separate Hamnix-side replay would be redundant.

      # Regression battery — one step per test so a failing test name
      # is visible in the CI run UI. Order is shortest-first so quick
      # failures fail fast. Each step uploads its serial log on
      # failure for post-mortem from the run page.

      - name: test_hamsh
        run: bash scripts/test_hamsh.sh 2>&1 | tee /tmp/test_hamsh.log
      - name: Upload test_hamsh log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_hamsh-log
          path: /tmp/test_hamsh.log
          if-no-files-found: ignore

      # SMP boot canary (-kernel -smp 2). Guards the #413 boot-first-task
      # steal race: the idle AP must not work-steal the READY PID-1 slot
      # before start_first_task claims it (corrupted iret frame -> NX
      # exec-fault in the kstack -> shell never reaches its prompt). This
      # path is INVISIBLE to the 1-CPU UEFI installer gate, so it gets its
      # own step — the regression that motivated it only manifests with a
      # second CPU online.
      - name: test_hamsh_heartbeat
        run: bash scripts/test_hamsh_heartbeat.sh 2>&1 | tee /tmp/test_hamsh_heartbeat.log
      - name: Upload test_hamsh_heartbeat log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_hamsh_heartbeat-log
          path: /tmp/test_hamsh_heartbeat.log
          if-no-files-found: ignore

      - name: test_notfound
        run: bash scripts/test_notfound.sh 2>&1 | tee /tmp/test_notfound.log
      - name: Upload test_notfound log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_notfound-log
          path: /tmp/test_notfound.log
          if-no-files-found: ignore

      - name: test_errstr
        run: bash scripts/test_errstr.sh 2>&1 | tee /tmp/test_errstr.log
      - name: Upload test_errstr log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_errstr-log
          path: /tmp/test_errstr.log
          if-no-files-found: ignore

      - name: test_devcons
        run: bash scripts/test_devcons.sh 2>&1 | tee /tmp/test_devcons.log
      - name: Upload test_devcons log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_devcons-log
          path: /tmp/test_devcons.log
          if-no-files-found: ignore

      - name: test_devnull
        run: bash scripts/test_devnull.sh 2>&1 | tee /tmp/test_devnull.log
      - name: Upload test_devnull log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_devnull-log
          path: /tmp/test_devnull.log
          if-no-files-found: ignore

      - name: test_devtime
        run: bash scripts/test_devtime.sh 2>&1 | tee /tmp/test_devtime.log
      - name: Upload test_devtime log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_devtime-log
          path: /tmp/test_devtime.log
          if-no-files-found: ignore

      - name: test_devpid
        run: bash scripts/test_devpid.sh 2>&1 | tee /tmp/test_devpid.log
      - name: Upload test_devpid log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_devpid-log
          path: /tmp/test_devpid.log
          if-no-files-found: ignore

      - name: test_devrandom
        run: bash scripts/test_devrandom.sh 2>&1 | tee /tmp/test_devrandom.log
      - name: Upload test_devrandom log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_devrandom-log
          path: /tmp/test_devrandom.log
          if-no-files-found: ignore

      - name: test_ahci
        run: bash scripts/test_ahci.sh 2>&1 | tee /tmp/test_ahci.log
      - name: Upload test_ahci log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_ahci-log
          path: /tmp/test_ahci.log
          if-no-files-found: ignore

      - name: test_nvme
        run: bash scripts/test_nvme.sh 2>&1 | tee /tmp/test_nvme.log
      - name: Upload test_nvme log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_nvme-log
          path: /tmp/test_nvme.log
          if-no-files-found: ignore

      - name: test_efi_gop
        run: bash scripts/test_efi_gop.sh 2>&1 | tee /tmp/test_efi_gop.log
      - name: Upload test_efi_gop log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_efi_gop-log
          path: /tmp/test_efi_gop.log
          if-no-files-found: ignore

      - name: test_net_virtio
        run: bash scripts/test_net_virtio.sh 2>&1 | tee /tmp/test_net_virtio.log
      - name: Upload test_net_virtio log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_net_virtio-log
          path: /tmp/test_net_virtio.log
          if-no-files-found: ignore

      - name: test_net_arp
        run: bash scripts/test_net_arp.sh 2>&1 | tee /tmp/test_net_arp.log
      - name: Upload test_net_arp log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_net_arp-log
          path: /tmp/test_net_arp.log
          if-no-files-found: ignore

      - name: test_net_dhcp
        run: bash scripts/test_net_dhcp.sh 2>&1 | tee /tmp/test_net_dhcp.log
      - name: Upload test_net_dhcp log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_net_dhcp-log
          path: /tmp/test_net_dhcp.log
          if-no-files-found: ignore

      - name: test_net_icmp
        run: bash scripts/test_net_icmp.sh 2>&1 | tee /tmp/test_net_icmp.log
      - name: Upload test_net_icmp log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_net_icmp-log
          path: /tmp/test_net_icmp.log
          if-no-files-found: ignore

  # ---------------------------------------------------------------------
  # REAL SHIP-PATH BOOT GATE — the OVMF installer image.
  #
  # The hamnix-bare-metal battery above is ALL `-kernel` multiboot
  # dev-convenience boots; only test_efi_gop touches OVMF and it only
  # checks framebuffer pixels. The actual product — the USB/installer
  # live image booted by FIRMWARE through the EFI stub — was NOT gated,
  # so a non-booting installer image could pass CI. That has bitten the
  # project before (regression #402: per-CPU TSS/GDT triple-faulted at the
  # first timer IRQ from userspace; NO heartbeat ever reached the serial
  # console on the installer image, yet the direct-`-kernel` heartbeat test
  # could not see it). This job is the missing gate: it builds the real
  # build/hamnix-installer.img and boots it under OVMF, asserting hamsh's
  # idle "[hamsh-alive]" heartbeat reaches the serial console and NO
  # fatal trap appears.
  #
  # Runs as a SEPARATE job (not a step in the battery above) because it
  # carries its own ~8-min image build and a slow OVMF boot, and we don't
  # want it serialised behind / blocking the fast unit battery.
  #
  # TCG REALITY (no /dev/kvm on GitHub runners): the installer streams a
  # ~378 MiB live-distro squashfs into RAM before hamsh starts. Under pure
  # TCG that stream + boot reaches the heartbeat in ~830s (measured
  # locally with -accel tcg -cpu max; ~14 min). The boot is POLLED and the
  # job exits the instant the marker appears, so BOOT_TIMEOUT is only an
  # upper bound. The test gates on the boot-ready MARKER (the heartbeat
  # line), never a fixed sleep.
  #
  # CPU MODEL: the kernel's syscall_entry uses SMAP (stac/clac). QEMU's
  # default TCG cpu (qemu64) does NOT expose SMAP, so those opcodes #UD and
  # the first syscall triple-faults — ONLY under TCG, never under KVM's
  # -cpu host. The heartbeat script therefore requests `-cpu max` by
  # default (QEMU_CPU), which carries SMAP under both TCG and KVM.
  #
  # FLAKE + RETRIES + WHY THIS JOB IS NON-BLOCKING (continue-on-error):
  # the installer image boots straight to the GRAPHICAL runlevel
  # (rc.boot.full `init 5`), so the whole hamUI desktop stack comes up with
  # hamsh. Under pure TCG that DE bringup INTERMITTENTLY trips an
  # unrecoverable fault — a user #PF whose SIGSEGV can't be delivered routes
  # into arch/x86/kernel/trap_diag.ad's one-shot "[trap-diag] halting"
  # (cli;hlt) and wedges the box before the heartbeat. MEASURED rate under
  # `-accel tcg -cpu max`: 3 heartbeat / 2 halt across 5 distinct local
  # boots ≈ 40% per-boot fault. That is a REAL latent kernel/DE bug,
  # ORTHOGONAL to the boot path this gate guards, and is NOT papered over by
  # editing the kernel here.
  #
  # We attack it on TWO axes:
  #   1. RETRIES=3 (PASS as soon as ANY boot reaches the heartbeat). At a
  #      40% per-boot fail that is 0.4^3 ≈ 6.4% residual — better, but still
  #      too high to make a REQUIRED check (it would red ~1 run in 16).
  #      Pushing RETRIES high enough (5+) to get <1% would blow past any
  #      sane single-job wall-clock (~14 min/boot under TCG).
  #   2. continue-on-error: true — so this job ALWAYS runs the real
  #      ship-path boot and surfaces its result + uploads the serial log,
  #      but the intermittent DE halt does NOT red the required CI checks.
  #      A truly non-booting image (the #402 class: triple-fault BEFORE any
  #      userspace) still fails EVERY retry and shows a red boot result with
  #      a log every run, which is exactly the regression visibility this
  #      gate exists for — without the flakiness the brief forbids in a
  #      blocking gate. Each wedged attempt FAST-FAILS at the halt marker
  #      (no full-timeout wait), so the 3 retries stay bounded.
  #
  # FOLLOW-UP to make this a hard REQUIRED gate: fix the kernel so an
  # unresolved user #PF delivers SIGSEGV to the faulting DE process instead
  # of routing into the trap_diag cli;hlt (drivers/.. trap_diag.ad +
  # kernel/sched/core.ad deliver_fault_sigsegv). With the flake gone,
  # RETRIES drops to 1 and continue-on-error can be removed.
  #
  # DEFERRED COVERAGE — scripts/test_installer_nvme_inram.sh (the
  # installed-NVMe disk path) is intentionally NOT gated here yet. It
  # hard-requires /dev/kvm (it SKIPs cleanly without it AND its two QEMU
  # invocations pass `-enable-kvm -cpu host`), and it runs a THREE-stage
  # flow — install (streams an even larger payload to NVMe) + reboot the
  # installed disk + a third boot — that under TCG would run far past a
  # reasonable CI budget and would also need a source change to drop the
  # KVM requirement. Gating it reliably under TCG is a follow-up (e.g. a
  # smaller install payload or a KVM-enabled self-hosted runner). Until
  # then this heartbeat gate covers the REAL firmware->EFI-stub->kernel->
  # ring3 boot path, which is the regression class that bit us before.
  installer-boot-heartbeat:
    name: Installer image OVMF boot heartbeat (real ship path, non-blocking)
    runs-on: ubuntu-latest
    # NON-BLOCKING: the intermittent TCG DE-bringup halt (~40%/boot, see the
    # FLAKE comment above) is orthogonal to the boot path this job guards,
    # so a red here must NOT fail the required CI checks. The job still runs
    # the real ship-path boot every time and uploads its log; a genuinely
    # non-booting image reds it on every retry. Drop this once the kernel
    # delivers SIGSEGV for the DE's user #PF instead of halting.
    continue-on-error: true
    # ~8 min image build + up to 3 × ~14 min TCG boot-to-heartbeat (retries
    # ride out the intermittent DE-bringup halt) + apt/setup. 70 min covers
    # the worst case; in the common case the FIRST boot reaches the
    # heartbeat (~14 min) and the job exits early. Each wedged attempt
    # fast-fails at the "[trap-diag] halting" marker rather than burning the
    # per-attempt BOOT_TIMEOUT.
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            ovmf \
            mtools \
            squashfs-tools \
            parted \
            e2fsprogs \
            binutils

      - name: Build userland
        run: bash scripts/build_user.sh

      - name: Build installer image (build/hamnix-installer.img)
        run: bash scripts/build_installer_img.sh

      - name: Installer boot heartbeat gate (OVMF, pure TCG)
        # SKIP_BUILD: reuse the image built in the step above (don't pay the
        # ~8-min rebuild a second time). BOOT_TIMEOUT is a polled per-attempt
        # upper bound; QEMU_CPU=max exposes SMAP so syscall_entry's stac/clac
        # don't #UD under TCG; RETRIES=3 rides out the intermittent
        # DE-bringup trap-diag halt (PASS as soon as any boot heartbeats).
        run: |
          SKIP_BUILD=1 \
          IMG=build/hamnix-installer.img \
          BOOT_TIMEOUT=1200 \
          QEMU_CPU=max \
          RETRIES=3 \
          KEEP_LOG=1 \
            bash scripts/test_installer_boot_heartbeat.sh 2>&1 \
              | tee /tmp/test_installer_boot_heartbeat.log
      # ALWAYS upload the log (not just on failure): this job is
      # continue-on-error, so a flaky-DE-halt run does NOT mark the job
      # failed and an `if: failure()` upload would never fire on exactly the
      # runs whose serial log we most want to inspect (was it the known DE
      # halt, or a real boot regression?). always() surfaces it every run.
      - name: Upload installer heartbeat log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_installer_boot_heartbeat-log
          path: /tmp/test_installer_boot_heartbeat.log
          if-no-files-found: ignore
