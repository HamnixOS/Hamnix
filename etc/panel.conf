# /etc/panel.conf — Hamnix scene-desktop panel layout (MATE-style).
#
# Read by /bin/hampanelscene at startup through its namespace (no global
# bypass). If this file is absent or unreadable the panel falls back to a
# built-in default that reproduces this same layout.
#
# Format: one applet per line.
#     <side> <applet>
# side   : left | right
# applet : one of the known applet names (order = left-to-right on each
#          side; left side packs from x=0, right side packs from the
#          right edge inward).
#
# Known applets:
#     menu       Applications menu button (+ grown-window dropdown)
#     launch     quick-launch buttons (Terminal, Files)
#     tasks      window-list taskbar (fills the middle slack)
#     sysmon     CPU(load) + memory bar-meter applet
#     clock      HH:MM wall clock
#
# `position` keeps the panel at the screen top (only `top` supported now).
position top

left  menu
left  launch
left  tasks
right clock
right sysmon
