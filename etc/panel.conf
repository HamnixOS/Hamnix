# /etc/panel.conf — Hamnix scene-desktop panel layout (MATE-style).
#
# Read by /bin/hampanelscene at startup AND live-reloaded on change (the
# panel polls this file; a Settings edit applies without a restart). It is
# resolved through the app's namespace (no global-path bypass). If this file
# is absent or unparseable the panel falls back to a built-in default that
# reproduces a single top bar.
#
# ── SCHEMA ──────────────────────────────────────────────────────────
#
# Two interchangeable forms; you can mix them.
#
# 1. LEGACY single-panel form (back-compatible):
#       position top|bottom|left|right     edge of the implicit panel
#       left  <widget>                     widget packed from the start edge
#       right <widget>                     widget packed from the far edge
#
# 2. MULTI-PANEL block form (MATE "add a panel" / "add to panel"):
#       panel <name>
#         edge   top|bottom|left|right     left/right = VERTICAL panels
#         color  #RRGGBB                   panel background colour
#         size   <px>                      thickness (height h-panel / width v-panel)
#         font   normal|bold               glyph weight ("fatness") of this panel's text
#         widget menu                      Applications menu button + dropdown
#         widget tasks                     window-list taskbar (elastic, fills slack)
#         widget clock                     HH:MM wall clock
#         widget sysmon                    CPU(load) + memory bar meters
#         widget spacer                    elastic gap — pushes later widgets to the far end
#       end
#   Up to 4 panels. Widgets render in the order listed; the FIRST elastic
#   widget (tasks/spacer) fills the slack and any FIXED widgets after it
#   right-align (bottom-align on a vertical panel).
#
# '#' begins a comment; blank lines are ignored.
#
# ── DEFAULT (MATE two-panel: top bar + bottom window-list) ──────────
# Matches hampanelscene's built-in _default_config so the shipped file and
# the no-file fallback render identically:
#   TOP    [Applications] [tasks ........] .......... [sysmon] [clock]
#   BOTTOM [tasks ...............................................]
panel top
  edge top
  size 26
  color #d4d0c8
  font normal
  widget menu
  widget tasks
  widget sysmon
  widget clock
end
panel bottom
  edge bottom
  size 26
  color #d4d0c8
  font normal
  widget tasks
end
